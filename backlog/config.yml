project_name: "just3ws"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["AC criteria is completed and the change has been verified"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "/opt/homebrew/bin/nvim"
auto_open_browser: true
default_port: 6422
remote_operations: true
auto_commit: true
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
