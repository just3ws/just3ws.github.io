speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Andrea Magnorsky
    role: Co-founder of BatCat Games, GameCraft Organizer

turns:
  - speaker: M1
    text: "Hi, it's Mike again with UGtastic. I'm on the line here with Andrea Magnorsky, who helps run the GameCraft, the Dublin Alt.net, and she also does a podcast called 32 Minutos, which is a Spanish language podcast. Hi, Andrea. Thanks for taking the time to sit down."
  - speaker: S1
    text: "Hi, how are you doing? It's great to be here talking to you."
  - speaker: M1
    text: "Good, good. Now, you're in Dublin right now?"
  - speaker: S1
    text: "Yeah, we're in Dublin, Ireland."
  - speaker: M1
    text: "Dublin, Ireland. Okay, I'm in the United States, so we're a few hours separate. It's the afternoon for you."
  - speaker: S1
    text: "Yeah, it's a very nice 2.25 p.m. right now."
  - speaker: M1
    text: "Oh, nice. So, let's just jump right in. What is GameCraft?"
  - speaker: S1
    text: "Okay, GameCraft is a game jam where you have to be there. The last one lasted 12 hours, and what a game jam is, you start the day with nothing, and you end the day with a game. You can work with a group or without a group, and there's prizes. You meet new people to make games with, and that kind of stuff."
  - speaker: M1
    text: "Now, is this like games for any platform, or is this a specific?"
  - speaker: S1
    text: "Yeah, the idea is that you get good at prototyping, or that you get good at just actually make something. It doesn't matter what it is. Use any platform you like. The idea is you come from nothing to finish or have a rough prototype in that very set time frame."
  - speaker: M1
    text: "So, what kind of games do people make?"
  - speaker: S1
    text: "Well, it was really funny. We had one two weeks ago, and we had HTML5 games, multiple MMOs type of games. We had single player games. We had games made in Unity with really nice art. We had games made with Love, a game engine from Lua. It's from puzzles to MMOs to anything, really."
  - speaker: M1
    text: "Oh, cool. And you said you had prizes and things like this, so you have corporate sponsors, or how does that work?"
  - speaker: S1
    text: "Yeah, the gaming industry in Ireland is growing big time, and that also means there's companies. Some of them are well-known, like Demonware, Swerve, and we just reached out to them and said, 'Hey, do you want to pay for some food and some prizes?' And they were like, 'Yeah, this is great,' because for them, they get to meet people who are interested in making games. For us, it's great because it means we can run a really nice event."
  - speaker: M1
    text: "So, is this something you've done once, or you've done it a few times?"
  - speaker: S1
    text: "This has gone now twice, and we have a slightly different one organized for the 11th of December. We're going to screencast it live, put a big donate button, and it's all going to go to a local charity. The idea is game jamming with a Christmas spirit."
  - speaker: M1
    text: "So, how did you get involved with GameCraft?"
  - speaker: S1
    text: "Well, I have a games company. I'm one of the co-founders of BatCat Games. We make PC and console games. We realized there wasn't enough of these kinds of events. Because I have experience running events, I just said, 'Hey, let's do a game jam.' And it got really popular. The first one, we had 250 sign-ups, and 150 people turning up on the day, because it's a free event."
  - speaker: M1
    text: "The university was the host?"
  - speaker: S1
    text: "Yeah, so we had a full ground floor full of people making games, and it was really exciting."
  - speaker: M1
    text: "Now that you've done a couple of these, do you have any advice for somebody who's planning on doing a game hacking event?"
  - speaker: S1
    text: "Sure. If you're doing a presential one where you have to be there, at the end, make something so that people talk to each other about their games. Give them a hook so they have to talk to someone else. The other thing is actually having food in the place so people don't have to leave and come back. And water, coffee, tea. Offices are really good for running events, particularly open plan offices. Talk to your local people that do these things and say, 'Hey, can I use your office for a game jam?' Some will say yes."
  - speaker: M1
    text: "And for the people that might want to participate, do you have any advice?"
  - speaker: S1
    text: "Always choose your framework before you go. It's super handy to be ready and not having to spend an hour downloading a framework. Don't count on wireless because there's going to be a lot of people. Have a bunch of USB sticks just because you're going to be working with people who might not have network. And bring a bottle of water so stay hydrated."
  - speaker: M1
    text: "Okay, and you're also involved with the Dublin alt.net. What is going on with alt.net in Dublin?"
  - speaker: S1
    text: "At the moment, I'm not running the organization of the group anymore because I founded it about three years ago with someone else. It follows the principles of alternatives to Microsoft .NET technologies. We had a really nice group, and I thought it was time to let the community drive itself."
  - speaker: M1
    text: "What drove you to start the group?"
  - speaker: S1
    text: "I was involved in Ruby Ireland at the start, and I saw the wonderful work they were doing. I craved something that would cover my main language, which is C#. I met Claudio Perrone, who helped found this. You put up a website, meet in a pub, and take it from there. The first day, we had 15 people. It kind of stays at that 20 to 30 level of people very interested in learning more."
  - speaker: M1
    text: "Did you use Meetup, or were you just word of mouth?"
  - speaker: S1
    text: "We used Google Groups and Twitter to let people know about the meetings. Ireland is relatively small; there's one and a half million people here, and the developer community is not that big, so we all kind of know each other."
  - speaker: M1
    text: "I've recently handed off a group myself. When you handed off your group to another organizer, how did you handle that?"
  - speaker: S1
    text: "With difficulty. I really wanted to let it go. It's so much work to do it right, to keep it going every month. The thing was finding someone that would look after the group with the same level of care. I sent an email to everybody saying, 'Listen, I need to leave. Someone needs to take care of this because it's only fair.' I wanted new blood and new ideas. Now two guys took it over, and then one had to move to Switzerland. So now it's just one guy, Andrew Smith, doing a great job."
  - speaker: M1
    text: "It's very satisfying when you see it handed off and see the people that took over schedule meetings so it isn't dead."
  - speaker: S1
    text: "Yeah."
  - speaker: M1
    text: "So, you're in Dublin, Ireland, but you do a Spanish language podcast. You don't sound like you have a traditional Irish accent."
  - speaker: S1
    text: "No, I was born in Argentina. I came to Ireland 10 years ago."
  - speaker: M1
    text: "What is 32 Minutos?"
  - speaker: S1
    text: "32 Minutos is a podcast about .NET technologies. I was interviewed on it a few times talking about better practices, CQRS, and whatnot. Then they asked me to co-host the show. I was struggling with the Spanish even though I'm a native speaker because I don't speak it often enough. I thought this is a great way to connect with a community that is hungry for knowledge and practice my Spanish a bit more."
  - speaker: M1
    text: "Did you learn technology in Spanish or in English? I have friends who are not native English speakers, and the bias in programming is generally English."
  - speaker: S1
    text: "In Argentina, unlike in Spain, we're very pro-using the English words. Your networking class is not called 'redes', it's called 'networking'. 'iDisposable' is still 'iDisposable'. But this is not the same in Spain, so the podcast is sometimes incredibly funny. When people say 'MBC' instead of 'MVC', I'm like, 'What is MBC?' It doesn't make sense."

insights:
  - statement: "Game jams (like GameCraft) emphasize prototyping and completion over technical perfection, challenging developers to deliver a functional product within a strict timeframe."
    type: durable
    confidence: high
  - statement: "Sustaining a successful community event relies heavily on reducing attendee friction (e.g., providing food on-site) and forcing interaction to build network density."
    type: durable
    confidence: high
  - statement: "Handing off leadership of a user group is often more difficult than starting one, as founders must find successors who share the same level of care and commitment."
    type: durable
    confidence: high
  - statement: "The language of technology is heavily biased toward English, creating unique cultural and pedagogical challenges for non-English technical communities (e.g., translating acronyms like MVC)."
    type: durable
    confidence: high

youtube:
  title: "From Prototypes to Podcasts: Andrea Magnorsky on Game Jams, Alt.NET, and Community Hand-offs | UGtastic"
  description: |-
    Andrea Magnorsky, co-founder of BatCat Games and organizer of GameCraft and Dublin Alt.NET, joins Mike Hall to discuss the realities of running technical communities in Ireland. 
    
    Andrea shares her experiences launching a 250-person game jam, the challenges of passing user group leadership to the next generation, and the linguistic quirks of co-hosting the Spanish .NET podcast '32 Minutos'.
    
    Key Topics:
    - Organizing successful game jams.
    - Handing off user group leadership.
    - The Dublin Alt.NET community.
    - The English bias in programming languages.
  tags:
    - Andrea Magnorsky
    - GameCraft
    - Game Jam
    - Dublin Tech
    - Alt.NET
    - C#
    - Community Organizing
    - 32 Minutos
    - Mike Hall
    - UGtastic
  chapters:
    - timestamp: "00:00"
      title: "Introduction to GameCraft and Game Jams"
    - timestamp: "02:10"
      title: "Advice for Game Jam Organizers and Participants"
    - timestamp: "04:30"
      title: "Founding Dublin Alt.NET"
    - timestamp: "06:15"
      title: "The Difficulty of Handing Off Leadership"
    - timestamp: "08:00"
      title: "Co-hosting the '32 Minutos' Podcast and Technical Spanish"
