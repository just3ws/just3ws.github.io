    title: "Introduction and History"
  - timestamp: '01:30'
    title: "Leveraging Regional Networks (Chicago Support)"
  - timestamp: '03:15'
    title: "Why Ruby for .NET Developers?"
  - timestamp: '05:30'
    title: "Craftsmanship as a Technology-Agnostic Focus"
  - timestamp: '07:00'
    title: "Solving the Commuter Problem (Lunch vs. Evening Meetings)"
