speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, UGtastic founder and community interviewer
  S1:
    name: Igor Polevoy
    role: Creator of JavaLite, ActiveJDBC, and ActiveWeb

turns:
  - speaker: M1
    text: "Hi, I'm Mike with UGtastic, sitting here with Igor Polevoy."
  - speaker: M1
    text: "Igor does a lot of free and open-source development on the Java platform. He's created tools underneath the JavaLite family of frameworks and tools, including ActiveWeb, ActiveJDBC, JSpec, and HTTP Lite."
  - speaker: M1
    text: "You kind of have this family, this framework stack of tools that you've built. What kind of led to you creating those?"
  - speaker: S1
    text: "Well, kind of envy, I think. At the time, I was a typical Java guy, not paying attention to what was happening outside Java."
  - speaker: S1
    text: "In the meantime, the Ruby on Rails revolution took off. Back in 2007, I was on a Java project, but Rails was slowly introduced into the project."
  - speaker: S1
    text: "I picked up Ruby as a language, and then Ruby on Rails, and I saw that developing with Ruby on Rails was so much faster and better than developing anything we had in Java."
  - speaker: S1
    text: "It was like, okay, Ruby developers enjoy this fantastic framework. Why don't we have it in Java?"
  - speaker: M1
    text: "Okay, so you were thinking, how can I make something that's as quick to develop with? And that's where ActiveWeb came from?"
  - speaker: S1
    text: "No, that was not my immediate reaction. My immediate reaction was, great, somebody must already be developing this."
  - speaker: M1
    text: "Oh, okay. You wanted to see what was already out there."
  - speaker: S1
    text: "Yeah. I waited a couple years, from 2007 to 2009, but nothing like that came out. So I rolled up my sleeves and started developing ActiveJDBC first."
  - speaker: M1
    text: "Okay, so you started with the database layer first."
  - speaker: S1
    text: "Yeah."
  - speaker: M1
    text: "Was that mostly something you used for your own projects?"
  - speaker: S1
    text: "Oh no, no, no. From the very beginning, it was used on commercial projects."
  - speaker: S1
    text: "We were building a massive system for an insurance company, and we had two and a half months to start and finish a massive project."
  - speaker: S1
    text: "If we didn't have an agile tool, and if we had gone with something like Hibernate, it would have been difficult."
  - speaker: S1
    text: "At the time, I was managing a relatively small team. It was a team of four people plus myself."
  - speaker: S1
    text: "By the time we started the project, ActiveJDBC was already working, although not all features were there."
  - speaker: M1
    text: "Was it about 80 percent complete?"
  - speaker: S1
    text: "It was probably 80 percent of what we needed for that one project."
  - speaker: M1
    text: "Okay. So you had to implement the rest in real time."
  - speaker: S1
    text: "Yes. And it was really funny because, as a developer or architect, sometimes you architect things right, and sometimes you architect things the wrong way."
  - speaker: M1
    text: "Right."
  - speaker: S1
    text: "This one was architected right. When we hit the need for many-to-many relationships, we didn't have support for that in ActiveJDBC."
  - speaker: S1
    text: "My guys were like, 'Okay, back to Hibernate,' and I said, 'Wait, we're going to have it two days from now.'"
  - speaker: M1
    text: "Yeah."
  - speaker: S1
    text: "And we had it two days later."
  - speaker: M1
    text: "So it was battle-tested from the word go. You had the idea and immediately put it into production."
  - speaker: S1
    text: "Oh yeah. And by the way, the first implementation was for a crazy Oracle schema, so right there we hit a lot of problems."
  - speaker: M1
    text: "So is ActiveJDBC Oracle-specific?"
  - speaker: S1
    text: "No, no, no. It's not Oracle-specific. The next implementation was for MySQL, and then basically there isn't much difference between databases other than generating very specific queries for things like pagination."
  - speaker: M1
    text: "So how did you go about implementing all these adapters?"
  - speaker: S1
    text: "Basically I implemented Oracle, MySQL, PostgreSQL, and H2. Two dialects for Microsoft SQL Server were donated by the community."
  - speaker: M1
    text: "Okay. So by this point, it had already been released and was out in the wild."
  - speaker: M1
    text: "And by the way, what license is it under?"
  - speaker: S1
    text: "Apache."
  - speaker: M1
    text: "Apache. Okay. How did people outside your immediate community find out about it?"
  - speaker: S1
    text: "I didn't really make much effort to publicize it. I basically threw it onto Google Code, and that was it."
  - speaker: M1
    text: "I'm assuming that most people who found these projects had experience with Ruby on Rails and started Googling things like 'Active Record for Java.'"
  - speaker: S1
    text: "Yeah."
  - speaker: M1
    text: "So the similar wording was intentional because you wanted people to make that connection?"
  - speaker: S1
    text: "You mean ActiveJDBC?"
  - speaker: M1
    text: "Yeah."
  - speaker: S1
    text: "I was thinking about what to name this thing. I didn't particularly want a funny, made-up name."
  - speaker: S1
    text: "I thought ActiveRecord was a good name. It's also the name of a design pattern."
  - speaker: S1
    text: "So I took the word 'active' because, as opposed to passive objects in Hibernate, it's a lot more active."
  - speaker: S1
    text: "On the flip side, it's a very thin veneer on top of JDBC. So ActiveJDBC came about that way."
  - speaker: M1
    text: "So you started with ActiveJDBC. How did you come up with ActiveWeb? What was the impetus for that?"
  - speaker: S1
    text: "As soon as we implemented a massive back-end system for that company, we also had to implement about four portals."
  - speaker: S1
    text: "To be honest, implementing ActiveJDBC was a lot harder than implementing ActiveWeb. I always thought ActiveWeb would be harder."
  - speaker: S1
    text: "It turned out to be very easy to do."
  - speaker: S1
    text: "I had also implemented a number of other frameworks before then to make it easier for people to build web applications, so I already had experience doing that."
  - speaker: M1
    text: "Although those earlier frameworks didn't really go anywhere."
  - speaker: S1
    text: "Right."
  - speaker: M1
    text: "Why did you choose to make these open-source tools instead of bundling them up and selling them as commercial components?"
  - speaker: S1
    text: "Well, number one, I'm not a salesman."
  - speaker: S1
    text: "But the reality is I used so much from the open-source community, and I think that's where I learned a lot."

