youtube:
  title: "Igor Polevoy on ActiveJDBC, Ruby on Rails Influence, and Building JavaLite | UGtastic Interview"
  description: |-
    Mike Hall from UGtastic sits down with Igor Polevoy, creator of the JavaLite framework family, to discuss how the Ruby on Rails revolution influenced Java development in the late 2000s.

    Igor explains the origins of ActiveJDBC, ActiveWeb, HTTP Lite, and related JavaLite tools, including how production pressure on a large insurance project forced rapid framework development and real-world architectural decisions.

    Topics include:
    - Ruby on Rails influence on Java frameworks
    - Active Record vs Hibernate approaches
    - Building ActiveJDBC under production deadlines
    - Open-source development culture in the Java ecosystem
    - Oracle, MySQL, PostgreSQL, and SQL dialect support
    - Google Code era open-source distribution
    - Pragmatic architecture and framework design

    Speakers:
    - Mike Hall (UGtastic)
    - Igor Polevoy (JavaLite, ActiveJDBC, ActiveWeb)

    Recorded: October 15, 2012

    This interview captures a transitional period in software craftsmanship where Ruby on Rails heavily influenced developer expectations around productivity, simplicity, and framework ergonomics across multiple ecosystems.
