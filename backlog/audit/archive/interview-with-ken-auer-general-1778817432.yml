speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Ken Auer
    role: Founder of Role Model Software, Software Craftsmanship Pioneer, and Mentor
turns:
- speaker: M1
  text: "Hi, it's Mike with UGtastic again. Today I'm sitting down with Ken Auer. Ken has been a speaker in the object-oriented community for a very long time, and I first heard him talk at SCNA 2009. He talked about how he got into speaking, teaching, and mentoring through Role Model Software. He's also a devout Christian and carries that faith into his teachings and work. We'll talk about how Role Model Software came to be, his experiences with mentorship, and living an integrated life. Ken, thank you for talking to us today."
- speaker: S1
  text: "Glad to be here."
- speaker: M1
  text: "In 2009, at the first SCNA, you corrected my recollection about how you got started with OO. Can you tell me the real story of how you first encountered object-oriented programming?"
- speaker: S1
  text: "Sure. I was hired by a company called Paradigm in the 80s to build a network management system. We wanted a graphical user interface—the term 'GUI' hadn't even been invented yet, and the Mac had just come out. One of the marketing guys had read one of the few articles on object-oriented programming and suggested we look into it. We were computer science grads, but we'd never heard of it! We started studying and found out Smalltalk ran on the workstations we were using. We learned from the inventors of Objective-C at StepStone, who actually believed Smalltalk could never be commercial. We proved them wrong. At the same time, I was getting my Master's at night, and the academics were teaching OO in a way that had nothing to do with the real-world objects we were building. I finally stopped listening to the academics and poured my time into the technology itself."
- speaker: M1
  text: "And that led you to the early community, like the first OOPSLA conference?"
- speaker: S1
  text: "Exactly. The first OOPSLA was being formed that same year. I quickly met the Xerox PARC folks who wrote the Smalltalk books, as well as Kent Beck and Ward Cunningham. I realized that most academics didn't understand the practical application of objects. They talked about 'mathematical correctness,' but to me, a correct program was one that was useful and helpful to people. I got drawn into workshops on object-oriented design—a concept that didn't even exist yet. In 1987, Kent and Ward wrote a paper about patterns in programming languages. We talked about patterns for years before the Gang of Four book came out. Extreme Programming eventually grew out of that same practical application."
- speaker: M1
  text: "You found that many of the best people didn't even have CS degrees. How did that influence your teaching?"
- speaker: S1
  text: "I met people like Ward, who had an EE degree, and another great developer who was a history major. I realized most of them had mentors. Universities were teaching things backwards—performance first. Our mantra (Kent, myself, and others) was: 'Make it run, make it right, make it fast.' Performance comes last. I got into consulting for Knowledge Systems in the late 80s and found that CS degrees often got in the way of the paradigm shift. Mentoring and immersion were the most important factors. My own mentors were the guys who wrote the Smalltalk library; I spent my time reading their code because it was the only OO code on the planet."
- speaker: M1
  text: "You mentioned being a pioneer at age 25 with more OO experience than most people. How did that lead to formalizing mentorship?"
- speaker: S1
  text: "At Knowledge Systems, we needed to hire people, but nobody had more than two years' experience. We brought on Ignata Jakobson (Ivar Jakobson's daughter), and within three months, she learned more through immersion than she did in four years of college. We formalized this as the Smalltalk Apprenticeship Program. We'd take three people from a client, lock them in a room with one of our experts for six to ten weeks, and they'd come out as masters. I hadn't heard of any other software apprenticeship programs at the time; we just needed a way to package it for education budgets."
- speaker: M1
  text: "Then you founded Role Model Software and integrated it into your home life. How does that integrated lifestyle work?"
- speaker: S1
  text: "It's an integrated lifestyle. In the 90s, I was being trained in church leadership through a very intense discipleship program, and I was also learning about homeschooling for my daughter. I saw a pattern: when you live and work with people—the experienced teaching the less experienced through actual labor—education happens differently. Theory without application is just head knowledge; application without theory leads to shallow practices. At Role Model, I couldn't afford entitled college grads who didn't know objects, so I tried an experiment with a homeschooler, Nathaniel Talbott. It worked perfectly. He was soon outperforming developers with senior CS degrees. Now we have the Craftsmanship Academy to formalize those first few months of intense immersion in principles and TDD before they join our teams."
- speaker: M1
  text: "You're very open about your faith—the cross is in your logo and in your room. Has that 'integrated life' been a help or a challenge in a heterogeneous tech community?"
- speaker: S1
  text: "Christ is first in everything for me, including my work. It helps with integrity—if we say we'll do something, we do it. If we screw up, we admit it. I have a client who is a self-proclaimed Pagan, and he appreciates our honesty. Of course, some people are turned off by it. Some promote 'tolerance' but are very intolerant of people who don't share their secular worldview. I don't want to hide who I am. I want tolerance to go back to what it originally meant: freedom *of* religion, where a Muslim, a Jew, or a Pagan can work next to me in mutual respect. If we can get past our differences to work together, great. If we can't, we can't, but I won't change who I am."
- speaker: M1
  text: "I think that's the core of it—improving ourselves and each other through mentorship rather than getting hung up on one line of a posting. Ken, thank you for your time and for sharing your perspective on craftsmanship and community."
- speaker: S1
  text: "Thank you for the opportunity."
insights:
- statement: "The university model of computer science education often teaches engineering 'backwards' by prioritizing mathematical correctness and performance over the fundamental paradigm shift of object-oriented design and utility."
  type: durable
  confidence: high
- statement: "The core mantra of Software Craftsmanship is: 'Make it run, make it right, make it fast.' This emphasizes that clean design and correctness are prerequisites for performance optimization."
  type: durable
  confidence: high
- statement: "Immersion and mentorship are superior to academic instruction for high-stakes technical training; three months of professional immersion can produce higher-quality engineering output than four years of classroom theory."
  type: durable
  confidence: high
- statement: "The most effective practitioners in the early OO and Agile movements often came from non-CS backgrounds (e.g., History, EE), bringing a hunger for practical application and a reliance on mentorship rather than theoretical dogma."
  type: durable
  confidence: high
- statement: "True tolerance in a technical community is not 'freedom from religion' but 'freedom of religion,' where practitioners with disparate worldviews (Christian, Pagan, Muslim, etc.) collaborate based on mutual professional integrity and honesty."
  type: durable
  confidence: high
- statement: "The apprenticeship model is a natural, human way to learn; when teams reach a certain 'ambient temperature' of shared knowledge, the environment becomes a self-regulating machine where practitioners naturally support and grow each other."
  type: durable
  confidence: medium
youtube:
  title: "Make it Right, Then Fast: Ken Auer on the Roots of OO, Mentorship, and the Integrated Life"
  description: "Mike Hall sits down with Ken Auer, founder of Role Model Software and a pioneer of the Software Craftsmanship movement. Ken shares the 'real story' of his start in the 80s with Smalltalk and early GUIs, the friction between academic theory and practical object-oriented design, and why the apprenticeship model is the most effective way to train software engineers. They also discuss Ken's 'integrated life'—how his faith informs his business ethics and his view on true tolerance in the technical community."
  tags:
  - Software Craftsmanship
  - Object Oriented Programming
  - Smalltalk
  - Mentorship
  - Ken Auer
  - TDD
  - Software Apprenticeship
  - OOPSLA
  chapters:
  - timestamp: '00:00'
    title: "Introduction and the Roots of OO"
  - timestamp: '01:45'
    title: "Xerox PARC, Smalltalk, and the Early Pioneers"
  - timestamp: '03:30'
    title: "Make it Run, Make it Right, Make it Fast"
  - timestamp: '05:15'
    title: "The Failure of Academic CS for Practical Objects"
  - timestamp: '07:30'
    title: "Formalizing the Software Apprenticeship"
  - timestamp: '10:00'
    title: "Role Model Software: An Integrated Lifestyle"
  - timestamp: '12:30'
    title: "Faith, Integrity, and the True Meaning of Tolerance"
