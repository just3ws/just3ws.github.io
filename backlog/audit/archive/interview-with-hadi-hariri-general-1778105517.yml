speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Hadi Hariri
    role: Developer Evangelist at JetBrains

turns:
  - speaker: M1
    text: "Hi, it's Mike Hall again here with UGtastic. Today I'm coming from GOTO Chicago. I'm sitting down with Hadi Hariri, who is a developer evangelist with JetBrains, and one of the talks he was going to be giving today is on being an antisocial geek is harmful. Which, I think, is actually very thematic for what UGtastic is, trying to support people who participate in the community and get out from behind the desks. So, thank you again for sitting down with me. What is an antisocial geek, if we don't already know what it is, and why is it harmful?"
  - speaker: S1
    text: "It's not that we're antisocial. I mean, if you define antisocial as someone that wants to disrupt and be aggressive towards others and their rights, we're not. We're antisocial in the sense of we're not really into socializing as much as other people."
  - speaker: M1
    text: "It's not misanthropic, it's just going for it."
  - speaker: S1
    text: "A little bit, yeah. So, the talk is more about communication and interaction. It's more about the experience that I've had over the 20-plus years of interacting with different developers, with different teams, having run my own company and seeing the problems that communication or lack of it causes between developers and teams."
  - speaker: S1
    text: "Often you find in our industry, it's become common to say that developers are introverts. Developers don't mind him, 'Steve is great at developing but you can't really talk to him.'"
  - speaker: M1
    text: "Right."
  - speaker: S1
    text: "And I think that we are ignoring this and we're kind of accepting that you can't talk to Steve, as opposed to trying to find out why you can't talk to Steve. Find out why there's so much friction when you're talking to certain people. What happens is that we end up with teams where certain individuals are isolated."
  - speaker: M1
    text: "Mm-hmm."
  - speaker: S1
    text: "And I feel that impacts the team, it impacts the code, it impacts the company, it impacts the goals, everything."
  - speaker: M1
    text: "And just happiness."
  - speaker: S1
    text: "Happiness. That you're kind of pigeonholed into this, 'you're a developer therefore you don't want to talk to anybody.' 'You're a developer therefore you just want to sit in a dark room.' I've seen this culture of we all sit in a dark room and nobody talks. And then we all go out to lunch and then everybody just chat, chat, chat, chat."
  - speaker: M1
    text: "Mm-hmm."
  - speaker: S1
    text: "Which kind of leads me to believe is that people actually do want to talk and they do want to share. But we have this stigma or this preconceived notion the way we're supposed to act."
  - speaker: M1
    text: "Yeah, it's a myth that developers are introverts."
  - speaker: S1
    text: "What we don't like, and I've discussed this in my other talk, the Prima Donna one, is that we don't like small talk."
  - speaker: M1
    text: "Mm-hmm."
  - speaker: S1
    text: "And when I gave that talk, someone said to me, 'What do you have against the language Smalltalk?'"
  - speaker: M1
    text: "No. It just proved my point."
  - speaker: S1
    text: "Yeah, exactly! We don't like small talk. We love to debate. We love to just sit there and debate things on end and bring out points and make sure that we have the last point and we're right. Sometimes we don't realize that it's time to back off. We miss the big picture. I kind of feel it's these skills that often we're lacking."
  - speaker: M1
    text: "Yeah."
  - speaker: S1
    text: "I think that it's very good for developers to work in technical support, because you learn to deal with customers. You learn to know when to back off. You know when to concede, to say, 'Okay, well, you're wrong, but I'm not gonna tell you you're wrong because of this.' Because in the end, it's just not worth the battle."
  - speaker: S1
    text: "And what happens is that with teams, when you're with someone that is constantly trying to prove his point, it ends up that you're just like, 'Okay, well, just do whatever you want.' And that 'do whatever you want' can impact your product."
  - speaker: M1
    text: "Recently I've had to work in a non-developer role, dealing with HR people. Seeing how different it is... because developers tend to talk amongst other developers differently than in human resources where it's very much not as rigid as development. The mode of conversation is much different, and I'm struggling to figure out how to adapt."
  - speaker: S1
    text: "It is because we try and apply our coding principles to our conversations. Like, 'DRY.' 'Oh, why do I have to repeat myself?' Or, 'Say the minimum possible for it to be efficient.' Ultimate efficiency when we speak. And sometimes it's not about efficiency, right? Sometimes it truly is about talking about the weather or some nonsense to break the ice, to try and understand the other person."
  - speaker: S1
    text: "And that's one other thing that I feel is lacking a little bit in the developer world, which is conveying emotions. We don't have a lot of empathy often. You've been involved in open source, right? Recently a lady put up some code on open source, and there was a massive backlash on Twitter. Like, 'who would put up rubbish like this?' When high-profile people put things like that, it hurts people. We don't think about how our actions in the goal of saying that something is 'right' or 'wrong' can end up hurting other people."
  - speaker: M1
    text: "It sounds like more of an underused empathy muscle. We can relate to each other, but many haven't developed that skill dealing with other people. For instance, getting developers who've been at a company for seven months to talk to a new hire. They think, 'I don't know enough to give useful information.' They don't remember how to empathize with what it was like to be that new person."
  - speaker: S1
    text: "Yeah."
  - speaker: M1
    text: "As a developer evangelist, you have to deal with a lot of people. Is this talk coming from your experiences dealing with so many varied communities?"
  - speaker: S1
    text: "Well, I'm not going to badmouth the developer community, because I'm still a developer myself. But I work at a lot of conferences, stand at a lot of booths, and see that often it's hard to engage conversation because people are shy to come up and ask what you do. But more than as an evangelist, it's been my experience with teams that I've worked on. The root problems they're having in teams."
  - speaker: S1
    text: "I learned to deal with people more openly a lot when I was dealing with customers. Customer support is one of the best things that developers should do. I've done technical support in an ISP, where the guy would call and say 'I can't send email', and I'd say 'are you connected to the internet?', and he'd say 'I don't want to go to the internet, I want to send email!' You have to learn to deal with that."
  - speaker: M1
    text: "And it gives you patience."
  - speaker: S1
    text: "It gives you patience, and it teaches you how to talk to people, because you can't hang up the phone and say 'you're too stupid to send an email.' You can't."
  - speaker: M1
    text: "And the thing is, again, it goes to empathy, remembering that once upon a time, you did not know what the internet was."
  - speaker: M1
    text: "This reminds me of an experience in the military dealing with new recruits asking which jobs they were taking. One was going to language school, one an MP, and another said 'I'm just going to be a truck driver.' It took me back. She forgot that she was going to be providing a very valuable service. When we're looking from our ivory towers with our fancy software engineering titles, we forget that we couldn't do this without the truck driver who carries the computers."
  - speaker: S1
    text: "Exactly. If that customer didn't call in, we wouldn't even be able to exist. Much like the truck driver, you couldn't have an infantry without having the trucker who brings the supplies. All the factory workers putting the chips together."
  - speaker: M1
    text: "It's part of an ecosystem. Just be more aware."
  - speaker: S1
    text: "I definitely think we all need to be a little bit more humble. We all need to come back down to earth and think about what we are doing as part of the global picture. There was an article recently on Forbes comparing developers to Hollywood. Are we the Lindsay Lohan or the Meryl Streep of Hollywood? Are we in this startup business of getting venture capital and cashing out quick, or are we there to change the world and grow a business steadily? I often find that we're moving towards that big hotshot Hollywood kind of thing."
  - speaker: M1
    text: "Yeah, the rock star, the ninja."
  - speaker: S1
    text: "Yeah, the ninja, the rock star. It's all that desire to put ourselves up on a higher pedestal instead of realizing we're part of an ecosystem and we can't do these things without each other."
  - speaker: M1
    text: "And that's one of the reasons I wanted to support user group organizers and conference organizers—the people that bring people together. To help expose them and realize that we're in this together and it's more fun to do it together than to do it alone. Everyone plays a role."
  - speaker: S1
    text: "Everyone is important."
  - speaker: M1
    text: "Well, thank you very much for taking the time to stay with me, Hadi. I really appreciate it."
  - speaker: S1
    text: "It was a pleasure. Thank you."

insights:
  - statement: "The perception of software developers as natural 'introverts' is often a myth that masks deeper communication friction and a reluctance to engage in 'inefficient' small talk."
    type: durable
    confidence: high
  - statement: "Applying strict software principles like DRY (Don't Repeat Yourself) or 'ultimate efficiency' to human conversation actively damages team cohesion and empathy."
    type: durable
    confidence: high
  - statement: "Working in customer support is one of the most effective ways for a software engineer to build patience, de-escalation skills, and essential empathy."
    type: durable
    confidence: high
  - statement: "The aggressive pursuit of being 'right' in technical debates often damages long-term team dynamics; senior engineers must learn when to concede a point to preserve relationships."
    type: durable
    confidence: high
  - statement: "The 'Rockstar' or 'Ninja' developer culture creates an elitist 'Hollywood' dynamic that detaches engineers from the broader, interdependent ecosystem of the business."
    type: time-bound
    confidence: high

youtube:
  title: "Empathy Over Efficiency: Hadi Hariri on the Myth of the Antisocial Developer | UGtastic"
  description: |-
    JetBrains Developer Evangelist Hadi Hariri joins Mike Hall at GOTO Chicago to challenge the enduring myth of the "antisocial introvert" developer.

    Hadi explains why developers actually love to talk, but struggle with communication because they inappropriately apply coding principles like DRY (Don't Repeat Yourself) to human interactions. He discusses why every developer should work in customer support to build empathy, the danger of toxic technical debates, and why the "Rockstar/Ninja" developer culture is creating an elitist divide in the tech industry.

    Key Topics:
    - The myth of the introverted developer.
    - Why engineers hate small talk but love endless debate.
    - Applying the DRY principle to human conversation (and why it fails).
    - Empathy deficits and toxic behavior in open source.
    - Why working customer support builds essential engineering skills.
    - The "Hollywood" problem: Rockstar and Ninja developer culture.

    Speakers:
    - Mike Hall (UGtastic)
    - Hadi Hariri (Developer Evangelist, JetBrains)

    Recorded: May 2014 at GOTO Chicago.
  tags:
    - Hadi Hariri
    - JetBrains
    - Software Craftsmanship
    - Developer Culture
    - Empathy
    - Communication Skills
    - Open Source
    - GOTO Chicago
    - Tech Careers
    - Customer Support
    - Mike Hall
    - UGtastic
