speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: David Heinemeier Hansson (DHH)
    role: Creator of Ruby on Rails
turns:
- speaker: M1
  text: "User groups with lots to say, interviews and more, no way! Sharing great ideas in the tech community. Fascinating conversations, a plethora of information. Find out for yourself today at UGtastic.com. Hi, it's Mike with UGtastic. I'm here at RailsConf 2014 and I'm standing here with DHH, David Heinemeier Hansson. If you might know him, he's written a few books, done a few stuff. I think you have something to do with the product that we're here for the conference about, but we're going to talk about his keynote that he just gave about clarity and being a software writer. Well, first of all, I want to say thank you very much for taking the time to talk with me."
- speaker: S1
  text: "Sure."
- speaker: M1
  text: "So your keynote, what was the gist of what you were trying to communicate?"
- speaker: S1
  text: "Sure, so I think the identity of most programmers are coming from an age where they're trying to do a lot of work. And I think that's the angle that doesn't fit the development of information technology very well anymore. And that angle is software engineering. I think there's a lot of programmers who create information systems where engineering is actually not the primary thing that they do. What they do is they write. They're software writers. They're trying to achieve a level of clarity, figuring out, first of all, what are they building? It's not like a bridge where you just know, well, it needs to go from there to there, and we need to have this structural bearing, and so on and so forth. A lot of systems are very big, and they're very vaguely defined, right? So figuring out what you want to build is very much like figuring out what you want to say."
- speaker: M1
  text: "Right. It's more elastic than just go from here to there."
- speaker: S1
  text: "It is. And it's more fuzzy, and it's not as objective. It's a much more subjective endeavor. And I find that writing is a much better metaphor than engineering. And within that, I find that one of the main ways that people are driving their development right now is TDD, test-driven development. And I used to be a big fan because it sounded like it made a lot of sense to me."
- speaker: M1
  text: "Right."
- speaker: S1
  text: "What I found over the years is that the test-first approach, driving your design through the test, actually didn't make that much sense to me. And I found that a lot of other software that I looked at and discussed with people who sort of--that was created through the test-first paradigm wasn't better. It was worse."
- speaker: M1
  text: "And what's interesting, though, is it seems like Rails was very early on in the whole test-driven development and putting that out there and even introducing it as a concept. But now, 10 years later, you're feeling like you're backing away from that original--"
- speaker: S1
  text: "Yeah. So I think Rails was probably the first framework that just had tests by default. We had a place to put the test. We generated them through the scaffolds per default. And I think there's still a lot of good to that. It's not that tests are bad. I can't imagine building a modern application today without tests. Without automated tests, you're really in the woods. But I don't find it as the primary objective of my design discipline."
- speaker: M1
  text: "Right. It's a little bit more nuanced than that."
- speaker: S1
  text: "It's more nuanced than that. And mostly, it's just test-first works for me for a tiny majority of the cases of what I do. And for a majority of the cases, test-first, especially when focused on the unit instead of the whole system, actually ends up creating more problems than it solves."
- speaker: M1
  text: "Okay. And it sounds like you've developed a more nuanced approach. And it seems like some of the interactions with people in the community is a little bit more dogmatic one way or the other. Other people are kind of taking a cheeky stance of, 'Ah, test-driven development, that's silly.' And then there's the other side, the Bob Martin camp, which is clean code. You even kind of had a little shot at the dirty code there, a slide. But, you know, listening to your conversation, it's a little bit different."
- speaker: S1
  text: "It's a little bit different. I mean, if you're talking in person versus observing conversations online, it sounds like some of that meaning, that nuance is lost sometimes. Sure. I mean, anything on Twitter is void of nuance. You have 140 characters. The only thing you can put out is absolutes. And they can be influential in sort of starting the discussion and driving it. It won't get it all to nuance. You have to go deeper than just 140 characters, of course."
- speaker: M1
  text: "Has the ping-pong helped with that?"
- speaker: S1
  text: "I think the ping-pong helped me crystallize my thoughts on it a bit. And the ping-pong, basically for people who don't know, was sort of people submitting a piece of code. I did that on Hacker News a few times, and then there was some guy who set up a site for it. And we went over where this code could go. Like, we agreed that the original piece of code was bad, and then people would ping-pong on it. Some people would then say, 'Oh, well, the code is bad because it's in the pattern or it's not easily testable,' or whatever. And I would try to go in a different direction, where whenever I applied this ping-pong, it was about clarity. I'm going to make this code clearer, simpler, easier to understand, lower conceptual overhead, all these things, right? And I find out I ended up in a very different spot, right? So that's what partly helped me, informed me, is that we are going in different directions. You end up somewhere else when you go through test first than when you go through clarity first. I don't want to call it that, because I certainly don't want to have anything, like, clarity-driven about it. It sounds ridiculous."
- speaker: M1
  text: "Well, I talked to Dan North, and it's the same kind of thing, where they start with an idea, and then it becomes dogma by all the people who adopt it. And then they want to have that rigid --"
- speaker: S1
  text: "I think that's what the -- I had a quote by Kent Beck that's incredibly reasonable. It talks about sort of confidence levels in your code. More so than just talking about, well, every piece of code needs to be written with a test failing first. I think it's just not -- I don't know if it's not realistic, because I'm sure it's the real stuff for somebody. It's certainly not realistic for me. It doesn't arrive at something better. I tried very hard, multiple times, and I didn't find that it took me to a good place."
- speaker: M1
  text: "And the one thing I see with the ping pong is at least it gives a concrete A and B that can be talked about and reasoned about."
- speaker: S1
  text: "Yes. Before after code is -- I'm really a big fan of that, because it crystallizes a lot of arguments that are otherwise very fluffy. It's very easy to talk about these things in the abstract. I think clarity -- it's almost impossible to talk about it in the abstract, because everybody agrees. Yes, of course we should have clear code. It's not a controversial term, but when you apply it to an actual piece of code, then it can -- quite quickly, it can become controversial."
- speaker: M1
  text: "Right. Okay. So, you know, I wanted to ask a few questions. Some people have contributed ideas for topics. One of those was about just your experience releasing Rails as a major project, and that it gets used by companies that make billions of dollars. And it gives back even a fraction of what they -- How have you dealt with that? I mean, it doesn't sound like you're doing too shabby, but not billions of dollars shabby."
- speaker: S1
  text: "No, no. And I don't need to. And it doesn't bother me at all, actually. There are a lot of people who do feel like, well, they're owed something because they contribute to open source. I think that's an unfortunate perspective to have on what you're doing. If you're doing it for external reasons and external rewards, that's not where I'm doing it. I'm doing it for my own reward. A big part of my own reward is just that I enjoy it. I'm not doing it for somebody else to sort of land me a payday out of it. And I enjoy sharing it. And a side effect of sharing it freely and letting people use it like they want to -- like, I wouldn't want to use anything -- is that some people could choose to use it to build great things that are of great value, and I don't see any of that value. That's okay. I mean, I think that's where open source -- like, I'm a big proponent of open source, but there's a side of open source that I'm not that enthusiastic about. And GPL, to some extent, is that side of it. I am not that enthusiastic about roping people into -- you have to either donate code or money or whatever just because you use something. That doesn't appeal to me, especially on the code part. I don't want the code of somebody who doesn't want to give it. Like, that's going to be, in my perspective, probably not very good code. And so what? Like, I don't care if somebody extends it. If I need something in Rails I don't have already, I'll build it my damn self."
- speaker: M1
  text: "Right. And, you know, actually that -- since you brought up the GPL, that was going to cover another question. But I do want to ask about -- so Rails is open source, and all of the libraries that are used by it are also part of Rails or open source, you know, omakase-selected gems. But Rails itself, that's a trademark. And I didn't think about this until just now, is that there does seem to be a line between the code's out there, and you can use it, but the brand itself. And has that helped keep Rails on Rails?"
- speaker: S1
  text: "I think it helps keep Rails being this one thing. It's very easy to dilute it. In the early days we had a lot of people actually calling their frameworks in other languages Rails. And that's not a great thing. Like, I'm making Rails with a certain mission, with a certain approach to it, and I want people to be able to know what that is. I don't want people to pick something else up that says Rails. They think it's something that I made, and then it's some PHP framework that I really wouldn't want to touch with a 10-foot pole, right? So I think trademarks are good in sort of removing confusion. So, I mean, that's what they're there for, right? They're there for just that, like, a certain company or a certain product, they can be that thing, right? Like, Coca-Cola can sell their cola, and it's called Coca-Cola. And somebody else can't sell their cola and call it Coca-Cola because the consumer would get confused. I think there's great value in that. You can certainly go overboard, and people do that all the time. And some of that is, unfortunately, part of what trademark law is, that you have to sort of enforce it. Otherwise, you lose it."
- speaker: M1
  text: "That's tricky to keep that balance. It's turning people off."
- speaker: S1
  text: "Yeah. For me, the whole thing about keeping Rails as a trademark is just avoiding that confusion. Not avoiding people. I just -- I don't want somebody to represent me. I want somebody to be representing the official Rails if it's not something that I believe in. Because that's going to reflect poorly on me. So that's the reason we have it. We haven't really used it for anything else. There's incredibly little economic value being derived from it. It's protecting what Rails is."
- speaker: M1
  text: "Okay. And another question, you know, we talked about the GPL, but what are your feelings about companies whose business practices you don't necessarily agree with, though, using Rails?"
- speaker: S1
  text: "To me, it's like I'm also paying my taxes, and some of those taxes go to paved roads, and some people who drive on those roads I don't agree with. So what? Like, it really doesn't matter. I can completely distinguish between sort of technical aspects of what somebody's doing and then their otherwise business practices. So to me, there's definitely no sort of conflict in calling out companies who I think have poor business practices, whether they're using Rails or not. But I mean, when they come out and they say, 'Oh, we're a Rails shop,' and you're like, 'I wish you didn't say that,' you know? To me, it's like Rails is open to us. It's MIT. You can take it. You can do whatever you want with it. I'm not responsible for anybody who uses Rails, what they do with it, with the individual members of sort of the Rails community. I don't want that police role. This is not a hierarchy in that sense. I don't want anybody who uses Rails as my employee, and I have to be responsible for anything they say on behalf of Rails. Just because somebody uses Rails doesn't mean that they're expressing thoughts on behalf of me. That's not how this is. That's explicitly why this is MIT. Take and do whatever you want with it. Like, no strings attached, right? Because then there's not that obligation for me to police everybody who uses it and how they use it or whether they're good people or they're bad people or whatever. It's a separate thing. And I don't want that as being part of what goes into Rails. It's enough sort of on my shoulders just to run Rails as the vision of the framework and so on. If I also had to be responsible for anybody who chooses to use it and what they do, I'd fuck that."
- speaker: M1
  text: "Okay. And the last one is a little bit more of a fun question and relative to the theme of UGtastic. And that was during your keynote even you mentioned going as a young boy to see The Gathering grouping back in Denmark. But just to go back in time to when you first were extracting Rails from Basecamp... you wanted to show it to people and you wanted to get people to look at it and check it out. And you would go into user groups. What was the first other user group or conference you presented Rails? And what was the reception?"
- speaker: S1
  text: "I think I actually first showed it off to some friends who were working at a couple of different companies. And I got like, oh, yeah, that sounds interesting. Not a whole lot of feedback to it. And then I showed it off at a Danish university. And at the university itself, I don't know, maybe 30 people or 40 people. Like, yeah, people were interested. But it was getting the video up that really made people interested in getting it out online. Just meeting with a local group of people didn't really do that much in the beginning. Where I found like-minded people were all over the internet. I posted a video and somebody wrote me. And like, oh, this is really interesting. I want to learn more about this. At that time, I was also on the Ruby mailing list. I was participating a fair amount in that. We were talking on there. And IRC. I was usually in IRC. So for me, it was always about the virtual groups, not so much about meeting in person. Even though that's great, too. I mean, that's what we're doing here at RailsConf, 1,500 people. It's great to do that occasionally. But the bulk of the sort of real work happens remotely. It happens for people just working for wherever they are. Because when you look at the Rails core group and the alumni group, they're from all over the place. They're from all sorts of different countries and different cities and so forth. And if I just had to run Rails just out of the programmers available in Copenhagen, I mean, no offense to the programmers in Copenhagen, but of course, it wouldn't be as good. Like having the whole world work on something versus having one city and one tiny country. Not the same thing."
- speaker: M1
  text: "And I remember that video coming out. I was actually a Microsoft developer at the time. And I didn't like it. But at that point in my life, my career options were limited. And I just remember seeing that and going, that's cool. I want to work with that someday. And now I do. So I appreciate the creation and the work. And it's very nice. Now I gushed. And now I forgot what I was going to say. But I just want to thank you. I know you're busy. You have to go. Thank you very much."
- speaker: S1
  text: "It's my pleasure. Absolutely. Thanks. I love talking about it."
insights:
- statement: "Writing is a better metaphor for software development than engineering; developers are often 'software writers' tasked with achieving clarity in vague domains rather than building rigid bridges."
  type: durable
  confidence: high
- statement: "Test-Driven Development (TDD) works for a minority of cases, but driving design strictly through test-first approaches—especially at the unit level—often creates more problems than it solves and can lead to worse design."
  type: durable
  confidence: high
- statement: "Code ping-pong (exchanging before-and-after code snippets) is a highly effective way to crystallize technical arguments, moving debates from abstract ideology to concrete discussions of clarity."
  type: durable
  confidence: high
- statement: "Open source contribution under the MIT license is a personal reward and should not come with the burden of policing the moral or business practices of the companies that use the code."
  type: durable
  confidence: high
- statement: "Trademarks in open source are valuable for preventing brand dilution and consumer confusion, ensuring that a framework's name accurately reflects its creator's mission and standards."
  type: durable
  confidence: high
- statement: "The success of Rails was driven by the global reach of the internet (videos, mailing lists, IRC) rather than local user groups, demonstrating the power of borderless collaboration."
  type: durable
  confidence: high
youtube:
  title: "Clarity Over Engineering: DHH on the Stewardship of the Ruby on Rails Ecosystem | RailsConf 2014"
  description: "Mike Hall sits down with David Heinemeier Hansson (DHH), creator of Ruby on Rails, at RailsConf 2014. They discuss the concept of developers as 'software writers,' DHH's evolving views on Test-Driven Development (TDD) versus code clarity, the complexities of open-source stewardship, and the role of trademarks in protecting the Rails brand."
  tags:
  - DHH
  - Ruby on Rails
  - Software Architecture
  - Test-Driven Development
  - Open Source
  - Software Craftsmanship
  - RailsConf 2014
  chapters:
  - timestamp: '00:00'
    title: Introduction and Keynote Themes
  - timestamp: '01:00'
    title: Programmers as Software Writers
  - timestamp: '02:00'
    title: The Limits of Test-Driven Development
  - timestamp: '04:15'
    title: Code Ping-Pong and Clarity
  - timestamp: '06:00'
    title: The Burden of Open Source Expectations
  - timestamp: '08:00'
    title: Protecting the Rails Trademark
  - timestamp: '09:30'
    title: The Global Reach of the Rails Community
