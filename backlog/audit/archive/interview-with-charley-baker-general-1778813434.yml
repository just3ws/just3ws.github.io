    title: "Introduction and Denver Community Observations"
  - timestamp: '01:30'
    title: "Community as a Recruiting Engine"
  - timestamp: '03:00'
    title: "Reducing Friction: Scheduling and Cross-Pollination"
  - timestamp: '05:00'
    title: "The Ruby vs. .NET Community Builder Gap"
  - timestamp: '07:00'
