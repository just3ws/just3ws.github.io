speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Kresten Thorup
    role: Lead Organizer of GOTO Conference, Co-founder of Trifork
turns:
- speaker: M1
  text: "Hi, it's Mike again with UGtastic. I'm still here today at GOTO Chicago 2013. I'm sitting down with one of the lead organizers, Kresten Thorup. He hasn't kicked me out yet, so we're doing pretty good. Thank you for sitting down with me, Kresten."
- speaker: S1
  text: "Thanks for having me."
- speaker: M1
  text: "I interviewed David Bo d'Aro (I hope I said that correctly) when he was first here scouting Chicago as a possible location for GOTO. A lot has happened since then. Can you tell me the backstory of why you chose Chicago and how you got involved in running GOTO?"
- speaker: S1
  text: "I'll start with how I got involved. My company, Trifork, has been organizing conferences for many years. It started as a way to do our own continuous lifelong development and learning, and then sharing that with our local community. Imagine a small company in a faraway country that couldn't afford to fly all its employees to fancy conferences abroad. Back then, there weren't many good practitioner conferences—it was either very academic or marketing-heavy trade shows. We wanted a conference in that middle space, so we decided to make our own."
- speaker: M1
  text: "Was it called GOTO from the start?"
- speaker: S1
  text: "The very first year it was called the 'Scandinavian Java Technology Conference.' We quickly transitioned to JAOO (J-A-O-O) because we were a Java shop and it was the era of the 'object revolution' in the mid-90s. We eventually rebranded to GOTO as a more generic and international name. It's also a nice play on 'Go to Chicago' or 'Go to wherever,' and it makes me the 'Go-To' guy."
- speaker: M1
  text: "Organizing these must be a great way to see things you don't necessarily work on every day."
- speaker: S1
  text: "Exactly. It's a great way to meet people—customers, partners—in a positive, learning-focused environment. It broadens your scope and keeps you on top of trends. There are so many things you can do when you bring a community together like this."
- speaker: M1
  text: "Well, thank you very much, Kresten, for taking the time to speak with me. It's fascinating."
- speaker: S1
  text: "Absolutely. Thank you."
insights:
- statement: "The GOTO Conference (formerly JAOO) originated from a pragmatic need for 'continuous lifelong development' for a small company in Denmark that couldn't afford to send all its employees to expensive international conferences."
  type: durable
  confidence: high
- statement: "Technical conferences in the mid-90s were often bifurcated between purely academic venues and marketing-driven trade shows; GOTO was built to occupy the 'practitioner' middle ground."
  type: durable
  confidence: high
- statement: "The rebranding from JAOO to GOTO was a deliberate shift from a technology-specific focus (Java) to a more generic, international brand capable of scaling across different technical ecosystems and geographies."
  type: durable
  confidence: medium
- statement: "Organizing technical conferences provides unique business value by creating a 'positive vibe' learning environment where developers can meet customers and partners outside of traditional sales contexts."
  type: durable
  confidence: high
