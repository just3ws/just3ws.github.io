  title: "The Practitioner's Middle Ground: Kresten Thorup on the History and Evolution of GOTO Conference"
  description: "Mike Hall sits down with Kresten Thorup, a lead organizer of the GOTO Conference series. Kresten shares the origin story of the conference—from its early days in Denmark as JAOO to its international expansion. They discuss why Trifork decided to build their own learning platform for developers and the importance of creating a space for practitioners that bridges the gap between academia and marketing."
