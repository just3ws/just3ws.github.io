  profile_summary: Dr. Parsons has more than 20 years of application development experience
    in industries ranging from telecommunications to emergent internet services. She
    has been published in language and artificial intelligence media, served on numerous
    program committees, and currently reviews academic articles for several journals.
    Before coming to ThoughtWorks she worked as an assistant professor of computer
    science at the University of Central Florida. She also worked as director's post
    doctoral fellow at the Los Alamos National Laboratory researching issues in parallel
    and distributed computation, genetic algorithms, computational biology and non-linear
    dynamical systems. Dr. Parsons holds a [Ph.D] in Computer Science from Rice University.
