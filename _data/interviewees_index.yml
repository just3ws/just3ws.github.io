  profile_summary: 'Dean Wampler is the Big Data Architect at Typesafe and specializes
    in the application of Functional Programming principles to &ldquo;Big Data&rdquo;
    applications, using Hadoop and alternative technologies. Dean is a contributor
    to several open-source projects and the founder of the Chicago-Area Scala Enthusiasts.
    He is the author of Functional Programming for Java Developers, the co-author
    of Programming Scala, and the co-author of Programming Hive, all from O&rsquo;Reilly.
    He pontificates on twitter, @deanwampler, and at polyglotprogramming.com. Twitter:
    @deanwampler'
