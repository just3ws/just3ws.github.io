      url: https://gotocon.com/chicago-2015/presentation/Beyond%20JVM%3A%20How%20the%20platform%20is%20evolving%20for%20new%20languages%20and%20features
      embed_url: ''
      description: The JVM has traditionally hosted many languages, but only those
        closest to Java itself got the full optimization treatment. Those days are
        changing rapidly with new JVM features like invokedynamic and lambda, and
        with the rise of new frameworks like Truffle and Nashorn. In this talk we'll
        explore what it takes to optimize more exotic languages like JavaScript and
        Ruby and see how the JVM is evolving to do a better job. We'll see how projects
        like JRuby and Nashorn are trying to work around gaps in the JVM's optimizer.
        We'll see how JRuby+Truffle routes around the JVM to achieve blistering fast
        performance. And we'll look at upcoming projects on the JVM that will make
        language-building even easier.
