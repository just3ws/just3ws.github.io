- slug: charles-nutter
  name: Charles Nutter
  count: 1
  sample_interview_ids:
  - interview-with-charles-nutter-goto-chicago-2015-general
  interview_ids:
  - interview-with-charles-nutter-goto-chicago-2015-general
  profile_summary: 'Charles has been programming most of his life, as a Java developer
    for the past decade and as a JRuby developer for over six years. He co-leads the
    JRuby project, an effort to bring the beauty of Ruby and the power of the JVM
    together. Charles believes in open source and open standards and hopes his efforts
    on JRuby and other languages will ensure the JVM remains the preferred open-source
    managed runtime for many years to come. Twitter: @ headius &nbsp; &nbsp;'
  bio_links:
  - label: 'GOTO Chicago 2015 Speaker Bio: Charles Nutter'
    kind: conference-bio
    url: https://gotocon.com/chicago-2015/speaker/Charles+Nutter
    embed_url: ''
    description: 'Charles has been programming most of his life, as a Java developer
      for the past decade and as a JRuby developer for over six years. He co-leads
      the JRuby project, an effort to bring the beauty of Ruby and the power of the
      JVM together. Charles believes in open source and open standards and hopes his
      efforts on JRuby and other languages will ensure the JVM remains the preferred
      open-source managed runtime for many years to come. Twitter: @ headius &nbsp;
      &nbsp;'
  presentation_links:
  - label: 'GOTO Chicago 2015 Presentation Page: Beyond JVM: How the platform is evolving
      for new languages and features'
    kind: conference-presentation-page
    url: https://gotocon.com/chicago-2015/presentation/Beyond%20JVM%3A%20How%20the%20platform%20is%20evolving%20for%20new%20languages%20and%20features
    embed_url: ''
    description: The JVM has traditionally hosted many languages, but only those closest
      to Java itself got the full optimization treatment. Those days are changing
      rapidly with new JVM features like invokedynamic and lambda, and with the rise
      of new frameworks like Truffle and Nashorn. In this talk we'll explore what
      it takes to optimize more exotic languages like JavaScript and Ruby and see
      how the JVM is evolving to do a better job. We'll see how projects like JRuby
      and Nashorn are trying to work around gaps in the JVM's optimizer. We'll see
      how JRuby+Truffle routes around the JVM to achieve blistering fast performance.
      And we'll look at upcoming projects on the JVM that will make language-building
      even easier.
  - label: 'GOTO Chicago 2015 Talk Video: Beyond JVM: How the Platform is Evolving
      for new Languages & Features'
    kind: conference-presentation-video
    url: https://www.youtube.com/watch?v=0cpGFO6-giU
    embed_url: https://www.youtube.com/embed/0cpGFO6-giU
