positions:
  - id: onemain
    summary: >-
      Owned architecture, production health, and systemic risk for a
      revenue-critical acquisition platform in a regulated financial environment.
    highlights:
      - >-
        Acted as the final escalation point for high-severity production incidents,
        taking ownership of live diagnosis during large cross-functional calls.
      - >-
        Transformed incident response into institutional learning.
      - >-
        Reconstructed end-to-end customer acquisition flows by mapping execution
        context from the customer’s browser through application layers and
        downstream business systems.
      - >-
        Designed and delivered a re-architecture of session state handling across
        complex, multi-step user workflows.
      - >-
        Founded and led the OpenTelemetry Working Group, establishing shared
        observability standards.
      - >-
        Created an enablement function to isolate cross-cutting platform, risk,
        and remediation work from feature delivery.

  - id: sk-holdings
    summary: >-
      Stabilized and modernized a shared Rails platform supporting multiple
      digital properties, millions of users, and high-volume data flows.
    highlights:
      - >-
        Modernized and upgraded large portions of the Ruby and Rails stack across
        multiple applications.
      - >-
        Expanded operational visibility by introducing centralized logging and
        monitoring.
      - >-
        Designed and built data pipelines synchronizing millions of records
        between internal systems and third-party services.
      - >-
        Led data-layer remediation efforts by replacing expensive dynamic queries
        with Materialized Views.
      - >-
        Migrated session and cache workloads from MySQL to Redis.
      - >-
        Optimized CI pipelines by reordering and parallelizing test execution.

  - id: benchprep
    summary: >-
      Improved correctness, performance, and security for enterprise assessment
      workflows where calculation accuracy and response integrity were business-critical.
    highlights:
      - >-
        Diagnosed and eliminated assessment calculation errors by analyzing and
        optimizing critical PostgreSQL queries using EXPLAIN ANALYZE and query
        planning tools.
      - >-
        Implemented JWT-based response verification to prevent tampering and
        enforce once-only processing of assessment submissions.
      - >-
        Designed and built a secure cross-origin communication API to support
        embedded client applications.
      - >-
        Reduced operational risk by identifying and resolving performance
        bottlenecks affecting high-concurrency assessment workflows.

