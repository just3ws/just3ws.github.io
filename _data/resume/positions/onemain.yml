company:
  name: OneMain Financial
  location: Remote

title: Associate Director, Staff Engineer
type: Full-time

start_date: January 2021
end_date: February 2026

context: >-
  Owned architecture, production health, and systemic risk for a revenue-critical
  customer acquisition platform processing millions of applications in a highly
  regulated financial environment. Operated under continuous production load
  without the luxury of greenfield rewrites, focusing on making a complex legacy
  core legible, resilient, and evolvable.

achievements:
  highlights:
    - text: >-
        Established a coherent operating model for a fragmented acquisition platform 
        by reconstructing end-to-end customer flows across browser, application, 
        and downstream middleware.
      impact: >-
        Replaced institutional assumptions with observed system behavior, 
        providing teams with an authoritative map for incident response and 
        change planning.
    - text: >-
        Structuralized technical debt remediation by founding the "ACQ Enablement" team.
      leadership: >-
        Corrected fragmented engineering ownership by decoupling cross-cutting 
        platform risk and remediation from product delivery cycles.
    - text: >-
        Transformed incident response from reactive firefighting into a self-sustaining 
        learning system.
      leadership: >-
        Served as the final escalation point for high-severity outages, 
        utilizing these inflection points to train engineering and cybersecurity 
        teams in trace-based reasoning rather than intuition.
    - text: >-
        Institutionalized observability standards by leading the OpenTelemetry Working Group.
      impact: >-
        Scaled trace-based diagnosis across the organization, moving teams from 
        fragmented logging to a unified telemetry model that reduced MTTR for 
        revenue-critical flows.
    - text: >-
        De-risked legacy platform modernization by proactively identifying 
        hidden failure modes in session state handling.
      impact: >-
        Designed and delivered a re-architecture of multi-step user workflows 
        that improved system durability while maintaining continuous availability 
        for the core revenue funnel.
    - text: >-
        Formalized Systemic Risk Ownership as a first-class engineering discipline.
      leadership: >-
        Established proactive identification of failure modes within the acquisition 
        pipeline, shifting the organization from a posture of incident response 
        to one of engineered reliability.

skills:
  - Platform Architecture
  - System Resilience
  - Incident Leadership
  - Observability
  - Legacy System Modernization
  - Distributed Systems
  - Ruby on Rails
  - PostgreSQL
  - OpenTelemetry
  - AWS
