company:
  name: OneMain Financial
  location: Remote

title: Associate Director, Staff Engineer
type: Full-time

start_date: January 2021
end_date: February 2026

context: >-
  Owned lane-level architecture, production stability, and systemic risk for a 
  revenue-critical customer acquisition platform spanning browser, Rails application 
  layers, enterprise middleware (ESB), and downstream business systems in a 
  regulated financial environment.

achievements:
  highlights:
    - text: >-
        Re-architected fragmented engineering ownership into a single accountable 
        operating model by reconstructing end-to-end execution flows across the 
        full system.
      impact: >-
        Eliminated assumption-driven debugging, enabling coordinated incident 
        response and reliable change planning across previously disconnected teams.
    - text: >-
        Founded and operationalized the ACQ Enablement team to separate platform 
        risk, remediation, and infrastructure work from product delivery.
      impact: >-
        Enabled sustained progress on systemic stability and compliance 
        initiatives without degrading customer-facing delivery.
    - text: >-
        Converted incident response from ad hoc coordination into a repeatable 
        system of record by establishing trace-driven diagnosis and post-incident 
        correction loops.
      impact: >-
        Ensured every major failure resulted in measurable improvements to 
        monitoring, ownership clarity, and cross-system integration points.
    - text: >-
        Led enterprise adoption of OpenTelemetry, standardizing observability 
        across engineering and cybersecurity.
      impact: >-
        Shifted teams from intuition-based debugging to shared, trace-based 
        reasoning about system behavior; transitioned ownership after adoption 
        became self-sustaining.
    - text: >-
        Modernized legacy Rails platform components under continuous production 
        load by re-architecting multi-step user workflows and state handling.
      impact: >-
        Eliminated persistent data integrity failure modes while maintaining 
        uninterrupted operation of the revenue funnel.
    - text: >-
        Established systemic risk management as an explicit engineering responsibility, 
        identifying cross-system failure modes and prioritizing remediation 
        based on production impact and business exposure.
      impact: >-
        Moved the organization from reactive incident response to proactive 
        reliability engineering.

skills:
  - Platform Architecture
  - System Resilience
  - Incident Leadership
  - Observability
  - Legacy System Modernization
  - Distributed Systems
  - Ruby on Rails
  - PostgreSQL
  - OpenTelemetry
  - AWS
