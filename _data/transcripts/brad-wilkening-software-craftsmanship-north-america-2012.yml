content: Hi, I'm Mike with uTest, and I'm here at SCNA again, sitting down with Brad
  Wilkening, who is a co-founder of DevMind Software, and they're very active in the
  community, and Brad has been active in the community for a while. He has a Chicago,
  you co-run the Chicago WebConf, and also the Craftsman Night Out, and the OpenHack,
  you just mentioned, I just learned about that one. So that's a bunch of events to
  be involved in. Going to meetings already takes up enough time, but running all
  those meetings, I mean, how do you manage doing all these events? And actually,
  and also, what is Craftsman Night Out and OpenHack? So I'll start out with the Chicago
  WebConf. So we saw that there was a need in Chicago for a conference, it was filled.
  It was focused on front-end technologies and design. I think that's a really important
  area. We think that there's kind of this new position coming out of nowhere called
  the front-end developer, and I think we need to foster that. For such design, it's
  knowing those tools, all the UX, the JavaScript, and the CSS. And knowing how to
  organize that stuff well can really help your project along, if you will. And so
  we saw a need there, and we were like, okay, let's give it a try, and we sold out
  the first year 115 tickets, and then we sold out this year with 300-and-something
  tickets. So one of the things we try to do with it is we try to keep it less expensive
  so it's attainable to people that don't usually. $75 for the full price? Yes. And
  we're sending out that survey, I think, later today or sometime soon-ish that is
  going to ask whether or not people really just want to pay more money so we have
  more room and more, you know, it's easier to spend $5,000 on food if you have more
  money to work with. Right. But we're... You know, we're bootstrapping it, and so
  there's a lot of overhead that we kind of have to... You're iterating. Yes, we are
  in fact iterating. But we're going to do that again next year. It's sometime in
  the fall. This year it was October 6th, which also happens to be my birthday, which
  means it was a really terrible birthday. What a very exciting birthday. Right. I
  mean, for a conference, you just kind of want to get her done. Yeah. With my other
  stuff, it's kind of different than that, though, right? Like, Suffer Creston's Night
  Out, the way that I get people to come to that is I basically just tell them, well,
  we basically get together and talk shit about our projects. The second I say that
  to somebody, they're just like, oh, I'm going to that. Yeah, yeah. It sounds like
  a good time. It's cathartic, right? You come out, you have a cheeseburger, and you
  have a good time with it. And it's always fun, you know, the no-trolling rule. Recruiters
  have shown up in the past, and we're typically very abusive to them, so they've
  found that they don't show up anymore. But, you know, we kind of want to keep it
  like that, where it's all just a bunch of coders in a room kind of hanging out.
  Occasionally, laptops come out. You know, that's probably one-fifth of the time,
  but we're totally cool with that as well. It can get as nerdy as it needs to. Yeah,
  well, a coder's got to code. Yes, a coder's going to code. Haters going to hate,
  is that the name we're pulling from? Yeah, yeah. Sure. I'm shameless. I don't go
  for anything. That one has like 300-something people. It's on Meetup. And that took
  a while to grow it out, and it's grown over the years. It was originally called
  Suffer Creston, who happened to like whiskey. And that occurred because I was like,
  I don't know, maybe some people will join this. It's kind of silly, and I know I
  have a bunch of friends that drink whiskey and write software, so let's do it. And
  in the first month, we had like 50 people that signed up for it, and the attendance
  was like 20 or 30 people every time. So I was like, oh, apparently this is a good
  idea. So then I kept getting people that were like, hey, you know, I don't like
  whiskey. I'm like, it doesn't matter. The name's silly. Yeah, yeah. Did you see
  how long this name is? Yeah. Suffer Creston, who happened to like whiskey. Nobody
  ever came up with a name like that, or they weren't entirely kidding. But after
  we got it up to a certain point, basically every month we have at least 20 or 30
  people. We get a wide variety, too. It's not just people that are doing the Ruby
  or the Java. It's people all across the board. One embedded guy comes pretty often,
  and he's super cool. Yeah. And, you know, it is literally every possible, every
  possible community that I could think of just coming up. Because it's not tied to,
  this isn't Ruby Dubs who like this. This isn't Python S who like beer. It's just
  Creston, and it's a very broad, you know, if you have something here, it's a lot
  of your craft, and come on up and write code. And it gets pretty nerdy sometimes.
  But, you know, after about being there for two hours, basically we're all just incoherently
  talking trash to each other, which is a natural environment for me. And that's one
  of the important things we sometimes forget when we're thinking about our tools,
  or adapt trying to close in with our tool sets, is that when you kind of put syntax
  away and platform fights away, we all have basically the same interests. We all
  have the same problems. We're the entire same group of people. And, you know, there's
  always this kind of animosity between the communities that I think is just completely
  silly. And so I'd say everybody just come to all the, you know, I've been going
  to the Python ones because they're just fun, and, you know, I learned something
  about Python, and there's something to be learned there. Does Brian Ray look forward
  to every meeting as the greatest meeting ever? Yes, he is the only other extrovert
  in Chicago as a software engineer. It's me and Brian Ray. That's our claim to fame,
  clearly. But you have one other group as well, the OpenHack. Yeah, so here's where
  it gets weird, right, is that there's this thing that was posted on GitHub, and
  it was OpenHack.com. And we noticed it, and we noticed that there wasn't a Chicago
  one. So we figured the natural response to that is going to be to go, hey, we'll
  take it. So that's what we did. And it's gone from zero people to, I think it's
  at, like, 70 in two weeks. And I'd like to note also that it's not a GitHub thing.
  It's just an OpenHack thing. And we didn't realize that at the time. We weren't
  trying to. We weren't trying to figure out what it was or why it was. We were just
  like, oh, we have a meetup that's kind of like that. Let's try to transverse it
  into this. And we have another one called Open Source Bug Bash. But we limit it
  to 12 people, and they all have to be fairly experienced just to join the group.
  We ask questions that people that haven't been delivering software for a while can't
  answer. Yeah, so that's interesting. And you have a gated group. So it's like you
  have to meet a certain threshold. And that's kind of an interesting perspective.
  And that's kind of an interesting perspective for a lot of user groups who are trying
  to figure out how to appeal to people who've gone past. I just interviewed Napolito,
  and he talked about always bringing in new blood and having to have introductory
  topics. But how do you satisfy people who've been down the road for a while? And
  for Open Source Bug Bash, it's kind of a weird thing because one of the reasons
  that these folks are coming is because it's a smaller group. And they just like
  smaller groups. I talked to Evan Light one time. And come to find out, he thinks
  that smaller groups are better. The big after party, he didn't like it so much.
  We ended up back at his hotel room. And this is not an appropriate statement, although
  anybody that knows me is probably expecting it to come one. But we were there with
  Aaron Kalin, Corey Emke from Trunk Club, and just this nice group of people who
  all just kind of wanted to have some good whiskey and sit around and shoot the shit.
  And they're the same people that we end up getting minus whiskey, plus laptop at
  Open Source Bug Bash. We actually had somebody you interviewed last time, Andy Lester,
  at Chicago Web Comp, who interviewed Andy Lester. And we met Andy there, and he's
  been a cool friend of ours since then. Yeah, he's a very interesting guy. Yeah.
  He's on my neck of the woods, which... That's where Jesus lost his shoes. Yeah,
  yeah, we're out there. But yeah, so that's interesting. So you were able to have...
  So you have a pretty open thing where just anybody can come into it with the Craftsman
  Night Out, which is kind of an open door policy, but then you have the open hack,
  which sounds like it's a little bit more open, but the higher end, or a little bit
  more sophisticated group of the Open Source Bug Bash, which I'm presuming you're
  committing code back into Open Source Projects? Yeah. Is there anything in particular
  you focus on? Oh, no, no. We're just starting to figure that part out, and really
  what we do, what we're going to do, more or less, is we're going to have people
  write on the board what they're going to hack on, and whether or not they're willing
  to take a pair. Okay. And so somebody comes in, and they're fixing a bug with Rails.
  Somebody else walks in and says, "Oh, yeah, I saw that bug. I want to pair with
  that dude and knock that one out." So that's basically, more or less, the way that
  we try to approach it. Now, open hack, since it's going to have a larger audience,
  potentially some... some younger blood, and some more junior folks, we're going
  to have that same format, but we're going to have that same format in an environment
  where it's going to be pretty reasonable. We're doing it in the Braintree space,
  which I've never been there, but I've heard it's really super awesome and huge.
  So we're probably going to have a pretty big turnout for those events, and there's
  a good reason people are coming there. People are coming there because it is an
  Open Source thing, and they do want to kind of help out with that stuff. Yeah, and
  have you reached out to any local Open Source guys? Or are you just like, "Oh, this
  is a cool project. We like this thing, so we want to support it." So is it... It's
  anything. It's literally going to be a whiteboard where you write your name and
  what library you're hacking on. Perhaps, you know, which bug you're going to try
  to attack. But it's more or less just to, you know, create the environment of approachability
  for anybody that's hacking on something. Okay, and... We still don't know how we're
  going to link that, where that dude is, kind of thing, to put a number on their
  head. I'm sorry. If I walk up to the boardroom, I'm like, "Brad, Wilkin, Aang, working
  on this, this, that." Oh, and you come in and you don't know who it's working on.
  Nobody knows who I am. Right. We haven't figured that part out yet. Oh, you're like,
  "Hey, who's Brad?" Yeah. And who's working on... If it gets over 20, that's going
  to get a little gnarly. Yeah, yeah. But going to what you talked about, the smaller
  groups and what Evan said about the smaller groups. So you said you prefer the smaller
  groups because they're a little bit... Well, why is that? Why do you prefer... Why
  did Evan say... Why does he say he prefers smaller groups over larger groups? Well,
  I'm going to wholesale just speak for Evan right now. Yeah. It's because... I don't
  have anything funny to say here, so it's not going to be any fun. I'm kidding. So
  I think it's actually just kind of... It's a dichotomy. It's a natural dichotomy
  in human behavior. You like to have some quiet time. You like to have some busy
  time. And you need both, and both are very healthy and have benefits. So if you
  do both, you're going to be happy with the results of it. And, you know, that's
  not a very objective thing to say. I'm basically just saying, "Hey, it'll be amazing."
  But more or less, there are also just people that don't function well in larger
  groups of people. They're going to try to consolidate themselves into a single group.
  And that is a totally natural introvert thing to do. And even us extroverts like
  me and Brian Ray are willing to every now and then say, "Yeah, that was a cool meetup
  with all five of us." Yeah. And we got a lot done. We talked about some cool stuff.
  And who... Who cares? But it's always that different kind of... It's not keeping
  the score. It's keeping it real. I guess. And I... Like I said, shameless. Yes.
  We are most definitely keeping it real as often as possible. But yeah, that's kind
  of the onset of those events. And some people try to use those for hiring. You know,
  like there's a new one. I forgot the name of it. But it's basically just... It's
  a recruiting firm that's putting out these presentations that maybe... Great. And
  we're not kind of doing that. We like the effect of people showing up and interacting
  with each other more than we do staring at the guy talking. Yeah. We... You know,
  that's an okay thing from time to time. But none of our groups really harness that
  or give that a hug. Okay. Well, thank you very much for giving the time to sit down.
  Absolutely.
