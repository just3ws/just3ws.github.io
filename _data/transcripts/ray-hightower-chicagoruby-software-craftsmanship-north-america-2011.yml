content: |-
  Hi, I'm here with Ray Hightower from ChicagoRuby, also the lead organizer for
   Windy City Rails Conference, but we're going to be talking about ChicagoRuby
   right now. Ray, can you tell us a little bit about ChicagoRuby and what kind of
   meetings you have? Sure, oh about ChicagoRuby? Well, ChicagoRuby is a user
   group. Our motto is when smart people challenge each other to grow, great
   things happen. So we get together and we share ideas. We have three events every
   month, three meetings each month. One downtown that ThoughtWorks sponsors
   every month. A second one, a hat night downtown, that is typically sponsored by
   Enova Financial. And in the western suburbs in Elmhurst, the Forest Group
   gives us a space there where we meet on the third Saturday of every month. So we
   have three meetings every month. What kind of numbers do you usually see? What kind of audience do you usually bring?
   Like how many, do you bring in designers, developers, more people working with Rails, more people working with other groups?
   Yeah, we've done surveys to determine who comes out to our meetings. We've got
   really four groups: developers, designers, entrepreneurs, and investors. Roughly 90%
   self-selected developers, 40% designers. You see there's some overlap if you draw a Venn
   diagram. So there's devs and designers? Yeah, devs and designers.
   And then entrepreneurs and investors together make up about five percent of
   the people who identify in one of those four groups. Now that's really
   interesting that you have people coming out that identify themselves as
   entrepreneurs and investors. Now, do you mean like actual people that aren't doing RubyDev
   that are coming out to meet RubyDevs at the group? Yeah, there are a handful of people.
   You know, at every meeting we get a few people who come out and say, "Hey, I'm
   looking for devs or designers. I've got this idea and I want to build a team to
   do this." So we get a few people coming out who want to meet some people to do
   that. But mostly because of the content of our meetings, the lion's share of the
   people at our meetings are developers or designers. Right. Because that's who we
   want to please. You know, when we say when smart people... That's your audience.
   That's our audience. That's our primary audience, yeah. And so the other people are
   there because they're attracted by the primary audience. Yeah, that's interesting.
   That's an interesting dynamic. Now, a typical meeting, is it usually a
   presentation format or do you do hands-on labs? It depends.
   It depends. The downtown meetings are always, there's a presentation, followed
   by Q&A, followed by a visit to a bar afterwards where we engage in adult beverages and
   brainstorming. So that's what we do downtown. That's on the first Tuesday of
   every month. We max out at 100 on the RSVPs there. So we typically get
   about 50. Sometimes we'll get 70, 80 in there, depending on the topic. Have you
   ever had a meeting where if you're maxed out 100, have you ever exceeded that? Have you ever...
   Yeah, what we find is we've gone beyond the 100 in RSVPs, but if it's a really nice
   day outside, you might get 120 RSVPs, but a bunch of people go to the beach.
   Because we're at the Aon building, which isn't too far from the lake. So some people
   on the way to the meeting, I imagine some people just hop on their bikes and go to the lake.
   Yeah, they're like, "Come on, we're gonna be there." Yeah, yeah. But you know, it's cool.
   You know, we have to live balanced lives and all that stuff, so it's funny.
   But you know, we find that when we get 100 RSVPs, typically we'll have about 70
   or 80 at the meeting, but our average at the downtown meetings is
   probably about 50. Our hat nights, well just recently we had a hat night last
   week that had 50-plus. I don't know what the exact number was there, but I know
   it was more than 50. Out in these suburbs, we'll get anywhere from 5 to 20, somewhere in there.
   Because that's a Saturday morning. Right. That's what I wanted to ask you about, is your
   schedule. Because you have a unique dynamic. You're not just doing one group, it's like
   a chain of groups, like a system of groups. You have the hat nights, you have the downtown
   meetings, and you also have the Elmhurst meetings. How do you coordinate those? Do you have a
   team of people that you work with? Oh yes, we absolutely have a team. If you
   go to our GitHub repo at github.com/chicagoruby, you'll see a
   repo within our repo, or a directory within our repo, called How Chicago Ruby Works,
   and in there is the organization of how we build it. All right, I'm going to
   definitely link to that. Yeah, yes. So I would take a look at that, and that
   evolved over time. We actually started off in Elmhurst. We started off in
   Franklin Park. We were five guys meeting in a library in Franklin Park when I
   became the organizer, and when I became organized, I said I'm not going to do it
   by myself. I want other people to work with me. One of the other guys in that
   room is Matt Toledo, who you know. Yes. So Matt became an organizer then. Victor Hong,
   Will Chung. If you go to chicagoruby.org, we maintain a list of organizer
   alums, people who have been part of the organizer team over time. Oh wow. And so the way we
   manage the three groups is, well the hack night, for example, Ginny Hendry came up to
   get me at one meeting and said, "Hey Ray, we should do hack nights." And I said, "Yeah, Ginny, you
   should organize." So that's how Ginny became an organizer. Right. So when people came to work with you, you gave them like, half a night of work? Yeah, half a night of work.
   So when people came to work with you, you gave them some support and helped to grow?
   Oh yeah, all the support in the world. Yeah, because they had great ideas. Ginny had a great idea to go on hack nights. Dave Junta came to us one day and said, hey, we should do coding donors.
   He said, okay, Dave, you can run it. Dave Junta was an organizer of Chicago Ruby for a couple of years, and he brought a lot of good ideas to us, and to Windy City Rails as well.
   So, you know, you're kind of a veteran in the field of running user groups. If somebody is looking to start up a user group now, is there any kind of sage wisdom you might want to add?
   Sage wisdom? How about some just random stuff off the top of my head?
   You know what has worked well for us? One of the first things that we did when I first became an organizer was, the first thing I wanted to do was make sure we had consistency.
   Because we want people.
   We want people to know that they can put on their calendar a Chicago Ruby meeting a year in advance. They won't necessarily know the topic. We won't know the topic, but we'll know the date, the time, and the place.
   So, with that consistency, everybody can plan around it. And then once you have that, then you want to get good speakers, and the speakers really draw people in.
   You want a location that's accessible. One of the problems we had when I first became an organizer was that we had to pay $5 a piece per meeting to pay for the library room.
   Oh, yeah.
   Yeah, you know how that works for this library in the western suburbs. We were fortunate that Lee DeForest, who owns a building in Elmhurst, had a place for us to meet.
   Lee said to us, hey, you can meet in the basement of my building. It's a great spot. It's like a clubhouse. Remember the Yard Gang comedies with the snake?
   Yeah, yeah.
   It's like a clubhouse. And, you know, Lee set us up.
   But no, no girls sign up.
   We are very friendly to women and, you know, black people.
   Yes.
   Very friendly.
   And, you know, just the Ruby community in general is very open to people.
   I mean, you know, I was, you know, immediately accepted when I didn't know anybody. You know that. You know that from your experience here.
   Yeah, I've gone into new groups and not known anybody.
   Yeah.
   But usually most groups are pretty welcoming because if people are willing to get together to spend their time to talk about, it's always one more person to talk to.
   Yes, yes.
   Okay.
   Yes, that's what we do.
   Thank you very much, Ray.
   Thank you.
   Thank you, Ray.
   from Chicago Ruby, thank you very much for talking with us.
   - Thank you Matt, thank you for having me.
