content: |-
  Hi, I'm Mike.
   I'm with Utastic here at Chicago Web Conf.
   I'm sitting down with Andy Lester.
   You might have used some of his tools, www.mechanize or Ack.
   He's also formerly ran the Chicago Pearlmongers out in the suburbs.
   He's written quite a bit about job hunting and how to be a good citizen inside of the
   open source community.
   Thank you for sitting down with me, Andy.
   Can you tell me a little bit about what your experience has been working with Ack and Mechanize
   and all the other tools that you've created and put out there?
   Sure.
   Most of what I do is, like a lot of open source projects, is scratching an itch.
   Something like Ack scratched the itch of me needing to search through a code base that
   was multiple different languages together and I needed an easy way to filter out certain
   languages.
   I scratched that itch and it grew from there.
   www.mechanize, the Pearl module, started from we needed a way to do automated testing of
   web pages, make sure that logins worked and didn't work in the proper way.
   Found an existing module, forked that off, and grew that.
   But what's great about that model is once you start the original itch and once you talk
   about it, and once you start talking about, "Hey, here's something that I've done," and
   a lot of people, I don't think, talk about that.
   They don't talk about their projects enough.
   When other people start to use it, the role of me as a maintainer and most of my projects
   has gone from the original creator to shepherd of the ongoing maintenance.
   So something like Ack, people add features, or Mechanize, I've probably written maybe
   a third of Mechanize, and the other two-thirds are all things that have come from the community.
   So it's more of the vision.
   You've got more of like a product manager at a certain point.
   At some point, yeah, I do.
   And part of that also comes to where you need to hand that off to other people.
   So for instance, Mechanize, I've handed off because I've not been able to do the maintenance
   on it that I need to do, put the time into it.
   And there are other people who have those, have the skill, have the time.
   And so now that's going to be part of the core Pearl LWP, core module.
   What else is actually going to be part of Pearl itself?
   Not of, well, but not of Pearl, but of the LWP, which is pretty common.
   Okay.
   On most distributions.
   Is that like your standard lib?
   Yeah.
   Yeah, it's one of the standard libraries.
   And so that kind of ongoing maintenance, you can pass off, I said, "Hey, you know what,
   I'm not able to put all the time into it."
   Also there were issues that I was not qualified to deal with.
   I'm horrible at internationalization.
   I don't understand the issues that go into dealing with all the different kinds of character
   sets.
   And so when I handed that off to Jesse Vincent, who does a lot of work across multiple character
   sets, and I mean, he does a lot of stuff with Asian languages, I know, I said, "Okay, he's
   going to know how to deal with this."
   I handed it off to him.
   So it is like project management or product management.
   Right.
   And I try not to be, in some extent I have to be the benevolent dictator, but I also
   have to bring people in.
   I have to encourage other people to contribute.
   So it's not just about product, it's about encouraging, fostering a sense of you're bringing
   something to the table, even if it's, I know you were trying to get somebody to generate
   an ASCII art form.
   Right.
   For the Cathy, for the Ack.
   Right.
   Because in America, the character Cathy says, "Ack," and she wants chocolate.
   Right, and it's just a silly thing.
   Yeah.
   It's just a silly thing, but there's so many ways that we can contribute.
   One of the things that I try to talk about whenever I can is that there's so many ways
   we contribute to open source.
   I wrote an article called, "14 Ways to Contribute to Open Source Without Being a Rock Star."
   If you go Google it, you'll find it, and the point is that you don't have to be one of these
   huge brains.
   You don't have to be a DHH or a Larry Wall or one of these guys who just has fantastic
   vision and coding chops, because I'm not that guy, but I try to contribute where I can,
   and everybody has a way that they can contribute, whether that's fixing a bug, whether that's
   just verifying a bug in the computer.
   Whether that's a bug in the bug tracker, or saying, "Well, you know what?
   This happens on my machine, and it's different on this other machine."
   Just little things like that can make a world of difference when it comes to development,
   and so one of the things I try to talk about is how you don't have to be a rock star.
   Everybody can contribute in some way.
   You don't have to devote hours and hours and hours every week, but just every little bit
   that you can do helps.
   I try to think, I talk about how open source is kind of a quilt, and some people add big
   squares to the quilt, and some people add little squares to the quilt, but everything
   is just little stitches, and every little stitch that you can add helps the entire community,
   the entire project, helps the understanding of open source and why open source is so important
   to what we do in computing.
   It also goes beyond just code contributions.
   You know, you do the Bobby Tables and the Perl book.
   Right.
   BobbyTables.com is a great example, because I read Stack Overflow all the time.
   StackOverflow.com, it's a question and answer question, and so many questions, so many questions
   were people coming and saying, "Well, how do I get around SQL injection?"
   Mm-hmm.
   Of course, Bobby Tables is a reference to an XKCD question.
   Yeah.
   Yeah.
   Yeah.
   He wrote a cartoon about SQL injection, and people understood that, but they didn't really
   have ... A lot of these newbies were coming in and didn't understand all the issues, and
   I found myself getting so tired of saying the same thing over and over again that I
   just set up a website, and what I did, though, is I just scraped all the answers from everywhere
   on Stack Overflow, and I just took the best answers of everything.
   I just put it on the website, so then I can just make it super simple to make the barriers
   to helping somebody so low, and just say, "Go to BobbyTables.com, and there's the answer
   for you."
   Yeah.
   I think the important differentiation of what you did and some of the other scrapers is
   they're mostly trying to do click-throughs.
   You're just trying to catalog and make these common answers more accessible.
   Yeah.
   Is this something that somebody could just go and contribute directly to an answer to
   them?
   Well, and that's the other beautiful thing, is that the source code for BobbyTables is
   on GitHub.
   Okay.
   So, anybody can go and fork the code on GitHub, make a patch, and send me a pull request.
   The beautiful thing about that is that now there's a German translation of BobbyTables.com.
   So, more internationalization.
   Right, which I have no idea.
   Yeah.
   I don't know German, but there's now a German translation.
   There's a Russian translation, and it's all hosted on BobbyTables.com, so the guy who
   came along and said, "I'd like to do the German translation," set up the code for me and did
   a lot of the translation, but now I have this framework.
   Right.
   So, when the guy came along who wanted to do the Russian translation, just added a language
   to it, and now he's able to contribute.
   That's one of the beautiful things that GitHub has done, is that they've made the barriers
   so low.
   Mm-hmm.
   It's so easy to fork things, to make comments on issues in the issues database,
   where it's so simple to do contributions.
   Yeah.
   Yeah, and that's the converse to what Linus was saying about his frustrations with Linux.
   In order to contribute to Linux, it's an extremely high threshold to be able to contribute to
   the core.
   Right.
   But for most projects, you just need help.
   Right.
   You just need somebody to help.
   You just need little bits of stuff.
   Yeah.
   Right.
   And that applies everywhere.
   That applies whether it's running a user group meeting.
   You come in, and you make coffee.
   Right.
   And anybody can do that, and it's simple, or you clean up afterwards so that your sponsors
   don't find a mess.
   Right.
   It sounds so small.
   Right.
   But it's not.
   Because every one of those is a little stitch in the quilt.
   Yeah.
   I cannot say how much I appreciated it at SCMC, a Software Craftsmanship in McHenry County.
   I don't often plug my own group.
   McHenry County represent.
   Yeah.
   Yeah.
   The MC.
   But turning around and seeing that the people who came had already cleaned up all their
   own stuff.
   Sure.
   I don't have to run around chasing it.
   Instead, I can talk to people and make newbies to the group feel more comfortable and welcome.
   Sure.
   So it's all part of an ecosystem.
   Yeah.
   When you pick up your own plates, I can talk to somebody who's there for the first time
   and make them feel more comfortable, so that way they'll come and then we get bigger and
   bigger.
   It has to be.
   It has to be ongoing.
   Because so much of what we do is we think of, we sit here and we're in awe of these great
   technical brains that do amazing things.
   And yet, there's so much other things that need to get done.
   And they're not any worse.
   It's not like they might not have the glamor, but they're still just as important.
   So on the Parrot project, for instance, Parrot is the virtual machine that is underpinning
   Rakuto Pearl, which is the main implementation of Pearl 6.
   So there's an entire virtual machine that there's some incredible brain power going
   into creating a virtual machine.
   And that's way beyond my pay grade.
   I don't know.
   Right.
   That's way beyond me.
   I don't understand.
   Sitting here comparing garbage collection algorithms, that's not my thing.
   That's like your bag.
   Right.
   Right.
   But I can do.
   But what we do have is what's called the Parrot cage cleaners.
   And the Parrot cage cleaners are the guys who go and they might look at a test.
   Part of the test so we can go, "Oh, this is redundant to this other test here.
   We'll go and remove it."
   Or we'll find some code that for some reason is intended incorrectly or a comment that's
   out of date.
   Or we'll go look in the ticket queue and go clean stuff up.
   Jim Keenan out in New York is amazing.
   The number, some days they'll just be a dozen closed tickets where Jim has gone and cleaned
   this where Jim has gone through and said, "Oh, this is fixed.
   This is fixed.
   This is fixed."
   Yeah.
   Six months ago.
   And help clean those up.
   Yeah.
   All that kind of scut work is absolutely crucial to a successful project.
   And that helps the people who are building the core not have to have a mess.
   Not have to, so that way they can produce a thing which feeds back into the people who
   are using it.
   Right.
   So when you're using it, you pay for it by helping do some scuttle work and then it
   feeds back and becomes a cycle.
   Absolutely.
   Absolutely.
   Everything that we do, anything that you do that helps an open source project is valuable.
   Even just talking about it.
   You sit here and you write a blog post about, "Hey, look, I found this project.
   I found this foo project that saved me an hour on something that I was doing."
   Save, spend 10, 15 minutes writing that in your blog.
   And then you write a blog post about it.
