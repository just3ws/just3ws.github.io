speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Avdi Grimm
    role: Author of Ruby Tapas, Ruby Rogues panelist, and Remote Pairing Consultant

turns:
  - speaker: M1
    text: "Hi, it's Mike here with UGtastic. I'm sitting down with Avdi Grimm, who runs Ruby Tapas, is a panelist on Ruby Rogues, and runs the Wide Teams blog and podcast. He also does this very interesting thing where he'll remote pair with people on open-source projects and some paid projects. Avdi, thank you for taking the time to sit down. Can you tell me a little bit about how you got started doing these remote pairs and how that's been working out for you?"
  - speaker: S1
    text: "Well, thanks for having me. The remote pairing seemed like a natural progression, honestly. I had been working remotely for a long time; it's been one of my long-term intentions to work from home because I like being around my family and choosing where I live based on things other than being in a tech hub. I'm out in suburban Pennsylvania. I've been working remotely for various companies and I'm a fan of pair programming because I've seen how effective it can be for spreading practices through a group and keeping the bus number down."
  - speaker: S1
    text: "I'd been pairing within companies remotely for a long time. At one point this summer, I found myself with the opportunity of taking another traditional consulting gig, but I was feeling the pressure on my time. I felt like I wasn't able to move forward on projects I wanted to get going, like Ruby Tapas. I wanted something more flexible, where I didn't feel like getting the product shipped was dependent on me working overtime. I wanted to draw those boundaries."
  - speaker: S1
    text: "I had already been taking some ad-hoc pair programming appointments—people I knew from other things just said, 'Hey, could we set up a thing where I pay you and we just do remote pairing from time to time?' Usually, these were people who didn't have other Ruby programmers in their company, or were sole consultants. They wanted to work with someone else to hone their skills. They seemed to be getting a lot out of it, so I thought, what if I just did more of that instead of traditional consulting? I put my shingle out there and I've been flooded with requests ever since."
  - speaker: M1
    text: "Do you mostly get open-source projects or do you get a lot of paid work through this as well?"
  - speaker: S1
    text: "I get more submissions for paid work than open source. I run a backlog for open-source work because I do those for free and I can only do one a week because it doesn't pay the bills."
  - speaker: M1
    text: "I'm curious—Gary Bernhard has talked about how, with Destroy All Software, people send him requests with an expectation that he can do everything. Do you get that with pair programming? Do people ever get upset if you don't have time for their project?"
  - speaker: S1
    text: "No, it's been extremely genial. Anyone who follows me on Twitter knows I tweet the same line over and over: 'I get the nicest emails.' The Ruby community is fantastic. I get a lot of requests for advice—more career advice than 'fix this code'—and I try to get back to everyone, even if it's just to say I don't have time to dig in. I don't get many people being demanding."
  - speaker: M1
    text: "I wondered about the signal-to-noise ratio. Do you get 'guru' requests, like 'can you do my homework for me'?"
  - speaker: S1
    text: "Occasionally I'll get someone asking for tutoring on a specific test for an open-source session. I have to explain that open-source sessions are for putting code back into the community—it's for projects you own or want to submit to. It's not about me teaching from scratch."
  - speaker: M1
    text: "So it's not Code 101; you have to have some basic experience and just need that final bit of guidance."
  - speaker: S1
    text: "Yeah. I do a lot of tutoring and training, but that's in the context of paid sessions. It takes a lot out of you. I look to the open-source sessions to be more relaxing and fun."
  - speaker: M1
    text: "Moving to your public work—Ruby Rogues is a very popular podcast. You guys have this great banter. How did that group come together?"
  - speaker: S1
    text: "I'm actually a latecomer to that podcast. It's Chuck's [Charles Max Wood] podcast initially. I believe it started with Chuck and James [Edward Gray]. For a while, Aaron Patterson was a regular. I came on for an episode, then another, and eventually, Aaron decided he didn't have time to devote to it every week, so I basically took his slot. Those are big shoes to fill."
  - speaker: M1
    text: "And you also have Wide Teams, focused on remote collaboration. What have you learned through that project?"
  - speaker: S1
    text: "The inspiration is that I work remotely and probably always will. If I'm going to make a career out of it, it behooves me to become good at it. I figured the best way to do that was to talk to other people doing it and pick their brains. When I started, there weren't many resources where dispersed teams were talking to each other. Wide Teams was about building a community around that practice."
  - speaker: M1
    text: "Have you seen patterns emerge in how people approach remote work?"
  - speaker: S1
    text: "A lot of people are in similar situations. You have startups where everyone worked together previously but then moved to different parts of the world. Then you have established companies realizing they don't have enough local talent to fill their slots, so they hire from wherever the talent is."
  - speaker: M1
    text: "I'm curious about your setup. What kind of equipment do you use for recording and remote work?"
  - speaker: S1
    text: "For recording, I use a Blue Snowball—one of the most recommended budget USB mics because you don't have to worry about analog interference. For remote pairing, I try to have video going. I use my tablet as my primary comms device (Skype, Google Talk) mounted to my right. I have the person's face on the tablet and the screen share in front of me on my computer. It's more natural than staring at each other on the same laptop screen and it takes the hardware load off my PC."
  - speaker: S1
    text: "I also use a VXI BlueParrott B250-XT+ headset. It's designed for truckers, so it has a 20-hour battery life and aggressive noise control. Most Bluetooth headsets are for occasional calls, not someone sitting for eight hours working with someone else."
  - speaker: M1
    text: "Finally, do you still get out to user groups, or does remote work disconnect you from that local banter?"
  - speaker: S1
    text: "Oh, yeah. My home group is Baltimore 'Be More on Rails'—I've been going there since the first meeting. There's also a group in Harrisburg. I love user groups. When people ask for career advice, getting involved in a local group is one of the first things I stress."
  - speaker: M1
    text: "Do you have a filter for your voice, or is that your natural 'radio voice'?"
  - speaker: S1
    text: "It's just the mic! Maybe this basement happens to have good acoustics, I don't know."
  - speaker: M1
    text: "Well, thank you very much for taking the time to sit down with me."
  - speaker: S1
    text: "Sure. Thanks."

insights:
  - statement: "Consulting pair programming (ad-hoc sessions) provides a flexible alternative to traditional long-term consulting contracts, allowing for better personal time boundaries."
    type: durable
    confidence: high
  - statement: "The Ruby community in the early 2010s was characterized by a high degree of geniality and mutual support, as evidenced by the 'I get the nicest emails' phenomenon."
    type: time-bound
    confidence: high
  - statement: "Remote work success is built on intentionality, including choosing specialized hardware (like trucker-grade headsets) and multi-device setups to reduce cognitive and hardware load."
    type: durable
    confidence: high
  - statement: "User groups remain the primary recommendation for career growth for young programmers, even for those deeply embedded in remote or global technical circles."
    type: durable
    confidence: high
  - statement: "The 'Wide Teams' concept identified a critical need in 2013 for a community of practice specifically for dispersed and distributed engineering teams."
    type: time-bound
    confidence: high

youtube:
  title: "The Art of Remote Pairing: Avdi Grimm on Ruby Tapas, Wide Teams, and Community | UGtastic"
  description: |-
    Avdi Grimm, the creator of Ruby Tapas and panelist on Ruby Rogues, joins Mike Hall to discuss the evolution of remote collaboration and the "Consulting Pair Programmer" model.

    In this interview, Avdi explains why he transitioned from traditional consulting to ad-hoc remote pairing sessions and shares his philosophy on using video to maintain a natural connection while working across the globe. He also discusses the origins of the Wide Teams podcast, his trucker-grade hardware setup for long-haul coding, and why he still believes local user groups are the best career move for any developer.

    Key Topics:
    - Why pair programming is the ultimate tool for remote knowledge sharing.
    - Transitioning to a "Consulting Pair Programmer" business model.
    - Hardware for Remote Work: The Blue Snowball and BlueParrott trucker headset.
    - The "I Get the Nicest Emails" phenomenon in the Ruby community.
    - Building community for distributed teams through Wide Teams.
    - Why Baltimore "Be More on Rails" is still Avdi's home base.

    Speakers:
    - Mike Hall (UGtastic)
    - Avdi Grimm (Ruby Tapas, Ruby Rogues, Wide Teams)

    Recorded: March 2013.
  tags:
    - Avdi Grimm
    - Ruby on Rails
    - Remote Work
    - Pair Programming
    - Ruby Tapas
    - Ruby Rogues
    - Wide Teams
    - Software Craftsmanship
    - Trucker Headsets
