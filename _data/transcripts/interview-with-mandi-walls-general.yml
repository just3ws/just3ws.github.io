turns:
- speaker: M1
  text: Hi, it's Mike again with UGtastic. I'm sitting down today with Mandi Walls
    who's a technical evangelist with Opscode, the Chef people. If you've ever done
    any kind of building servers or managing using the Chef utility, it's Opscode.
    Hi Mandi, thanks for taking the time to sit down with me today. I kind of just
    want to ask you straight off, what exactly is a technical evangelist and how do
    you work with the technical community? Do you run conferences, speak, or how does
    that work?
- speaker: S1
  text: So originally our technical evangelist positions were folks who basically
    helped our customers and our would-be customers understand their own technical
    needs. We're working with them to help them understand what Chef does, what it
    is, and how it can help you manage all of your systems. Over time, as Opscode
    has grown, we've actually morphed into the Opscode professional services team.
    So technically I'm really a consultant now, and I get to travel to our customers
