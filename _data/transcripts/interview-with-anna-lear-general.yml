speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Anna Lear
    role: Community Manager at Stack Exchange

turns:
  - speaker: M1
    text: "Hi, it's Mike with UGtastic. Today I'm sitting down with Anna Lear, who is a community manager with Stack Exchange. Anna, thank you for taking the time to sit down."
  - speaker: S1
    text: "It's good to be here. Thanks."
  - speaker: M1
    text: "Can you tell me a little bit about what is Stack Exchange overall and what is a community manager?"
  - speaker: S1
    text: "Stack Exchange is a network of question-and-answer websites, starting with Stack Overflow. My role is to help communities foster healthy, expert-led Q&A environments."
  - speaker: M1
    text: "It sounds like a lot of mediation."
  - speaker: S1
    text: "It is. It's about empowering moderators and helping the community self-govern through 'Meta' sites."

insights:
  - statement: "Community management in technical domains is about teaching self-governance rather than exercising top-down control."
    type: durable
    confidence: high

