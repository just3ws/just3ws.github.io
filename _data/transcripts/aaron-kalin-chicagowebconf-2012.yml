turns:
  - speaker: M1
    text: "Hi, I'm Mike. I'm here with Aaron Kalin. Aaron, you've been coming to the Chicago community events and you're also involved in the community side. Thanks for sitting down."
  - speaker: S1
    text: "Thanks for having me, Mike."
  - speaker: M1
    text: "So, what's been interesting in the community lately? How do you see things growing?"
  - speaker: S1
    text: "It's been a fun year. We see a lot of people coming into the community, asking good questions, and not just sticking to one technology. It's really about the craft of programming, not just the tools."

