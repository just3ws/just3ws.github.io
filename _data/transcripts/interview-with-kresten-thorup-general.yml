content: |-
  Hi, it's Mike again with ubtastic. I'm still here today at GoToConf 2013 here in Chicago.
   I'm sitting down with one of the lead organizers, Creston Thorup. He is one of the leads here and
   he hasn't kicked me out yet, so we're doing pretty good. Thank you for sitting down with me, Creston.
   Thanks for having me. I interviewed David Badaro when he was, if I said that correctly,
   but anyway, I interviewed David when he was first here scouting out Chicago as a possible
   place for GoToConf. Well, obviously a lot has happened between then and us sitting here today.
   You know, can you tell me a little bit about maybe some of the backstory about how the decision was
   to finally come here to Chicago? How did you make that decision? And then even more,
   how did you get involved in running GoToConf? Yeah, I'd rather start with the last question.
   Okay. Because we, so my company, Trotwork, that organizes these things, have been doing
   conferences for many years. And we really started it as, you know, initially it was,
   it was basically a way to do our own continuous lifelong development, learning,
   uh, experience. And of course, sharing that with our local community, um, which made it possible.
   Uh, so you imagine a little small company in a faraway country, uh, that doesn't really,
   that can't really afford to send our employees to some fancy conference abroad. And actually back
   then there wasn't really that many good conferences. There was, I mean, this kind of kind of industry
   petitioner's conference that weren't that many. It was mostly either, either very academic conferences
   or, or these trade show-y things, which were very, like, marketing-y.
   Yeah. Here's how you use our product to sell the products for expensive.
   So 15 years ago, there, there were really no conferences in this, in this middle, uh,
   in this middle space. Um, and that's what really the conference we wanted to, to go to ourselves.
   Um, and then add to that, we didn't want to put all our employees on an airplane and fly them to
   the U.S. or some other place where there wasn't a conference like this. So we, so we figured,
   we'd better make our own conference.
   Right. Um, was that called GoTo or was it a different conference?
   Well, the very first year it was called Scandinavian Java Technology Conference, or something obscure
   like that. And then pretty quickly we, um, transitioned into calling it Jaoo, J-A-O-O.
   Okay.
   Uh, because this was, most of what we did back then was Java and we were like a Java, a Java shop. And so
   kind of focused around the, kind of the object revolution that really happened in, in the mid '90s.
   Uh, people were really starting to use object-oriented programming big time.
   Right.
   And Java, of course, was the big thing that, that pushed this. So, so J-A-O-O, Jaoo, was, um,
   was a good name at that point. But, uh...
   Sounds like there's a few pronunciations even here.
   Because I've heard it called "Yow," then you said "Jow" and "Yow."
   Yeah, there's lots of, you know, we, when we opened up in Australia, uh, we had a lot of, you
   know, uh, we also called it, back then it was called, uh, also "Jow."
   Yeah.
   Um, and Australians couldn't figure out how to pronounce it. So, so down there it was
   then later renamed to "Yow," Y-O-W.
   Oh, okay.
   Um, this is really just a different spelling of "Jow."
   Yeah, yeah, yeah.
   Um, and also more generic. Uh, and about the same time we decided, uh, to go with the,
   the name "Go-To" as, as a more generic, uh...
   Well, and it also has a nice, uh, play on it.
   Play on "Go to Chicago," "Go to..."
   You know, "Go to wherever."
   "Wherever."
   Yeah.
   And it, and it makes me the "Go-To" guy.
   Yeah.
   Oh, you are the "Go-To" guy.
   Yeah.
   Or whatever.
   Yeah.
   So, um, so what I find really, uh, conferences is, it's a great way to meet people.
   Mm-hmm.
   You know, um, organizing conferences, uh, is fun.
   It's a great way to meet people in a, in a positive, uh, vibe.
   Right.
   Uh, both, uh, customers, uh...
   Uh, business partners, uh, um, because you meet in this kind of learning environment
   where, where things are new and exciting.
   Right.
   Um...
   Seeing things you don't necessarily work on.
   Exactly.
   You see things you don't necessarily work on, it's, um, it's, it's a good way to, uh,
