   Okay.
   So we've adopted certain portions of CouchDB in our stack. We've taken the API
   layer, and 95% of it, there are certain things we've turned off that we think are unstable
   in production at scale. So we try to make sure that people can go back and forth between
   megabytes to petabytes, right, without surprises, which is a pretty big challenge.
   Yeah, yeah. It's a big challenge.
   And we love the persistency model. So the engine that actually stores data, this
   unique append-only B+ tree is fantastic because you never lose data.
   Right.
   We take our systems down with kill-9.
   Okay.
   There's no graceful shutdown.
   Yeah, yeah. That's just...
   Right? Because it's always consistent. There's no write-ahead lock. So we love that.
   The stuff in the middle, you know, CouchDB in its current state is a single server application.
   You can do replicas, you know.
   So with CloudNode, we brought RIP, which is, like, predominantly inspired by Dynamo, the
   original Amazon paper.
   Right.
   So like Cassandra, like what you find in React, it is masterless. It's symmetric.
   No single point of failure. So we put that in between the API and the persistency level,
