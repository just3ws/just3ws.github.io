  Hi, it's Mike again with NukeTastic. I'm here today again at the GoToChicago conference,
   GoToChicago 2013. I'm sitting down with Mike Miller, who is the founder and chief scientist
   of Cloudant Technology, or Cloudant? Just Cloudant. Cloudant. And their database is a service
   company. Their specialty is CouchDB and BigCouch. So thank you very much for taking the time to sit
   down, Mike. Thanks for the chance. Okay, the CouchDB, how did Cloudant get to be involved
   with the CouchDB project? Very good question. Is it okay if I just back up a little bit and give
   you kind of one overall kind of mission statement, like a theme for the company? Absolutely. Yeah,
   so we started the company because our backgrounds were in big
   stuff. So we started the company because our backgrounds were in big stuff. So we started
   big stuff. So we started the company because our backgrounds were in big stuff. So we started
   science and big data from Large Hadron Collider and CERN. A lot. So some of the biggest
   data sets in the world. Some big data. Yeah, and we got the feeling that big data was going to be
   a thing. Right. And that if it was a problem for us, it was eventually going to be a problem for
   everybody. I think that's been borne out. But the other thing we learned over the last four years
   since we did Y Combinator is that mobile is also a big thing. And so I think these, I think
   the founder of Joyent put it best, that mobile and big data have broken our model of computing.
   Right. So that's what Cloudant is trying to solve. And so we're trying to build a CDN for
   your database. And so we run that as a service. And if you step back and say, of all the APIs
   and systems out there that can really deal with big as well as disconnected, you know, that takes
   you directly and only to CouchDB. So that's how we got integrated with the projects. And so we
   brought a lot of IP to that project, both internally and in the open source. Okay. And that's really
