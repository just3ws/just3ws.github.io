   But I think it's very forward-thinking in the sense that, okay, the Internet happened,
   right? People use JSON, and, you know, everything speaks HTTP.
   Well, briefly, could you just kind of describe why Couch is different? So, if somebody's
   watching and they haven't used Couch at all, a little...
   Yeah, absolutely.
   ...maybe comparing, they probably know Mongo, because that's really famous.
   Sure.
   But Couch, how is it different than Mongo?
   So, I think it's... I've got a couple answers to that. I think number one is that
   it's a document database, and I think it's maybe the first document database. I think
   it really coined that phrase.
   Okay.
   And it's been...
   It's a pure community project. There is not a company that started and then built it and
   released it.
   Right.
   So, I often compare, you know, Mongo and CouchDB as, like, MySQL and Postgres.
   Okay.
   Like, CouchDB community is slow, it's deliberate, and it's in it, you know, for
   the decades.
   Right.
   Right. It's not necessarily, like, "Got to get to market right now."
   Yeah.
   And that defines the culture and the product path a lot. But from the API standpoint,
   it's very different, right, than a typical database. Just from the way you talk to it,
   your database...
   Yeah.
   It's like a web server, which is pretty radical if you worked on, like, big enterprise
   IT.
   Right. Right.
   Like, usually locked on the database. In this case, it's like, "Well, you know,
   the internet has taught us how to build very secure and high availability, you know, systems,
   so let's just bake that into the database itself and think about, you know, working
   towards a goal of eliminating the middle tier if you want to, and just let the database
   do a lot of the things that you generally need."
   Well, one thing that I think when somebody first looks at CouchDB, as somebody who's
   come fresh to it myself...
   Yeah.
   ...is that you don't write queries in the same way. It's more queries up front,
   and then you start pushing data into the queries than defining a schema or just pushing raw
   data into a...
   Yeah. It's different.
   Yeah.
   So the thing about a document database is the idea that in contrast, like, column
   stores like Cassandra, HBase, or Bigtable, it's not schematized.
   Right.
   And so you don't have to sit down and pre-declare what you're going to put in and
   be limited in how you can query that later on.
   Yeah.
   You don't have to go down downstream in your project. With a document database,
   the idea is you can always build a new index to do what you need to.
   Right.
   So that's step number one. But step number two is CouchDB is very much from the ground
   up built to be stable in production, and so things like table scans don't really exist.
   Right.
   Because they're neat when you're starting a project, but in production, they suck.
   Yeah.
   Right? They're the things that make your site go offline.
   Yeah.
   And so it's very much about recognizing that disk is cheap, so let's store your data
   durably. Let's make sure it's always flush to disk with an accurate...
   F-sync before we succeed a response. Let's make sure that you can pre-compute that data
   using that incremental indexing engine, which is very unique, so that no matter how the
   data is stored, it's prepared in exactly the way your application wants to consume it.
   Right.
   To load a page, drive an app, leaderboard, you name it. And then the third thing is,
   I think it's... And this is where it really differs from all other databases. Right?
   Traditionally, databases are like a single cursor, and you make that cursor really fast
   because a database may be running on the exact same server that the application is.
   Right?
   Right.
   So it's like, "Oh, can we beat microseconds? Can we get to nanoseconds?" And that's
   awesome, but when you're talking to it from your phone, that's a total waste.
   Right.
   And what you really want is concurrency. So the CouchDB philosophy, and this is supported
   in all the different backends that implement the API, like whether it's Cloudant or like
   CouchDB running in your browser, is like all the things you need to load a page in your
   app, throw them at the database at the same time, and deal with those in Ajax fashion.
   Right.
   Asynchronously, as they come back.
   Okay.
   And so it's like, "Oh, as long as each of those succeeds in, you know, order 10 milliseconds,"
   you know, in Cloud, when we try to do single millisecond, then you're fine. And you can,
   you know, be well under that 100 millisecond kind of human tolerance for latency.
   Okay.
   So it's a very different philosophy than single cursor.
