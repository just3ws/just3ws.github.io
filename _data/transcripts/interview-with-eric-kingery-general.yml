speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Eric Kingery
    role: Organizer of Refactor Chicago, Co-founder of Chicago PHP Community
turns:
- speaker: M1
  text: Hi, it's Mike with UGtastic. I'm sitting down with Eric Kingery who runs the
    Refactor Chicago group, formerly the Chicago PHP community. We're here at the
    SCNA 2013 conference in Chicago. So, the Refactor group—what is it and how did
    you get it started?
- speaker: S1
  text: Sure. As I mentioned, we started as Chicago's PHP community meetup about four
    years ago. We had success, but it was hard to retain people because we had a disparate
    range of fairly in-depth topics. We found that beginners were alienated by advanced
    topics, while advanced members were sometimes bored by repetitive introductory
    PHP material. We realized that many of the challenges we deal with—MongoDB, mobile
    design, effective JavaScript—are not PHP-specific. We wanted to broaden the scope
    and bring in people from all different communities to refocus on how to be an
    effective software professional rather than just a better PHP developer.
- speaker: M1
  text: How did that change the dichotomy between beginner and advanced topics?
- speaker: S1
  text: It's easier when you have a wider range. In a single language like PHP, you
    can only cover the basics so many times. By expanding to include refactoring ideas,
    recruiting, and the importance of diversity, we can cater to more people. We just
    rebranded, and our next meetup features Jen Myers talking about design. I talked
    to our core members, and many had actually moved on from PHP in their own careers,
    so broadening the scope just made sense.
- speaker: M1
  text: It makes me think of the debate about which language to use for general presentations,
    like SOLID principles. If it's presented in Java but you're a JavaScript developer,
    how do you reduce that impedance mismatch?
- speaker: S1
  text: I look at it based on the intended audience. If you're introducing a concept
    like SOLID, it should be done in a language-agnostic way. Any code on a slide
    should be readable and named properly so that someone who doesn't know the specific
    language can still pick up the concepts. Advanced talks are different; people
    drawn to those likely have enough context to get value regardless of the primary
    language.
- speaker: M1
  text: Taking a step back, how did you first get involved in the Chicago community?
- speaker: S1
  text: I co-founded the PHP group with a recruiter, though we've moved away from
    that focus now. At the time, I was at Sittercity, a Chicago startup. We were staffing
    up after a funding round and made a great move hiring one of the core Kohana developers.
    Getting involved in the Kohana and CakePHP communities led us to meet people like
    Rasmus Lerdorf. He actually reached out to present to us when he was traveling
    through Chicago.
- speaker: M1
  text: That's a huge win—having the creator of the language reach out. That's like
    the Ruby group having Matz or the Clojure group having Rich Hickey.
- speaker: S1
  text: Exactly. He works for Etsy now. Even if PHP isn't your main language, hearing
    from a creator of that caliber is significant. Technologies change so fast; if
    you're laser-focused on one area, you'll miss advances in server-side JavaScript
    or functional programming. We want to provide an opportunity for people to talk
    about professional practices that aren't usually covered in formal CS classes
    or even boot camps—things like continuous integration, unit testing, HTTP basics,
    and software process. Unless you have a good mentor or work for a company that
    espouses these practices, you can just miss them.
- speaker: M1
  text: So you're helping people move from a 'PHP developer' mindset to a 'Developer'
    mindset.
- speaker: S1
  text: Exactly. Refactoring your career overall. Most people in this profession benefit
    more from wide exposure; you need that to operate in the diverse ecosystems of
    modern engineering teams.
- speaker: M1
  text: How do people find the group?
- speaker: S1
  text: We're on Twitter as @refactord—like the Chicago airport code. Or refactor-chicago.com,
    which redirects to our Meetup site.
- speaker: M1
  text: Great. Well, thanks for taking the time, Eric. It was great to meet you.
- speaker: S1
  text: Thank you.
insights:
- statement: Language-specific user groups often reach a 'retension ceiling' because
    members eventually evolve their careers beyond a single ecosystem; rebranding
    toward 'Refactoring' or general professional practice allows the community to
    grow alongside its members.
  type: durable
  confidence: high
- statement: The 'Impedance Mismatch' of technical presentations can be resolved by
    using language-agnostic code on slides—prioritizing readability and naming over
    specific syntax to ensure concepts are accessible to diverse audiences.
  type: durable
  confidence: high
- statement: A significant gap exists between formal CS education (and some boot camps)
    and professional reality; critical skills like Continuous Integration, unit testing,
    and API design are often learned only through mentorship or community exposure.
  type: durable
  confidence: high
- statement: Refactoring one's professional identity from a '[Language] Developer'
    to a general 'Software Professional' is a key step in long-term career resilience
    and architectural effectiveness.
  type: durable
  confidence: high
- statement: 'The ''Rasmus Lerdorf Effect'': Technology-specific groups provide unique
    opportunities for creators of that technology to engage directly with the community,
    but those groups must eventually broaden to remain relevant to a maturing membership.'
  type: time-bound
  confidence: medium
