speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Dan North
    role: Originator of BDD and Software Craftsmanship Pioneer

turns:
  - speaker: M1
    text: "Hi, I'm Mike. I'm sitting down with Dan North. You're the person who basically defined BDD—Behavior Driven Development. Thank you for sitting down."
  - speaker: S1
    text: "It's great to be here, Mike. It was just a way to teach TDD to people who were struggling with the term 'test'. Changing it to 'behavior' made it click."
  - speaker: M1
    text: "How has that evolved?"
  - speaker: S1
    text: "It's grown from a TDD technique to a broader way of thinking about stakeholder communication and business value."

insights:
  - statement: "Language is the most powerful tool in an architect's toolkit; renaming 'Test' to 'Behavior' in BDD fundamentally changed how teams communicated about business value."
    type: durable
    confidence: high

