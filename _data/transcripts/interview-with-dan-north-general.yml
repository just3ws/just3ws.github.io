summary: |
  Dan North, the father of BDD, discusses the evolution of BDD from a way of thinking about problems to a dogmatic practice. He emphasizes the importance of conversations, context, and uncertainty in effective BDD implementation.

  CRITICAL INSIGHTS:
  - BDD is a way of engaging and thinking about problems, not a set of practices.
  - People become dogmatic about BDD because it provides a sense of structure and certainty.
  - BDD should not be monetized as it is a useful tool, not an idea to be locked down.
  - BDD is a pattern that works well in a particular situation and needs to be used in conjunction with other patterns.
  - The fear of losing an idea or product can drive people to charge money for it, even if it's not necessary.
topics:
