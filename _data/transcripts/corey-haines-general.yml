- speaker: S1
  text: So there's a set format for it. We work on Conway's Game of Life. We work
    in 45-minute sessions, and at the end of the 45 minutes, we delete all of the
    code we did, swap pairs, start again, and we do it about five or six times through
    the day. And then each session, we introduce different constraints, different
    ideas around object-oriented design, test-driven development, pairing, things
