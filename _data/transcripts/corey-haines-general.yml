  text: Hi, I'm Mike with Eugtastic. I'm sitting here with Corey Haynes. Corey does
    the Global Day of Code Retreats and he's also very active in just speaking and
    being involved in user groups and technical education. So, Corey, can you tell
    us a little bit about what is Global Day of Code Retreat and what's a Code Retreat?
- speaker: S1
  text: |-
    Okay, so Code Retreat's an event. It's a community-focused sort of directed practice event that has been going on for almost four years now. There's all over the world and it's a day that's focused on practice rather than learning a new technology.

    So, you just write code? How do you practice?

    So, there's a set format for it. We work on Conway's Game of Life. We work in 45-minute sessions and at the end of the 45 minutes we delete all of the code we did, swap pairs, start again.

    And we do it about five or six times through the day. And then each session we introduce different constraints, different ideas around object-oriented design, test-driven development, pairing, things like that.

    So, it's a day of sort of pushing yourself past where you normally code. And I like to say that we take normal sort of clean code constraints and different design ideas and we crank them up to 11.

    Yeah, I've been to one or maybe two of your events and things like no return values or don't use conditional statements is always interesting.

    But for the audience, what languages are you using? I mean, is this like a Ruby specific thing?

    It's language agnostic. So, we ask people to come with a development environment set up, what we call sort of your language of convenience.

    But the community events are very much if you're interested in trying it in a different language, say you've never done Clojure and somebody there has a Clojure environment set up,

    then they can, you can pair with them for 45 minutes, so they get a feel for it a little bit.

    Yeah.

    We started off a lot of Java, there's a lot of C# that shows up, a lot of Ruby that shows up, but they're intended to be language agnostic.

    Yeah. So, what do people do when they can't finish the problem in the 45 minutes allocated?

    So, very few people can, and in fact, it's intentionally chosen so that you can't finish the problem.

    Oh, okay.

    The goal is to sort of retreat from the normal pressures of finishing.

    Yeah.

    We all know that we write our worst code when we have, when we're rushing under constraints and under a time pressure.

    And the corners we cut, things like that. So, the day is built to allow you sort of that freedom to experiment and try new things.

    So, the very first one, it's frustrating for people, and by the end of the day, it's frustrating not finishing it.

    But you're kind of laughing.

    You're laughing at it.

    And instead, sort of that pressure to finish goes away and you start to focus on clean code, focus on investigating different design ideas rather than rushing to finish.

    Right. And actually, have you ever had anybody like, just be like, "Oh, Conway's Gamo" and just bang it out?

    I'm just curious.

    Yeah. We've had, like for the first session, a lot of times people will sort of hack out a solution because they're still in that mindset of wanting to get it done.

    But, you know, like a lot of us say, it's easy to get something working when you write crap.

    Right. And so, the idea of the day is to sort of write the best code you've ever written and see what that looks like and take what you consider great code, take it to the extreme.

    And, you know, we always talk about going too far, but very few people actually get close to too far.

    Yeah. So, shoot for gold plating.

    Shoot for gold plating.

    And what happens if you actually go too far?

    What happens if you refactor too much or you extract too many methods?

    What does it look like?

    And by taking yourself to that place, you get a better sense for when you are actually building a production system, how far you can go.

