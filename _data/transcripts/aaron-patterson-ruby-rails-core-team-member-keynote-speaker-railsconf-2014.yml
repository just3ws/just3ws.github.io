speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Aaron Patterson
    role: Ruby & Rails Core Team Member, Keynote Speaker

turns:
  - speaker: M1
    text: "Hi, it's Mike with UGtastic, and I'm at RailsConf 2014, and I'm standing here with Aaron Patterson. You might know him as TenderLove on Twitter and GitHub and all those social places, but he's going to be giving the footnote to the conference tonight. He can't really call it the keynote, because it's at the end. I don't know what to call it."
  - speaker: S1
    text: "The anti-keynote."
  - speaker: M1
    text: "Yeah, the anti-keynote. Well, thank you very much for taking the time to speak with me. Can you tell me a little bit about what your talk is going to be about?"
  - speaker: S1
    text: "Yeah, well, first, I guess the first 30% is just going to be jokes and trolling. The second 30% is going to be some bugs and stuff with Active Record internals, and the final 50% is going to be about Adequate Record. I know that adds up to 110%, but I always like to give 110%."
  - speaker: M1
    text: "It's 100%. Just don't add it."
  - speaker: S1
    text: "So, yeah, it's just going to be jokes, bugs, and then Adequate Record is what we're going to be talking about."
  - speaker: M1
    text: "What is Adequate Record?"
  - speaker: S1
    text: "It's a project that I've been working on for a very long time, but I didn't really have a name for it. What it is is just a set of patches on top of Active Record, specifically for performance improvements."
  - speaker: M1
    text: "Is it just more of a streamlining of the internals?"
  - speaker: S1
    text: "Basically, I've been refactoring the internals for a very long time. The main performance improvement is SQL statement generation caching. The actual string that Active Record passes to the database—it caches the generation of that. We only do that once, and your queries end up being faster."
  - speaker: S1
    text: "I've been working on internal refactoring for literally years just to get to the point where I could have this particular thing, but I never had a name for it until recently."
  - speaker: M1
    text: "That sounds like what other database engines do where you can lean on query caching inside. You're pulling some of that capability out into the Ruby layer so it can be faster."
  - speaker: S1
    text: "Yeah, Active Record already does query caching, uses prepared statements, and does cache query execution. The problem is that even though we use prepared statements, we still have to generate the SQL statement in order to look up the prepared statement. So we've always had this overhead before querying the database of building up the query. This eliminates that overhead."
  - speaker: M1
    text: "You've been a contributor to Rails for a while. Is Rails the first open-source project you were involved in, or how did you come to being on Rails Core?"
  - speaker: S1
    text: "Not at all. My very first open-source patch was probably in 2001. It was to a Perl library. Don't Google me. It's embarrassing."
  - speaker: M1
    text: "You don't want anybody to know you did Perl."
  - speaker: S1
    text: "No! My first real major open-source stuff was with Ruby in maybe 2006, working on the Mechanize gem. That was a port of the Perl Mechanize by Andy Lester."
  - speaker: M1
    text: "Andy Lester! I've also interviewed him. He's from my neck of the woods."
  - speaker: S1
    text: "Oh, that's awesome. I didn't actually start Mechanize. I inherited it. I was using it a lot, and the maintainer wasn't working on it so much, so I picked it up from him, and that was my first major open-source responsibility."
  - speaker: M1
    text: "So that's when you became a grown-up in FOSS. When did you learn about Rails?"
  - speaker: S1
    text: "Around the same time I was getting into Ruby and working on Mechanize for web automation. The famous 15-minute 'Build a Blog' video came out by DHH, and I saw that and was like, 'Wow, I gotta try this out.'"

insights:
  - statement: "Adequate Record is an internal performance initiative for Active Record focused on SQL statement generation caching, eliminating the overhead of string building prior to database queries."
    type: durable
