    type: time-bound
    confidence: high

youtube:
  title: "Adequate Record and Perl Secrets: Aaron Patterson (Tenderlove) on Rails Internals | UGtastic"
  description: |-
    Ruby and Rails Core Team Member Aaron Patterson (aka Tenderlove) joins Mike Hall for the "anti-keynote" interview at RailsConf 2014. 
    
    Aaron discusses the origins of his open-source journey (which began with an embarrassing Perl patch), how he inherited the Mechanize gem, and his long-term work on "Adequate Record." He dives into the technical weeds of Active Record performance, explaining how SQL statement generation caching eliminates years of overhead, and reflects on the famous DHH "15-minute blog" video that brought him to Rails.

    Key Topics:
    - The RailsConf "Anti-Keynote": Jokes, Trolling, and Bugs.
    - Adequate Record: Refactoring Active Record internals for performance.
    - SQL statement generation caching in Ruby.
    - Tenderlove's open-source origins with Perl and the Mechanize gem.
    - The impact of DHH's 15-minute blog screencast.

    Speakers:
    - Mike Hall (UGtastic)
    - Aaron Patterson (Ruby/Rails Core Team)

    Recorded: April 2014 at RailsConf.
  tags:
    - Aaron Patterson
    - Tenderlove
    - Ruby on Rails
    - Active Record
    - Adequate Record
    - RailsConf
    - Open Source
    - Ruby
    - Perl
    - Mechanize
    - DHH
    - Software Engineering
    - Performance Optimization
    - Mike Hall
    - UGtastic
