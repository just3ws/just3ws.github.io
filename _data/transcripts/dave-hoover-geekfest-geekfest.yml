  text: Hi, I'm Mike. I'm chatting here with Dave Hoover from Groupon on the Optiva.
    He's the founder of GeekFest, a user group, kind of an internal group that started
    at Optiva and has grown and now has migrated over to Groupon. So hi, Dave. Thanks
    for... Hi, Mike. Hi. Can you tell us a little bit about GeekFest and its origins
    and kind of where it is today? Sure.
- speaker: S1
  text: We started GeekFest in 2007 at Optiva. It actually didn't start as anything
    official. It was just... It was actually an official study group. We were studying
    Ruby refactoring, a draft of the book that was being worked on at the time. And
    there was about three apprentices and a kind of part-time contractor, Victoria
    Wang, at Optiva at that point. And it was just a time for us to sit down and get
    away from our code a little bit. You were doing Java most of the time. Actually
    at that time. Yes. We were all learning Ruby. So I'd been doing Ruby for a number
    of years, but that was like my first full-time year in Ruby. This was 2000...
    Actually, I guess it would have been the year before that. But anyway, it started
    as a study group around this book. But as time went on, it just kind of morphed
    into more general discussion. And then we'd have people from Optiva who were out
    at clients come in and give talks. Mm-hmm. I remember when Andy came and gave
    a talk on Scala later in 2007, and we got into a habit. We would just all go out
    and grab sandwiches from Jimmy John's or something beforehand, and then come back
    and either hack on code a little bit, like fun code, or we'd discuss a book, or
    we would have a presentation. So it sounds kind of like an auspicious beginning
    to something that's now a packed house in a mini-campus.
- speaker: M1
  text: Right.
- speaker: S1
  text: I've noticed that over the years that lots of development shops have... It's
    a healthy thing to have a lunch and learn, but like you're saying, it's morphed.
- speaker: M1
  text: Yeah.
- speaker: S1
  text: I mean, even the years that I've gone, it's gone from being a few people around
    a table to a filled room to the room is overfilling, and that's just when it was
    still Optiva. It's just kind of interesting, though, when you started to open
    up... I mean, I remember coming before I joined Optiva, coming to GeekFest, and
    it wasn't quite public, but it wasn't totally... Well, yeah. I mean, so ever since
    the very beginning, we've always been open to outside people, people that weren't
    at Optiva and now at Groupon. We've always been open to people coming. It's just
    we haven't ever had a huge reason to promote it a lot. We still don't, because
    we still don't. We always run out of room very quickly. So, yeah, it's always
    been available to anybody. About a year after we've been... After doing it, we
    did a bunch of kind of feedback and surveys for people inside of Optiva and quickly
    realized that GeekFest had become this very, very important part of what we were.
    And at that point, we were like, "Okay, well, this has actually become like this
    kind of perk-benefit sort of thing, and so we should actually start buying lunch.
    Let's get out of this habit of people having to run out and grab lunch and come
    back. Let's just get lunch ordered. " Yeah. So we started doing that, and that
    still goes on today. 80 people or so are sometimes over that. And some people
    are from the outside. It's not just internal only. And that's one of the things
    with the acquisition. It went from being a tight-knit group that had kind of formed
    its own identity around GeekFest. And it was something, I can speak to this, that
    was of great concern coming into Groupon and getting acquired by a large company.
    I mean, most outside user groups are kind of independent. And they operate. Whereas
    GeekFest was really identified with Optiva and seeing Optiva get acquired. And
    you persevered through that, even though I was really worried. But it has grown.
    It has changed.
- speaker: M1
