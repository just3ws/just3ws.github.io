---
content: Hi, I'm Mike Hall with UGtastic. I'm standing here with Angelique Martin
  from EighthLight. She is, historically you've worked with the XP universe and the,
  well the XP Agile universe when it was rebranded because Agile was the thing. But
  now you're working with SCNA, Software Craftsmanship North America. It's a conference
  that's been, what, this is our fourth year? Yes, it is our fourth year. Can you
  tell me a little bit about SCNA? So SCNA stands for Software Craftsmanship North
  America. It's organized right here in Chicago. It will be held November 9th and
  10th at the Aon Center. It's a two-day conference. We'll have about 14 speakers,
  including Robert Martin, Corey Foyle, and many other names that I can't think of
  right now. Yeah, remember the roster right now. Yes, Gary Bernard. It's okay. Yeah.
  And Sarah Ellen and Sarah Gray. Mm-hmm. Leon Gersing. I won't be able to remember
  the 14 of them. Brian Merrick that I can quote. Perfect. And I can't think of the
  other one, but it's all on the website. Well, that's okay. You know, people can
  go to the site and see all of that information. But can you tell me a little bit
  about what is SCNA? So SCNA is a conference that aims at gathering people that care
  about their craft. They care about improving themselves. They care about contributing
  to the community and meeting with their peers and hopefully exchanging and teaching
  each other. Okay. And this is what, you said the fourth year or so? Fourth year,
  correct. And traditionally, this was something that you shared -- Eighth Light shared
  responsibilities with Optiva for -- you were kind of handing it off back and forth.
  Well, now that -- now this year, fortunately this year that Optiva was acquired
  was an Eighth Light year, so we're good this year, but -- Well, Groupon Engineering
  was still very involved in the planning of Eighth Light this year. As a matter of
  fact, they helped considerably to secure the program. So they're still a main sponsor
  and they're still very involved. Okay, that's good. The year before, when Eighth
  Light was in charge of it, you did this kind of -- you went -- one of the things
  I liked was you went beyond just the day-to-day. Like most conferences seem to be,
  okay, we have the conference, we have the sessions, we're going to maybe have an
  after party, but it's usually local or right inside of the facility, where you organized
  like a field trip. Correct. Did you get any feedback from that from people? Well,
  I got some more feedback. I got some really positive feedback. The idea behind this
  was to take, you know, to have a -- instead of a banquet where you would get a DJ
  and gigs really stand up and dance -- Yeah. We were going to take people out into
  buses so that they could network, have a chance to discuss the topics that the speakers
  had rushed on that day, for instance, and we celebrated different areas of Chicago.
  That was one of the things is from people that had spoken with me from out of town,
  they were kind of saying that it was -- they were excited there was a chance to
  go and see things that they might not have known to go see. Because I remember this
  past year's SCNA, some of the people were kind of -- from out of town, they were
  kind of floundering. That's one of the hard things for introverts. Sometimes we'll
  just go back to our hotel room and hack or stay local or not explore. Correct. We'll
  see the hotel room and the conference hotel. Yeah. And so, I mean, the other thing
  was is, you know, you were in the city one year and then you were out near the airport.
  Was there any logistical things that made it more difficult being in the city or
  being outside of the city that -- I think that's -- and primarily from the fact
  that one year, you know, we used to alternate. Tiva would organize and then the
  next year we'd be in flight. And at the time, a flight was mostly located in Chicago.
  It was mostly located in the suburbs. So we had decided -- and, you know, for cost
  reasons as well, to take the conference outside of the city. It was the very first
  year that it was going to be a two-day conference. So to minimize the risk, we decided
  to take it out of the city. And we did it by the airport with a connection to the
  city within the parking garage of the hotel. Yeah. So it was easy to get out there.
  Correct. But cost was one of the big things you were saying. Yeah. If you put events
  together, you know that you don't do this for the money. Right. Right. Right. Yeah.
  But there's still a lot of money that changes hands. But mostly it's outgoing. Okay.
  Well, thank you very much for taking the time to speak with me and looking forward
  to SCNA. Okay. Thank you.
