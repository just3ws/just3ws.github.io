 mean, Iowa City's a little more kind of, like, I mean, there's definitely a personality difference. There's really, I mean, people, Rubyists all over are really kind of similar. Really? You know, like, which is nice because, like, they're mostly nice. And, you know, there's kind of a stereotype that's sometimes true that Connecticut or Connecticuters are sometimes, like, get out of my way. I'm driving here or something. If you sit down with people, like, they're all awesome. Yeah. I always like talking to new Rubyists. Yeah, yeah. No, it's, the Ruby community for me has also been very, very positive. But as far as getting people to come out to the meetings, you know, I've noticed between being in the suburbs and being in the city. And I've heard between just different cities. Yeah, like, and Iowa City did not use Twitter as much, I've noticed, which was a big thing for us. So communication has had to be a little different. And also, as far as, not the technical skill, but the industries that the people are coming out of or working in. I mean, how, is there a different, like, almost comparing, like, a Java group to a Ruby group. There's got to be, like, are they working in the same kind of industry? Do you have a lot of people that are, like, looking at startups, maybe, in Connecticut? Yeah, yeah, there are definitely, there are definitely some more startups. I mean, I still work for a startup in Connecticut. They let me take my job along with me, which was really nice. And, Iowa City, there's more, like, education and stuff, like, Pearson's there. Pearson, like, textbook company and stuff like that. And they have some Ruby involvement. Yeah, but, yeah, definitely more startups, I'd say, in Connecticut. Okay. But that's starting to change in Iowa, which is exciting for me. And that's something I want to help build out. Yeah. And you do a bi-weekly meeting, you said? In New Haven, we do. Okay. In Iowa City, it's right now every three weeks, which is a little confusing. Yeah. Yeah, it's the beginning of the month or the end of the month this time. Yeah, right. And I still have really close ties to everybody in New Haven. And I really want us to, like, be able to collaborate where we've done some by, or, like, we've gotten together for Google Hangouts before. So we had the guy that wrote design patterns in Ruby. His name is escaping me right now. I know which book you're talking about. Yeah. So he came and did a Google Hangout with us and the Rubies, Iowa City Ruby group, and then the New Haven group. And so we're trying to kind of keep the same schedule. We did that as, like, a joint meeting? Mm-hmm. Yep. So, I mean, there's a few hours difference. Oh, just an hour. Oh, just an hour. Yeah. Yeah. Yeah. So. Eastern time versus central time. Yeah, so it's only one hour. Yeah. And it was cool. So, like, we read the book, and then we talked about it, and the author was there, and he took some questions. And, you know, we want to keep doing stuff like that and collaborate because running a user group is hard, and it's hard to keep up the momentum. And if we can work together, it's a little easier. Have you worked out, has there been a difference in approaching sponsors? I mean, some different communities, I've heard, have different levels of receptiveness to sponsoring. Do you work with? So, in New Haven, there were some very vocal members that were against even having job postings, which I think is a vital thing because if we're going to have a Ruby community, we have to have people that can survive being Rubyists. Yeah. So, that was a point of contention a few times until we finally just made it official, no, you can have job postings. But, really, as far as sponsors have ever gone, I mean, we've done O'Reilly books. Those are easy to get. But, for the most part, it's just, like, different companies, they want to help build the local Ruby community, and they help push it forward. And that's why the groups are around, because it's really about the members. That's great. Well, thank you for taking the time to talk with me, Ben. Definitely. Appreciate it.
