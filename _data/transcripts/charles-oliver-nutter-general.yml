content: |-
  Hi, it's Mike again with UGtastic. I'm sitting down today with Charles Nutter. You might know him as Hedius on Twitter and his blog.
   And you might also know him as the leader of the JRuby project. Hi Charles, thanks for taking the time to sit down.
   So you run the JRuby project. Maybe we could start from the origins.
   You know, it's a big project that spans the globe and it has a lot of impact for individual developers and big corporations.
   How did JRuby get started? Well, JRuby itself started in about 2001.
   A guy named Jan Arne Pedersen and a couple other folks wanted to see if they could at least come up with a Ruby parser.
   And once they managed to port the parser over using a Java equivalent device,
   they figured, okay, well, we've got a parser, we can probably do a Ruby implementation as well.
   And the project kind of worked its way along for a few years, got some basic things working.
   In around 2002 or 2003, Tom Ennebo, the other co-leader of the project, started working on it.
   And various other Ruby folks have appeared in the commit logs over the years.
   I actually came to the project in about 2001.
   In about 2004, I went to the RubyConf that year, which was in Reston.
   It was only about 65 people back then.
   And I only was there because someone recommended the language to me.
   I'd never actually seen it before.
   But being a Java guy, I wanted to see if there might be a JRuby project of some kind out there.
   And it turned out there was.
   And Tom, a friend of mine who I'd worked with at the university years before, was currently running it.
   So that's kind of where I got started on it.
   So you said you were doing Java before, and then you learned about this JRuby thing.
   Was it kind of a thing by the time you had started?
   You said there was a conference.
   Yeah, it was really RubyConf that kind of got me into it.
   The thing that I realized was that Ruby, the language, was pretty much the first time I'd been to a conference
   for a language I didn't know.
   And I recognized all the code.
   I was able to understand all the examples.
   And it drew me in.
   I thought that this would be a great language to learn and play with.
   But the only way I was ever going to be able to do that as a Java guy or as a Java lead developer
   was to find a way to run it on the JVM.
   And so you just immediately jumped in and started using it or committing to it?
   Or did you try to use it and find things that it didn't do that you needed?
   And you started contributing that way?
   Well, I played around with it first a little bit just to try out some Ruby examples.
   I quickly realized that there were things that I could do with regular Ruby that I couldn't do with JRuby.
   Even trivial, basic things like at the time, IRB didn't work.
   Rake didn't work.
   Standard tools and commands that you would run on a standard Ruby implementation didn't run.
   And so I was interested in trying to contribute and help out with the project.
   Okay, so you started from where a lot of people start.
   There's this thing out there, you like it, but it doesn't do X, Y, and Z.
   And you started to fix that.
   That's right.
   Actually, you might need to edit this.
   I've got a baby monitor that's very loud at the moment.
   It's okay.
   From where we left off, it sounds like you came to JRuby the same way a lot of people come to.
   A lot of people come to open source projects that you start using it and it doesn't do X, Y, and Z.
   So you start to fix that and implement it yourself.
   And I guess you must have really fallen in love with it at that point.
   Yeah, well, I never actually thought that I'd be interested in implementing a language.
   But it turned out that there were so many interesting problems to solve that needed to be done.
   And I thought the potential of Ruby on the JVM was huge.
   To be able to use a nicer language, to be able to fall into Java libraries, to have access to all the Ruby world.
   It's been a labor of love for the past seven or eight years now.
   And I'd actually worked previously on another open source project called LightStep.
   Again, a project that had kind of gotten quiet, not a lot of people working on it.
   But I was interested in it.
   It was a replacement for the Windows Explorer desktop.
   There were a number of those back in the late '90s.
   That people were working on.
   And I kind of got involved the same way there.
   I wanted the project to move forward.
   I wanted to be able to use it and do more with it.
   And the code base needed a lot of work.
   So it seems like one of my favorite projects is to jump into an open source project and start cleaning it up.
   And make it work a little better.
   And so how did it end up with you being into a leadership position on the project then?
   How did that evolve?
   I guess I wouldn't officially have been considered a co-lead for at least a couple years.
   In 2005 I started getting into the code base a little bit more.
   Trying to figure out how we could speed it up.
   Did several rewrites of the interpreter.
   Started doing some profiling looking for the areas that were the slowest in JRuby.
   And then into 2006 we started really working in earnest on getting all the standard Ruby libraries to work.
   IRB, Rake, RubyGems.
   Started drawing in other folks to work on it.
   And probably about that point that it kind of became apparent that I was putting in a lot of time.
   And I was as much in charge or as much invested in the project as Tom.
   So we kind of decided that we'd be co-leads from then on out.
   Okay, cool.
   Jumping fast forwarding to now.
   There seems to be a lot of concern with the refinements issue.
   And you've expressed a lot of concerns over that.
   Or at least well retweeted and reblogged concerns.
   It's kind of an interesting predicament that you're in.
   Having created this, or excuse me, working on this project that is tightly coupled to another implementation.
   And when it changes in order to maintain compatibility within the language.
   You also have to change.
   How do you reconcile that?
   If it gets to be so onerous to implement these changes.
   I don't know obviously what the actual details are.
   But if it gets to be so onerous.
   Are there plans maybe to even fork off JRuby and have it be its own dialect in the future?
   Right.
   Yeah, as a compatibility project.
   Which is essentially what we are.
   We're just by and large trying to mimic the standard implementation of Ruby.
   We are beholden to them as far as new features that come in.
   Things that we need to add.
   Or things that we need to update.
   So there's been a constant catch up.
   I mean we're always slightly behind them.
   As far as getting new features in.
   Getting fixes in.
   The big change that we had.
   The big work that we had over the past few years.
   Was catching up with Ruby 1.9 support.
   Which was a massive number of changes.
   Especially regarding string encodings.
   And to some extent some threading details.
