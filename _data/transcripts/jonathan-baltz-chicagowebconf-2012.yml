youtube:
  title: "Enterprise Meets Polyglot: Jonathan Baltz on Salesforce, Heroku, and Developer Community | UGtastic"
  description: |-
    Jonathan Baltz, organizer of the Chicago Force.com and Heroku user groups, sits down with Mike Hall at ChicagoWebConf 2012 to discuss the intersection of enterprise stability and polyglot innovation.

    Following Salesforce's acquisition of Heroku, Jonathan explains how he helped build one of the nation's most "involved" developer communities. He discusses the difference between the pragmatic world of Force.com and the exploratory nature of Heroku, the importance of fostering a positive community tone to combat enterprise software frustration, and why the "Don't get frustrated, just ask" rule is key to developer success.

    Key Topics:
    - Building one of the nation's most active Force.com developer groups.
    - The impact of the Salesforce acquisition of Heroku on local communities.
    - Pragmatism vs. Exploration: Salesforce admins becoming developers.
    - Fostering a helpful community to overcome enterprise software "venom."
    - Why polyglot developers are crossing the bridge between enterprise and open-source stacks.

    Speakers:
    - Mike Hall (UGtastic)
    - Jonathan Baltz (Force.com & Heroku User Group Organizer)

    Recorded: October 2012 at ChicagoWebConf.
