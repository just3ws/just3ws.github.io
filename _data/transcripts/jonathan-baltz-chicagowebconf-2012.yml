speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Jonathan Baltz
    role: Organizer of Force.com and Heroku User Groups in Chicago

turns:
  - speaker: M1
    text: "Hi, I'm Mike. I'm here at ChicagoWebConf again, and now I actually have the shirt so I can represent. I'm sitting here with Jonathan Baltz. Jonathan runs the Force.com and the Heroku user groups here in Chicago, and that's an interesting combination: Salesforce and Heroku. One's very lean and light, and the other one is a little bit more enterprise-oriented. Why the two groups?"
  - speaker: S1
    text: "I started organizing the Force.com developer user group in Chicago around April or May of 2010, and over time it became one of the most involved user groups in the nation. In the middle of 2011, Salesforce actually purchased Heroku, and I was asked to start one of the first Heroku user groups here in Chicago. Salesforce knows how big the technology community is here and they wanted us to be one of the first to build community around America."
  - speaker: M1
    text: "When you say 'involved,' what do you actually do at a Force.com meeting? I'm not too familiar with those—is it product presentations, or how to use the platform?"
  - speaker: S1
    text: "By involved, I mean we're continuously having meetings every month and we're active on Twitter and the internet. There are a lot of Salesforce groups, but not many *developer* user groups that go in-depth into the Force.com platform rather than just administration. We also have developer evangelists come talk or join us via Google Hangouts. Through that consistent involvement, we sort of make an impact and other groups look at us as a pattern."
  - speaker: M1
    text: "So other user groups in other cities are looking at what you're doing in Chicago as a model? That's an interesting position to be in. I imagine you get a different audience between Heroku and Salesforce, or do you see the same people in both?"
  - speaker: S1
    text: "Sometimes you get a few people who go to both. These are the people who recognize that Force.com and Heroku are becoming a polyglot platform where you can use different languages. They aren't just interested in one niche; they want to learn technology conceptually. Maybe the way someone uses Java on Heroku can be an idea they apply to Force.com development."
  - speaker: S1
    text: "But generally, Force.com attracts administrators who want to learn development and hardcore Salesforce developers. Heroku gets a wide variety because it's so polyglot—supporting Python, Java, Ruby, Node, Scala, and more via buildpacks."
  - speaker: M1
    text: "So Force.com is a bit more pragmatic—'How can I make my work life better?'—while Heroku is more about exploration and 'Hey, this is neat'?"
  - speaker: S1
    text: "Yeah, 100%."
  - speaker: M1
    text: "I've had to touch Salesforce in the past and didn't always have nice things to say about it. Do you get people coming to the meetings with a chip on their shoulder about enterprise software? Sometimes people take their frustrations out on a corporate vendor more harshly than an open-source one."
  - speaker: S1
    text: "Sometimes, but usually, people don't attend if they aren't interested in the topic. Most people who come are using it or want to know more. When someone shows up with that 'venomous' feeling, we usually talk to them and show them a better way to do it or point them to the developerforce.com boards. The community there is very helpful. The idea is: don't get frustrated, just ask someone."
  - speaker: M1
    text: "Along the lines of that 'venom,' I know Salesforce developers who have to take on so much responsibility because other team members lack interest or knowledge. Is there a sense of relief coming to a Force.com group? A 'blood brothers' camaraderie where you've done battle together?"
  - speaker: S1
    text: "There is some of that, but it's not really what we're looking for. It's not a close-knit support group in that way. It's more about the positive drive to learn more and see how others are working."
  - speaker: M1
    text: "I think that's a really good point. Well, thank you very much for taking the time to sit down with me, Jonathan."
  - speaker: S1
    text: "Thank you."

insights:
  - statement: "The acquisition of Heroku by Salesforce in 2011 created a unique 'Enterprise-to-Lean' bridge in the Chicago user group scene, fostering a polyglot mindset among developers."
    type: durable
