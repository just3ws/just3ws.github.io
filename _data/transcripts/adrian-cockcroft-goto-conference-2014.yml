speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Adrian Cockcroft
    role: Microservices Pioneer and Former Netflix Cloud Architect

turns:
  - speaker: M1
    text: "Hi, it's Mike with UGtastic. I'm here again at GOTO Conf 2014 and I'm standing here with Adrian Cockcroft, who gave the kickoff keynote talk here at the conference. Thank you very much for taking the time to speak with me. Can you tell me a little bit about what your talk was about and how you came to give it?"
  - speaker: S1
    text: "Sure, thanks for having me. The talk really came from two pieces. The first part was about how to speed things up, the speed of innovation being very important, and how to think about what is innovation and what is disruptive rather than what the incumbent companies do."
  - speaker: S1
    text: "There's this phrase I hinged it around: 'It ain't what you know that messes you up, it's what you know that ain't so.' It's a Will Rogers quote. A lot of the disruptions that happen in this industry happen because an incumbent figures out how to optimize for a specific idea and builds a business model around it."
  - speaker: S1
    text: "Then somebody else notices that one of your assumptions is no longer true. You're optimizing for something that used to be really expensive, but now it isn't. The disruptor takes advantage of this thing that everyone else assumes is big and hard to do, but has now become cheap and easy. You end up wasting a lot of something and it looks horrifying to the incumbents—they couldn't possibly do that. But you end up disrupting industries that way."
  - speaker: M1
    text: "The first thing I think about is databases. We have Oracle and MS SQL with big monolithic products, but then along comes open source like MySQL and Postgres running huge operations. They disrupt the business of Oracle."
  - speaker: S1
    text: "Yeah, the concept of open source—the idea that the best software you could buy is the stuff you get for free that's built by a community—is alien to traditional enterprise software businesses. Historically, you had a product manager who came up with an idea, worked on it for a few years, and then tried to sell it to you for a lot of money. I worked for Sun Microsystems for a long time and was part of that process."
  - speaker: S1
    text: "But what really happened was the best things you can get now are free, they are built by communities, and the best engineers don't work at those enterprise companies; they work for end users. The most interesting scale-available reliable software now is coming from open-source projects."
  - speaker: S1
    text: "Another disruption I mentioned was solid-state disk (SSD) replacing spinning traditional disks. If you look at a Cassandra-based deployment on AWS, there is no storage admin, there's no SAN. There's some SSD inside an instance and that's all there is. The person managing it is probably a Java distributed systems developer. The entire product category of SAN fabrics and storage arrays disappears. That's one of the most disruptive things going on right now."
  - speaker: M1
    text: "When trying to change the mindset of people who've built their business on entrenched assumptions, it's a human quirk. You can't just say 'here is a fact, what you know is wrong.' Do you talk about how to approach those thought processes and address them?"
  - speaker: S1
    text: "Sure, I talked about a few other things in the keynote. One of them was continuous delivery as another way of disruptively speeding things up. What it really comes down to is the DevOps approach where you're actually taking away the handoffs between teams."

insights:
  - statement: "True industry disruption occurs when a competitor leverages a previously expensive resource that has suddenly become cheap and abundant, rendering incumbent optimizations obsolete."
    type: durable
    confidence: high
  - statement: "The center of engineering gravity has shifted from enterprise software vendors (like Oracle or Sun Microsystems) to open-source communities driven by end-user organizations."
    type: durable
    confidence: high
  - statement: "The rise of SSDs and cloud instances (like AWS) completely abstracted away the traditional Storage Area Network (SAN) industry, turning storage administration into a distributed systems software engineering task."
    type: durable
    confidence: high
  - statement: "Continuous Delivery and DevOps disrupt organizational velocity by removing the bureaucratic handoffs between specialized teams."
    type: durable
    confidence: high

youtube:
  title: "The Mechanics of Disruption: Adrian Cockcroft on Open Source, SSDs, and DevOps | UGtastic"
  description: |-
    Cloud computing and microservices pioneer Adrian Cockcroft sits down with Mike Hall at GOTO Chicago 2014 to unpack his keynote on speed, innovation, and industry disruption.

    Adrian explains how false assumptions kill incumbent tech companies, using the Will Rogers quote, "It ain't what you know that messes you up, it's what you know that ain't so." He details how the center of engineering excellence has shifted from enterprise vendors (like Sun and Oracle) to open-source end users, and explains how the combination of SSDs and AWS fundamentally erased the traditional storage industry.

    Key Topics:
    - How false assumptions enable industry disruption.
    - The shift from Enterprise Vendors to Open-Source End Users.
    - How Cassandra and SSDs destroyed the SAN (Storage Area Network) industry.
    - Continuous Delivery and the DevOps disruption of team handoffs.

    Speakers:
    - Mike Hall (UGtastic)
    - Adrian Cockcroft (Former Netflix Cloud Architect)

    Recorded: May 2014 at GOTO Chicago.
