speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Adewale Oshineye
    role: Software Craftsman, Co-author of 'Apprenticeship Patterns'

turns:
  - speaker: M1
    text: "Adewale, always great to have you back at SCNA. You've done a lot of work on 'Apprenticeship Patterns'. What's the main takeaway for newcomers?"
  - speaker: S1
    text: "The takeaway is that you are responsible for your own learning. Don't wait for a mentor to come and fix your career; seek out the people and the practice that push you."

insights:
  - statement: "Ownership of one's own learning journey is the most critical trait of a successful software apprentice."
    type: durable
    confidence: high

