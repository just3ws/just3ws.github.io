  Hi, I'm Mike. I'm here at Windy City Rails on behalf of uTastic. I'm standing here with
   Jim Remsick, who does Madison Ruby and the UXMAD. So, Jim, thanks for taking the time
   to talk with me.
   My pleasure.
   Madison Ruby has been on the lips of everybody at Groupon this past couple of weeks. So,
   can you tell everybody a little bit about what is Madison Ruby?
   Sure. So, Madison Ruby was the event that I wanted to go to. We had a couple of goals.
   We wanted to introduce the Ruby community to Madison, and we've had several people say,
   "Wow, Madison. Maybe we'll relocate," but also introduce Madison to the Ruby community
   because there were a ton of people that I knew from attending conferences that were
   awesome people, and we just wanted to introduce the Madison people to them and sort of get
   them involved in the community.
   Okay. And earlier I had heard that you engage the actual Chamber of Commerce. So, you try
   to make it way bigger.
   Yeah.
   Way beyond just a developer conference.
   So, to some degree, yes. We want to bring in people who are interested in Ruby and entertain
   them and give them things to take away that showcase their passion and inspire them. And
   really, that wasn't really a goal going in, but the single most word that I've used here
   to describe this year's conference was, "People came away inspired," which was, you know,
   we were over the moon to hear that.
   That's a great feeling. Yeah, yeah. So, it seems like you have kind of a TED format,
   almost. It seemed like you had the -- I remember seeing pictures of big carpeting and a stage.
   So, there's a three-sided --
   A little more theatrical.
   Yeah. It's a playhouse theater, and it's a three-sided stage, which is just fantastic
   because from the center of the stage, I don't think that you're more than, like, 15 feet
   from any individual person in the theater.
   Okay.
   So, it's a very intimate theater. We do shorter talks. We only do 30 minutes. So, that's
   great.
   We actually had some 20-minute talks this year. And we don't do only ruby. We don't
   do only technical. And so, this year, we happened to have two legendary drummers. We had Clyde
   Stubblefield, who's James Brown's drummer, and we had Martin Atkins, who's a legendary
   punk drummer, been in little bands like Ministry, Big Face, Killing Joke.
   Yeah. Small, small bands.
   Yeah.
   Yeah.
   So, what was kind of the goal there? I mean --
   It's simple. And so, this year, it happened to be drummers, not because we sought out
   drummers, just because those were the people that we found locally. We had a -- since our
   first conference, we've always included a local flavor session, which is we wanted to
   showcase Madison. And so, we had -- the first year, we had a chocolatier, a cheesemaker,
   and the brewer, unfortunately, didn't show up. But we wanted to showcase people that
   are in Madison who are passionate about what they do and that are doing awesome things.
   So, you know, you can't get -- you can't get much more passionate than Martin Atkins and
   Clyde Stubblefield. And they just came in, and they're entertainers, and they killed
   their sessions.
   Yeah. So, as they come in, they talk about bringing passion to what you do or trying
   to -- I mean, because what I would imagine is they're great artists, but also, they do
   the same thing day in, day out. Whereas, we'd like to imagine that we're creating art or
   we are being creative in our industry, but we do it day in and day out. Is that kind
   of --
   Yeah. So, particularly with those two, we just said, you know, come in and tell us why
   you do what you do. And, you know, Clyde told more of a story about how he, you know, started
   out playing two sticks on a trash can lid and how he got to where he is today. And, you know,
   Martin -- a little bit more entertaining -- but he has a, you know, how to do what you do and
   be successful at it. And, you know, it's --
   It's a little more entrepreneurial from --
   A little bit, yeah.
   Yeah.
   So, he actually has a book called "Welcome to the Music Business" -- or "EFT." And --
   Yeah.
   I don't know who your audience is, so --
   Yeah, yeah. It's PG.
   All right. So -- but in -- I'll tell you what. There's a book called "Welcome to the Music
   Business" or "EFT." And --
   Yeah. I don't know who your audience is, so --
