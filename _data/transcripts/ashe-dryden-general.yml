turns:
  - speaker: M1
    text: "Hi, it's Mike with UGtastic. I'm here with Ashe Dryden, who has been involved in the past with DrupalCon, but now she's involved with several other conferences in the PHP and Ruby world. Hi Ashe, thanks for taking the time to sit down."
  - speaker: S1
    text: "Hi there."
  - speaker: M1
    text: "So you were involved with DrupalCon in the past and other conferences in the PHP and Ruby world. You've also had some interesting thoughts on Twitter about diversity and how we can have a more diverse attendance and participation in our conferences. But let's start with the conferences. How did you get involved with DrupalCon back in the day?"
  - speaker: S1
    text: "Well, I've been pretty involved in the Drupal world for probably the past five, six, or seven years. I started out organizing more local camp-style events. I did DrupalCamp Wisconsin and I got to know a lot of the people that are on the Drupal camp circuit."
  - speaker: M1
    text: "Thank you very much for taking the time to sit down with me. That's some good advice."
  - speaker: S1
    text: "Thanks."
  - speaker: M1
    text: "Thank you."

