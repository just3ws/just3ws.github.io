youtube:
  title: "Advocating for Change: Ashe Dryden on Diversity and Conference Organizing | UGtastic"
  description: |-
    Software developer and inclusion advocate Ashe Dryden joins Mike Hall to discuss her journey from organizing local Drupal camps to influencing major technical conferences in the PHP and Ruby ecosystems.

    In this interview, Ashe shares her experiences with DrupalCamp Wisconsin and how community organizing led her to advocate for broader participation and diversity in tech. She provides practical insights for conference organizers looking to build more inclusive and welcoming technical spaces.

    Key Topics:
    - The origins of DrupalCamp Wisconsin and the local 'camp' circuit.
    - Transitioning from Drupal to the Ruby and PHP conference worlds.
    - Strategies for improving diversity and inclusion at technical events.
    - The impact of social media (Twitter) on technical advocacy.

    Speakers:
    - Mike Hall (UGtastic)
    - Ashe Dryden (Diversity Advocate, Developer)

    Recorded: April 2013.
  tags:
    - Ashe Dryden
    - Diversity in Tech
    - Drupal
    - Ruby on Rails
    - Conference Organizing
    - Software Craftsmanship
    - Inclusion
    - PHP
    - Community Building
    - Mike Hall
    - UGtastic
  chapters:
