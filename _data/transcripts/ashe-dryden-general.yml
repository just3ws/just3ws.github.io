      title: "Introduction and DrupalCon History"
    - timestamp: "00:45"
      title: "Organizing DrupalCamp Wisconsin"
    - timestamp: "01:30"
      title: "The Importance of Diversity in Tech"
    - timestamp: "02:15"
      title: "Advice for Organizers and Closing"
