  using JRuby, or encouraging people to use JRuby because of proper threading and,
  you know, some of that support when you''re... Long-running processes. Is that something
  that, like, you... Are you using CRuby or are you starting to encourage people to
  look at JRuby with Heroku or is that...? So, we''ve supported JRuby for quite a
  while, actually. And we work with Charles quite a bit. We also... We have Rubinius.
  It''s actually technically not supported. But it still runs and it works. Our support
  is actually provided through the Rubinius team. Yeah. And so, I just generally encourage
  people to, like, play and have fun. And, like, please, like, if you''re on MRI now,
  try JRuby. And, like, I''ve written... When we first launched JRuby, like, I wrote
  docs on, like, migrating a Rails app and, you know, just some things like... Even
  being... Trying that as a gem author, I was like, "Oh, wow. There''s all of these
  gems that, like, just don''t work on JRuby because of, like, C extensions." And
  so, like, in the future, now that I''m working on gems, I''m very conscious of,
  like, how... Like, on Travis, I always test on JRuby and always test on Rubinius.
  I was gonna say, like, with Travis, you can have multiple targets. Exactly. You
  can just say, "Test this on JRuby or MRI1918." So, you can get some of that flexibility.
  Yeah. And it''s also... The more people who try it, the more people who demand these
