  us to, like, get it into Rails, you know, Rails proper?" And, like, that was a pretty
  good experience and just hung out in Campfire and just did a bunch of work. And
  one day I got an email saying, "Hey, like, we''ve given you, like, like, collaborator
  access. Like, you know, feel free to, like, close out, close out issues and, like,
  you know, do all of this stuff." Right, right. That''s interesting hearing that,
  the path, that it''s a common path. It''s get in there, do something, be helpful,
  reach out, communicate, and if you''re doing good stuff, eventually you''re probably
  going to become a trusted member of the team. And you just keep going. Charles Nutter
