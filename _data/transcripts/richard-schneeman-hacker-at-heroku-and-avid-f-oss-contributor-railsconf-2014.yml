  yeah, but so... It''s a little bit more complicated. Yeah. And it''s like, we...
  Well, we, you know, and so added some warnings and some things, and just this kind
  of, like, gradual trying to gently lead you to the path of happiness and zen. You
  know, and this is probably a question on the left field, but since I mentioned Charles
