  of interaction with people outside the community. You know, how''s that... How do
  you balance that with your... Like, going to conferences and talking, how do you
  balance that with working inside of your own organization? Oh, it''s really tough.
  Any kind of balance is really tough. I, like, I tend to be the kind of person that,
