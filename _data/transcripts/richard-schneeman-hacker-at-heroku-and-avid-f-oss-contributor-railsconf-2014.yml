content: 'It''s Mike with Uteastic. I''m here at RailsConf 2014 and I''m standing
  here with Richard Schneeman, who gave a talk earlier today called Heroku 2014: A
  Year in Review. But he''s also a Rails core contributor and he''s created a few
  libraries over the years. One popular one was Sextant for helping Rails developers
  see their routes without having to run rake routes, and another was Wicked, which
  was a multi-stop form wizard, basically. Thank you very much for taking the time
  to speak with me. Yeah, thanks for having me. I appreciate it. So, Heroku 2014:
  A Year in Review. We''re only a few months into 2014. How do you do that? That''s
  pretty... So, Rails is really important to us, so I measure my personal years from
  RailsConf to RailsConf. Oh, okay. So, it''s a RailsConf standard year. Oh, okay.
  So, it''s like the RailsConf calendar. Yeah, there''s like the Gregorian. Exactly.
  So, yeah, a lot of really interesting things have happened this past year. We''ve
  been majorly focused on performance and a lot of things in that vein. Would you
  like to hear something about that? Yes, yeah. No, please tell me about your talk.
  Yeah, okay, great. So, one of the biggest things that we released is PX Dynos. Okay.
  In the past, a dyno represents 512 megabytes of RAM, and with a PX dyno, instead,
  you get, I want to say, it''s eight gigabytes of RAM and six physical cores. Oh,
  per dyno? Six physical CPUs, yes, per dyno. Okay. So that, in the past, you''ve
  always been able to scale out very horizontally very easily, but if you''re either
  using an application that has a lot of memory use or if you want a lot of concurrency
  per application, let''s say you want to run a bunch of Unicorn workers or Puma workers,
  you can scale out a bunch of Unicorn workers or Puma workers, per actual physical
  dyno, than you weren''t able to in the past. But now we''re focused a lot more on
  not just fast, but consistently fast, is kind of the key with that. So do you work
  with the dyno team, or what is your role at Heroku? Okay, so I work with the Ruby
  task force, so Terrence, Lee, and I are on the languages team, and we are in charge
  of the Ruby experience. That means we maintain the build pack. Whenever you do get
  push Heroku master, and it''s like all bundle install and everything flies by your
  screen, that''s us. Okay. So if like deploying is slow. I definitely use your work.
  Okay, great, great. Many times, many, many times. We also, luckily, the company
  thinks it''s a big part of that product is actually coming out and interfacing with
  the community and like finding real world people, you know, experiencing their pains
  or experiencing like, you know, "Oh, I love, you know, love your work," and just
  figuring out what people like, what people don''t like, how they''re working, and
  where we need to go in the future. So a lot of that as well. Okay. So I, we, yeah,
  we haven''t, my team hasn''t directly implemented the PxDyno''s product, but what''s
  interesting to us is that once they came out with this product and they said, "Okay,
  we think this is important, we think this is valuable," they kind of came to each
  individual language team and said like, "All right, well, how, you know, how should
  people on, you know, Python optimize and maximize this?" And they came to us and
  they were like, "All right, now that we have this, how do people on Ruby, like,
  really take advantage of it?" Exactly, exactly. And so working in like hand-in-hand
  with some customers and doing a lot of experiments, had just one afternoon, I was
  like, "Oh, you know, I wonder how many rescue workers I can run on a PxDyno." And
  I was like, I was like, "I''ll just guess and start at 200. Oh, okay, I can run
  that many." Right. Yeah, I''ll just see how much until we can make it fall over.
  Yeah, exactly. And just playing around. And so I wrote some documentation for a
  rescue pool as a result of that. And so it''s really nice having access to, you
  know, customers who are kind of craving and demanding for these things and that
  are interested in actually working hand-in-hand with you in implementing them and
  getting real world feedback from them. So it''s not just, it''s also been able to
  take a lot of that and take it over to other open-source frameworks like Rails.
  Right. So, yeah, it''s... So as far as the... I''m actually going to have to talk
  to you after this interview about the Px machine because my client does utilize
  that. So that''s very interesting. But that''s not too much for the interview. But
  as far as how did you come to be with HerokuX? I mean, you''re with Rails core.
  Can you tell us a little bit about your journey there? Were you with Rails core
  before Heroku? So I''m actually on the issues team currently. And so I started working
  for Heroku about two years ago, a little over two years ago. Previous to that, I
  was working for a company called Goala. They were competitors to Foursquare, got
  bought by Facebook. And Facebook doesn''t employ a lot of Ruby programmers. Yeah.
  A little different platform. Yeah. And I, like, loved Heroku basically forever.
  And they happen to have a job slot. And for getting involved with Rails, that was
  something that, like, it was my dream to, like, have a commit into Rails. I remember,
  like, bumping into Aaron at a conference at one point in time and being like, "How
  do I do this? Like, how does it even work?" I was like, "I want to add this..."
  It''s like you used to have git and patch and post in your log saying, like, saying,
  "This request is a git request." And for some reason, that got, like, bumped or,
  like, no longer in there. Or maybe it was an error message or something. And I was
  like, "How do I do this?" And, like, he helped me out. And I was like, "This is
