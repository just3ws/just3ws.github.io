  there. But, you know, I''ll... So, instead of working in my room, like, I''ll work
  outside. And if somebody bumps into me and asks me a question about something I''ve
  been working on, or they want to, like... Oh, I''ve... You know, I''ve... Yeah.
  Like, typically, the best feedback is, like, unsolicited feedback. Like, somebody''s
  like, "Hey, you know, I didn''t like this one thing that happened when I was pushing
  to Roku." And I''m like, "Oh." You know, like, I can actually do something about
  that. Right. Like, just, you know, recently, we''ve had some... It''s like, people
  are like, "Oh, I''m getting bad performance." And it''s like, "Oh, well, like, let
  me take a look." And it''s like, "Okay. Oh, I see you''re using Webbrick in production."
  And it''s like... Yeah. And it''s like, "Oh, well, I didn''t know that." And it''s
