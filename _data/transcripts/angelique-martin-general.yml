insights:
- statement: Organizing field trips and structured networking events at technical
    conferences is a highly effective way to encourage introverted attendees to explore
    the host city and engage with peers.
  type: durable
  confidence: high
- statement: Co-organizing large conferences (like SCNA) by alternating years between
    local tech companies (8th Light and Obtiva) distributes risk, financial burden,
    and logistical planning.
  type: time-bound
  confidence: high
- statement: SCNA's core mission centers on developers caring about their craft, improving
    themselves, and contributing to a community of peers through knowledge exchange.
  type: durable
  confidence: high
- statement: Even after major corporate acquisitions (like Groupon acquiring Obtiva),
    the acquired engineering teams often continue to actively sponsor and program
    local community conferences.
  type: time-bound
  confidence: high
youtube:
  title: 'Crafting a Community: Angelique Martin on Organizing Software Craftsmanship
    North America | UGtastic'
  description: |-
    Angelique Martin of 8th Light joins Mike Hall to discuss the logistics and community philosophy behind Software Craftsmanship North America (SCNA).

    Angelique explains how 8th Light and Obtiva shared the organizational burden by alternating years, how they managed the financial risk of scaling to a two-day conference, and why they replaced traditional banquets with structured field trips to help introverted developers explore Chicago.

    Key Topics:
    - The origins and mission of SCNA.
    - Sharing conference organization between 8th Light and Obtiva.
    - How Groupon Engineering continued to support the program after acquiring Obtiva.
    - Replacing banquets with field trips to foster better networking.
    - Managing financial risk by moving venues outside the city center.
