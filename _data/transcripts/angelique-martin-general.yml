youtube:
  title: 'Crafting a Community: Angelique Martin on Organizing Software Craftsmanship
    North America | UGtastic'
  description: |-
    Angelique Martin of 8th Light joins Mike Hall to discuss the logistics and community philosophy behind Software Craftsmanship North America (SCNA).

    Angelique explains how 8th Light and Obtiva shared the organizational burden by alternating years, how they managed the financial risk of scaling to a two-day conference, and why they replaced traditional banquets with structured field trips to help introverted developers explore Chicago.

    Key Topics:
    - The origins and mission of SCNA.
    - Sharing conference organization between 8th Light and Obtiva.
    - How Groupon Engineering continued to support the program after acquiring Obtiva.
    - Replacing banquets with field trips to foster better networking.
    - Managing financial risk by moving venues outside the city center.
