content: |-
  Hi, this is Mike Hall sitting down with Sergio Pereira. He runs the
   Chicago alt.net user group and I'm just going to ask him a few questions about his
   group. We'll start off with, well, what is Chicago alt.net? So it's very hard to
   define what alt.net is. I'm not going to dare try to define it. It's something that
   people want to define when they're starting alt.net, but I can give a few
   traits that could more or less describe the group. So I think we are mostly
   developers that are going after the continuous improvement and
   improvement of self or processes and also the quality of the software that
   you write. We like to think we are not necessarily
   .net developers, but we are developers that happen to use .net a lot. I probably
   like .net a lot, and I think we try to also give a little bit of a voice to
   things that are good practices, good components, good methodologies that may
   or may not come from Microsoft. It may or may not even be .net necessarily, so we
   try to give space for those things to be talked about. So it isn't just about technologies,
   that are related to Microsoft and .net, but things like testing and things like that.
   So that was alt.net, but how do people find out about your user group? Do you have a site?
   Well, we do have our site. We have chicagoalt.net. Yeah, what's more like to that?
   We have an account on Twitter. We have a mailing list. In reality, this site and all the
   communications are mostly about our events and meetings. There's no propaganda of any
   type of thing there. It's really just about the group events, but you can find out by
   subscribing several ways. I think the site has everything you need to know to get info about
   the group.
   Well, so we can contact you via the site or via the Twitter. You said that there's a mailing
   list. I'm sure all that's linked through the site.
   It's all on the site. There's a calendar. There's everything there.
   Okay, and so what is kind of your meeting schedule? Do you hold regular meetings? It's
   a monthly, bi-weekly? How do you do it?
   Yeah, we have a monthly meeting. We almost always meet on the second Wednesday of the
   month. We meet on the Sears Towers. We list towers at Redpoint Technologies. It's usually
   – well, I guess we start 6:30 on those days, and it's once a month.
   Why do you go to 6:30? Why 6:30, which is 6, 5 o'clock?
   I don't really know why. It just has always been 6:30. I guess it's not too bad for people
   that work in the city, and it's viable for people that are catching the train from the
   suburbs.
   Okay.
   So how many people typically do you see at a meeting? How many people do you see at a meeting?
   What is – do you have – I mean, you've been doing this a while. How about over the
   last couple years, how many people have you typically seen? Do you see, like, a few people,
   or is it –
   I think an average meeting would have, like, 25 people.
   We have capacity of about 50, and we hit that several times, but normally it's really around
   25, so it's a good-sized, I think, group for anyone that even has not necessarily given
   talks to other user groups, so I think I encourage our members to give talks, because they probably
   give talks to their, you know, development teams at work, and it's just a little bit
   of a next step to bring their talks to our user group.
   Okay, so, I mean, you try to not just bring in external speakers, but you're trying to
   cultivate speakers inside of the group.
   Oh, for sure, for sure.
   Especially in .NET, .NET's a funny – .NET developers are a funny type of developers.
   I mean, they have grown up being told what tools to use, how to do things, mostly by
   Microsoft. There's not a – you know, it kind of comes with the territory. I mean,
   you work – .NET's a popular platform in businesses and enterprise, and it kind of
   comes with the kind of developers that you end up having in .NET, and so there are not
   a lot of .NET speakers.
   There are a lot of speakers that are into non-Microsoft things. Some are, but they don't
   talk about – there's no venues for them to talk about it. So, one way to change that,
   we believe it's one of the charters of our group, is to create more speakers within the
   community, and so we really try to get our members to be encouraged to present on topics,
   and how often you're going to find a .NET user group that we invite you to talk about
   and hibernate, or go sharp.
   Yeah.
   Or I don't want Ruby to be mine, but, you know.
   Well, I have to say that the first user group I ever went to was Chicago alt.net, and the
   first user group I ever spoke at was Chicago alt.net.
   There you go.
   So, that's why I wanted to interview you first, because Chicago alt.net is always
   – even though I'm not in the .NET community anymore, it's always going to hold a special
   place in my heart. So, ultimately, it really kind of comes down to, for you, you've been
   doing this for a few years now. Why do you do it? Why do you continue to maintain it?
   So, yeah. So, we started this group in late 2007. We had a few formal meetings with myself,
   Derek Whitaker, JDM, and then we had more, you know, get together with more people. I
   think you might have attended some of those. And I think for me, it's the opportunity to
   participate in the process of changing the .NET developer type of definition or stereotype.
   You know, I think there's a lot of room for improvement in your average .NET developer.
   I don't like the terminology, but in reality, that's what it is. And I think that over the
   last four years, not because of my group, of course not, but I've seen so many changes
   in .NET.
   You know, Visual Studio now shipped with jQuery.
   Right.
   Really, that's huge if you look back four years.
   Yeah.
   So, there are many things changing there. Microsoft has an MVC platform. A bunch of
   those things changed over the last four years because of feedback and pressure from people.
   Some of those were associated with .NET back then.
   And I think that makes the .NET developer a better developer, you know, having access
   to things that are just normal.
   So, you enjoy being able to give developers who might not otherwise have an opportunity
   to voice their thoughts and ideas and what they're passionate about, a platform, to come
   and learn about other people's passions and to also share their own.
   Yeah.
   I want to give the regular .NET developer a chance to see back what's happening in the
   world.
