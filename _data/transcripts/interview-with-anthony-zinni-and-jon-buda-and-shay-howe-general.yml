turns:
  - speaker: M1
    text: "Hi, it's Mike Hall with UGtastic. I'm here at WindyCityRails, and I'm sitting down with Anthony Zinni, Jon Buda, and Shay Howe. You guys work together at a local shop?"
  - speaker: S1
    text: "Yeah, we all work at a shop here in Chicago."
  - speaker: M1
    text: "You've been involved in the Chicago community for a while. What's the best part about being a developer here?"
  - speaker: S2
    text: "It's the tight-knit network. You can meet everyone at a single Meetup. Everyone helps each other out, which is rare."
  - speaker: S3
    text: "Exactly. Being able to cross-pollinate design and code in the Chicago scene is fantastic."

insights:
  - statement: "Local tech ecosystems thrive when cross-pollination between design and engineering is fostered through small, tight-knit communities."
    type: durable
    confidence: high

