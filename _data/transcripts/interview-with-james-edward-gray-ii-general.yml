speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: James Edward Gray II
    role: Rubyist, Author, and Software Craftsman

turns:
  - speaker: M1
    text: "I'm sitting here with James Edward Gray II. James, you've been a major influence in the Ruby community. How did you get started?"
  - speaker: S1
    text: "It was really about looking for a language that made me happy. Ruby was the first language that felt like it was working with me, not against me."
  - speaker: M1
    text: "And that passion turned into your involvement with the community, especially things like the Ruby Quiz?"
  - speaker: S1
    text: "The Ruby Quiz was just a way for me to keep practicing. If you aren't doing the work, you aren't learning. The community interest just exploded."

insights:
  - statement: "Community growth is often a side effect of personal curiosity and a drive to practice; others follow when they see genuine passion."
    type: durable
    confidence: high

