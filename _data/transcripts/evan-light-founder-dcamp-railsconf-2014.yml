content: |-
  Hi, it's Mike with UGtastic. I'm at RailsConf 2014, and I'm standing here with Evan Light.
   Evan is the founder and lead organizer for DCAMP, which is in Washington DC.
   Just outside.
   Just outside of Washington DC, and he's also an active contributor to open source for a long
   time in the Ruby community. Thank you for taking the time to talk.
   Sure.
   So we had spoken about DCAMP a few years ago at Windy City Rails. Where is DCAMP now?
   Same place it was, the VDB.
   But as far as organization, is it growing? Do you have more people coming,
   or how do you -- I know you manage your -- you like to curate your audience.
   I don't let it grow. I let -- we have different people. We don't have more people.
   I have some rules of thumb I use for that, and one of them is if I can't memorize everyone's
   name, it's too big.
   Yeah. So how many people can you memorize?
   I know I can do 77. I don't know about more than that, but I know I can do 77, and I can
   keep them in my head for a few days.
   Okay.
   Not necessarily after that.
   Right, right. But at least when you're at the event, you like to keep it personal.
   I want -- yes, exactly. That -- DCAMP is more community than conference.
   Yeah. Well, so for people who might not know what DCAMP is, what is different than -- like,
   we're at RailsConf. We're at a hotel.
   This is a conference. People talk at you at conferences. You have breaks
   where you talk to other people. That's all very informal and structured and lots of crowds.
   DCAMP is a nerd commune in the woods.
   Okay. So it is -- it's out and away from civilization, sort of?
   Sort of. It's at Prince William Forest Park.
   Stone's Throw from civilization.
   Yeah, except you were in the DC area, so Stone's Throw is a long, long way to go.
   Yeah, except you were in the DC area, so Stone's Throw is a long way to go.
   Yeah, except you were in the DC area, so Stone's Throw is a long, long way to go.
   Yeah, except you were in the DC area, so Stone's Throw is a long way to traffic.
   Oh, okay.
   It's just off of Route 95 South and Prince William Forest Park, which is a national park.
   And they have these cabin camps that -- kind of like the kind of thing you might have spent time
   in over the summer as a kid. They're -- they actually have historical significance. They're
   left over from the precursor to the CIA. I forget the name of it off the top of my head.
   Okay.
   They trained in these camps.
   So we use cabin camp three. It supports 78 people.
   Mm-hmm.
   And --
   So for what other reason do you stay in 77?
   77 and me.
   Yeah.
   78 people. That's the number of people who can sleep there overnight. We could technically
   have more during the day, but I'm adamant that we -- that everyone who comes, they have to stay the
   whole time.
   Okay.
   So yeah, the point is to get away from civilization. Yes, there's internet,
   but only if you bring it.
   Oh, okay.
   We don't -- I don't actually supply it at the venue. But the whole point is to get away from
   civilization.
   Okay.
   And isolate that group for three days and the community forums.
   Okay. Get some sunshine, get a little fresh air.
   Not so much sunshine.
   Oh.
   No. Trees. Lots of trees. But yes.
   You get the idea.
   Yeah. Lots of fresh air.
   Yeah. Okay. So how do you -- how do people go? Do they -- do you like do an open
   call for people to join? Or how do you -- how do you manage the attendees?
   So one of the aspects of D-Camp is not -- is while it's an exclusive event and I went
   with that word a little, I try to be even-handed about getting people -- about having people
   come in. And to do that, I don't choose the vast majority of people who come.
   I am -- I take advantage of Eventbrite. They have a system of creating promotional codes.
   Oh, okay.
   And so what I do is I create a bunch of different promotional codes that are good for
   two to five registrations. And I seed those with people I know and trust in the community.
   And I feel a little bit bad doing that sometimes, because over time, a lot of these people have
   become close friends of mine.
   Right.
   I don't want it to be Evan -- the friends of Evan's camp. I want it to be something
   more than just that. But these are people who I trust. So I tell them, find talented,
   passionate, amazing people. And I explicit with them. It doesn't mean experts. It doesn't mean
   novices. It doesn't mean intermediate. It means all. And I also ask them, try not to find all one,
   all the other. Let's get a mix. Different skill sets and perspectives are important.
   It's how we avoid becoming a monoculture, hopefully. And then I kind of do that,
   I guess, as a few rounds. See how many people gobble up codes after the first round of codes go
   out. And then do it until we fill up.
   Okay. And then if somebody can't show, do you open that spot back up?
   Ideally. I've gotten -- a few people push
   back against this. Most people supported this, though. Up until a few years ago,
   we would only have two-thirds attendance, because a lot of people would just not show up.
   Right.
   So I decided at that point -- oh, sorry. To be clear, DKAM is free.
   Right.
   You just have to get there. So I think people here are free,
   and they get a code, and they sign up, and then they don't feel any obligation to cancel.
   But DKAM costs money to produce. The sponsors pay money. They don't -- frankly, they don't get in
   any particular influence by sponsoring. They get their name attached. The ones who spend the most
   money get on a T-shirt. I'm thinking about having scholarship sponsors to pay for travel expenses
   for some people who can't afford to come, but who really ought to come, who would benefit from
   coming. But the sponsors don't get that much out of it. And so not having people show up
   means that that's money left on the table. That's money wasted. Sponsors are losing out that way.
   And the participants lose out that way. DKAM's content is driven by everyone who comes.
   Right. If it's anemic attendance, then there's...
   Then it's anemic content. Exactly. Then we're all less for it. So what I've said is if you cancel
   within less than two weeks of the event, you're banned. You don't get to come back for at least
   two years.
   Oh, wow.
   Yeah.
   So the lights are fired for people to be
   aware. And it also lets people know, hey, this does kind of -- we invited you as a friend, and you
   snubbed us.
   Yep. So since I've done that, we've had, I think, only one no-show a year for two years now.
   So it's pretty much worked.
   Great. And to segue into your open-source work, right now you're with Rackspace,
   and you're working with their open-source outreach. What is that? What are they doing?
   Well, I guess I'm a lot of the face of the Ruby community in Rackspace. And
   I'm part of the so-called developer relations group. And our job is a few different fold.
   As far as code goes, I'm working on a lot of our Ruby SDKs. So that's -- Fog is our official SDK.
   Okay.
   And that is that we work with the other developers in Fog, because Fog is a community
   in and of itself.
   Right.
   And then we have other tools that either work with Fog or just in other ways integrate with
   our cloud. Like we have favorite Rackspace, which under the hood uses Fog. Yes.
   And Knife Rackspace, which I actually haven't touched yet. Paper Clipping Carrier Wave,
   I think we're only just finally starting to realize that we get a lot of traffic from that,
   probably.
   Right.
   So we're trying to work with those to better support Fog and Rackspace.
   So a lot of my involvement is driven by Rackspace's interest in open-source.
   But to that extent, that's just where I'm involved. How I'm involved, though,
   I was hired with the understanding that I'd be trying to look out not just for Rackspace,
   but for the Ruby community.
   Right.
   And Fog has been around for several years, and it's used by lots of people. But
   any project that's been around for several years, there's lots of cruft.
   And we're trying to make things better. For right now, I'm working -- I'm collaborating
   with some guys at HP on writing a new OpenStack front-end for Fog. We call it Provider.
   Okay.
   I guess not really front-end, which is --
   You could say plug-in.
   But it's just how you interact through Fog to OpenStack.
   And going forward, also, we, Rackspace, are hosting a summit for some of the top contributors
   in Fog to try to create more of a roadmap and get more consensus around where Fog will
   go as a project over time.
   I've talked to Wes Berry a little bit, at GMS, the guy who created Fog.
   He's indicated -- Fog kind of grew by accretion, that he started with a fairly
   modest goal. But a lot of people have adopted it and thrown lots of code at it.
   But there hasn't been a whole lot of stopping, catching the breath, and trying to figure out
   what to do next. So it's gotten kind of hairy. And so the hope is with this summit that we'll
   reestablish a sense of direction and have some plan for going forward.
   So by having you at Rackspace, you're able to be that intermediary who understands
   and has been a participant in the community for a long time.
   Yeah, I go between engineering and management. I'm a people person.
   I've got people skills.
   You got it. Yeah, okay.
   Well, thank you very much for taking the time to speak. I appreciate it.
   You bet. You bet.
   User groups with lots to say. Interviews and more. No way. Sharing great ideas in the tech community.
   Fascinating conversations. A plethora of information. Find out for yourself today at ucdastic.com.
   Thank you for listening to this episode of the Rackspace Summit.
   We'll see you next time for another episode of Rackspace.
   Thanks for watching.
