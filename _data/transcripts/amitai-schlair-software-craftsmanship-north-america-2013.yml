- speaker: S1
  text: the BSD license is a permissive free software license with conditions that
    ensure the software remains free and open-source. It allows users to use, modify,
    and distribute the software, as long as they provide attribution and include the
    original license and copyright notice. The BSD license is known for its simplicity
    and flexibility, making it a popular choice for many open-source projects.
- speaker: M1
  text: What sets NetBSD apart from other BSDs?
- speaker: S1
  text: NetBSD differentiates itself by defaulting to every build being a cross build.
    This means that the toolchain that builds the system first bootstraps a toolchain
    from whatever your host system is to whatever the target system you want to build
    for. This allows you to use whatever your fastest computer is to develop for whatever
    system you're targeting, even if it's an embedded device with a totally different
    architecture. This is baked into how the system gets built all the time.
- speaker: M1
  text: Can you explain how NetBSD's approach to testing is unique?
- speaker: S1
  text: NetBSD has a unique culture of testing that is not typically possible in a
    kernel. They have special technology in the kernel called 'Any Kernel,' which
    allows any component of the kernel to be targeted either for direct linking into
    a monolithic kernel or compiling it into a thin layer on top of some other system
    or into a standalone program with all the source code in it. This means you can
    write automated tests for kernel code that, when they break, don't mean your system
    crashed; it just means your process crashed, and your test harness can keep running,
    record the failure, and provide fast feedback. This is not only about security
    but also about testability.
- speaker: M1
  text: How does this approach to testing benefit NetBSD users?
- speaker: S1
  text: This approach to testing benefits NetBSD users by providing fast feedback
    and the ability to identify and fix issues more quickly. It allows for automated
    testing of kernel code, which can help catch bugs before they become critical.
    This recognition that simplicity and orthogonality go hand in hand is a key design
    principle in NetBSD, as it leads to more powerful and flexible systems.
