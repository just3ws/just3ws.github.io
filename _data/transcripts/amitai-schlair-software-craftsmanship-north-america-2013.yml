---
speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Amitai Schlair
    role: NetBSD Foundation Board Member and pkgsrc developer
turns:
- speaker: M1
  text: "[Music] Hi, it's Mike with UGtastic again. I'm here today at day two of SCNA
    2013. Right now I'm sitting down with Amitai Schlair, who sits on the TNF—and
    as you might know, the TNF is the NetBSD Foundation board. I can't even say it
    myself, but it's the board of the NetBSD organization or foundation. TNF—I said
    that beautifully! So anyway, hi Amitai. Thank you very much for taking the time
    to sit down with me. I appreciate it. So, the NetBSD Foundation—that sounds very
    important. What is the NetBSD Foundation?"
- speaker: S1
  text: It's a 501(c)(3) nonprofit, and it's basically—if you're familiar with the
    FreeBSD Foundation, or I'm sure OpenBSD has something like it—we officially accept
    donations that are intended to fund development in NetBSD. And to some extent,
    we determine the project direction, the structure of the organization—because
    it is an organization, even though we're all volunteers—and the disbursement of
    funds where we see that it helps development along.
- speaker: M1
  text: So the NetBSD—that's like the Berkeley San Diego Unix? That's the foundation
    for the i386? In NetBSD's case, it turns out to be a lot more than that.
- speaker: S1
  text: Exactly. BSD stands for Berkeley Software Distribution or Berkeley Software
    Development, depending on when in the '90s you're looking at the expansion of
    the acronym. NetBSD was one of the two projects that kind of forked out of the
    remains of the original Berkeley. The Regents of the University of California
    sometime in the early '90s stopped being able to fund the development that was
    happening in Berkeley, which had been, to begin with, a set of patches on top
    of AT&T's Unix but eventually became its own distribution. One of the hallmarks
    of BSD Unix, other than actually being able to be used by humans to some extent,
    was that it deliberately targeted portability. It was deliberately built and distributed
    from multiple hardware architectures, and that thereby forced it to be designed
    to be able to work on multiple hardware architectures.
- speaker: M1
  text: And NetBSD and FreeBSD are the two major projects that forked around that
    time?
- speaker: S1
  text: 'Yes. Out of the remains of BSD, FreeBSD chose what seems like a prescient
    direction at the time: that they should focus on commodity hardware, because mostly
    that''s what people have. If you eke out every last bit of performance on a 90
    megahertz Pentium, you''ll be glad you did. NetBSD chose that aspect of tradition
    from Berkeley: let''s turn up the knobs to 11 on portability. Let''s stick with
    that tradition. Let''s make sure we''re even more portable. Let''s find more ways
    to share driver code, abstractions that let the drivers be shared, abstract the
    way endianness and other differences between platforms, and just let that drive
    the design. Which is actually why I''m here talking to you today, because when
    I hear about craftsmanship and this conference, the Unix that I think goes best
    with that is NetBSD. I think craftsmen who use Unix and appreciate Unix and appreciate
    craftsmanship should be very interested in that business.'
- speaker: M1
  text: Well, I think there's a lot of people here that don't realize that they're
    very interested in NetBSD. We kind of tease each other about that Apple logo,
    but if I'm not mistaken, the Darwin kernel is based off of NetBSD?
- speaker: S1
  text: It's a complicated story. Naturally, the kernel in OS X is kind of a hybrid.
    A lot of its history comes from Mach, which was developed at Carnegie Mellon.
    MACH—good, kind of like the word Mac, but totally coincidental. It also turns
    out that one of the primary developers of Mach wound up being an executive at
    Apple later for business merger-related reasons. But the kernel is Mach, and there
    is some more to it than that. That's actually not my primary area of work. Where
    NetBSD got involved with OS X is that in an early version of OS X—I think up through
    10.2 or 10.3—most of the user-land utilities were from NetBSD. So if you, for
    instance, are running `/usr/bin/ftp`, it's the one that was developed in NetBSD,
    enhanced by Luke Mewburn, and distributed as an autoconf-buildable piece of source.
    A lot of the utilities in OS X were like that. Somewhere after 10.2 or 10.3, it
    became more of a FreeBSD influence because one of the founders of FreeBSD, Jordan
    Hubbard, was the director of Unix technologies or something like that at Apple.
    So they kind of moved in a FreeBSD direction for user-land. But the kernel is
    actually a different story, and I don't know it very well.
- speaker: M1
  text: So how did you come to be involved? You said the kernel really isn't where
    you're spending your time. Where does Amitai—or 'Schmanz,' his nickname—spend
    his time? What is your focus and what do you do with the foundation as part of
    the board?
- speaker: S1
  text: 'I''m relatively new; I was elected some months ago and just began serving.
    The roles that I had before that were basically two: one that I kind of self-nominated
    myself for (like you do in a volunteer project—whoever does the work becomes in
    charge) and another that I was selected for a while ago. The one I was selected
    for is a project management committee for pkgsrc (package source), which is closely
    related to NetBSD in terms of history and organization but isn''t an operating
    system project. NetBSD is an operating system project; pkgsrc is a package manager.
    Its distinguishing characteristics that are very compelling to me—and I think
    possibly to the people in this audience—are that it is cross-platform. So any
    kind of Unix-y system you have—even if it''s Windows with Services for Unix or
    Cygwin on it, or whether you have root or not—it is still a system you can use
    the same way across all of the heterogeneous Unix-y machines that you have. So
    if you''re a sysadmin, which at times all of us are, it allows you to get the
    tools that you need or the services that you need installed in the same way on
    all the machines you deal with, regardless of what they are or where they came
    from.'
- speaker: M1
  text: So in that respect, it sounds like it's a little bit of Chef and a little
    bit of Homebrew. Is it more like apt or more like a Homebrew kind of thing? When
    you're saying that it goes and it can work on any Unix-y based system, does it
    go and grab source and compile them locally?
- speaker: S1
  text: Exactly. Homebrew is like some of what pkgsrc does. Homebrew is a source-based
    builder of packages that works on OS X, and that's it. pkgsrc is a source-based
    package manager. It also generates binary packages, which you can then reuse and
    distribute, but it's designed to be used with source. So when you go and get your
    pkgsrc tree and say, 'Well, today I want Ruby 1.9.3 installed on whatever the
    heck this system is,' you `cd pkgsrc/lang/ruby193`, `make install`. What happens
    when you do that is that the source code for Ruby is fetched, its checksum is
    verified, it's extracted, and if it has dependencies that have to be built and
    installed in the same way before it can be built, they're installed. One of the
    special things pkgsrc does is to make sure that the build environment on the user's
    machine is identical to that on a dev machine, so the package will be reproducibly
    buildable. And then at the end of it, you have a custom-built Ruby with the parameters
    that you control—but the defaults are pretty good—that's in a section of your
    machine only for packages from pkgsrc. You put it in your path and it does what
    you want.
- speaker: M1
  text: So does it also resolve dependencies and things like that?
- speaker: S1
  text: It does. It goes all the way down.
- speaker: M1
  text: Oh really? Yeah. Because when you're talking about Ruby, I think of various
    management tools like RVM—which I was actually just this morning tweeting that
    they need support—but how do you exist in that? Are you a replacement for that
    or do you...?
- speaker: S1
  text: 'That''s an excellent question. I''m not a Rubyist. I''m familiar with kind
    of an equivalent problem with Perl: that if you want to have different versions
    of Perl with different ''gems'' (in the Perl world) installed, you want to be
    able to get those set up and switch between them and know which one you''re currently
    working with. Perl has ways of doing that. pkgsrc is kind of orthogonal but can
    be used for that. Specifically, what I mean is that you can take one pkgsrc source
    tree and bootstrap the pkgsrc tools and an entire set of packages as long as it''s
    in a different location—it''s totally independent. The parameters can be different
    and the values can be different. So I''ve used that in the past to get one set
    of packages look like this, another set of packages in a slightly different place
    look like that, and you can move a symlink or do some other trick.'
- speaker: M1
  text: Right. So how did you... you said you kind of volunteered for the work and
    you just came to own it. How did that come to be? How did you end up getting into
    position to volunteer?
- speaker: S1
  text: That one is a different piece of work. NetBSD's website, unfortunately, I
    don't think sings the virtues of the operating system and the package manager
    as well as it should. The virtues are terrific; the website is not. So I took
    a hard look a few years ago at why we are having this problem. Some people think
    it's because developers don't like to write documentation. I don't believe that's
    true, especially among craftsmen, which most of the NetBSD developers would agree
    that they are. I think the problem is one of tools that we built ourselves that
    get in the way—tools built a while ago based on old ideas. I think what all of
    us would agree now is a reasonable way to do web content in this day and age is
    something more like a wiki, with a simple input format, simple output format,
    and ideally you can edit it with vi or Emacs in addition to a browser. So I found
    a piece of software that was close to what we needed. I'm also a member of the
    sysadmin team for the NetBSD project, so I knew enough about the web problem,
    the administrators' requirements, and this piece of software that would bridge
    the gap. Then I needed to make it bridge the gap, which is why I'm also a contributor
    to Ikiwiki, which is an open-source Perl-based content management system. I extended
    Ikiwiki so that it met NetBSD's requirements. We stood up an example of it, the
    admins liked it, some users liked it. We now have wiki.netbsd.org, and someday,
    when I have time, that will be how our website is made. So I just kind of volunteered
    for that, and now I'm on the web committee, even though I didn't really mean for
    that to happen!
- speaker: M1
  text: Yeah, but it's an okay way! It sounds like it's a lot of fun. But you know,
    even going back further—why NetBSD? What attracted you to NetBSD to begin with?
- speaker: S1
  text: 'Great question. So, I went to high school about 20-25 miles north of the
    road from here. In high school, the available nerd tooling that I could get at
    was Texas Instruments graphing calculators. At the time, that''s all the programmability
    I could get to, so I got to it. I had one of everything: I had the 81, 82, 85,
    and 92, which was two megahertz faster than the CPU in the Mac Plus we had at
    home.'
- speaker: M1
  text: Oh wow. It's just like today when you have that little iPhone and a three-year-old
    computer—it's like 'No, they're shameful!'
- speaker: S1
  text: Yeah, but so that's what I had. I got into the community around it and was
    invited to participate in a community project we were building called ticalc.org.
    TI themselves weren't real forthcoming supporting all the third-party things that
    were happening, so we wanted to build for ourselves. I was invited to be part
    of that, and they were running on some weird system called Linux 1.something—I
    didn't know the first thing about it. So I said, 'How can I even be useful to
    you guys if what I have is an old Macintosh Mac IIci?' One of the people on the
    project said, 'Oh, if the Mac IIci is what you have, then you should run NetBSD.'
- speaker: M1
  text: So the IIci—that's pretty ancient! You dated yourself there! I didn't even
    realize that—pre-i386, pre-Intel processors—that you could run Unix on an old
    Apple that far back. So the support goes back that far?
- speaker: S1
  text: It does. NetBSD runs on old 68k Macintoshes, Amigas with a similar chipset,
    weird old machines... I don't even know what they all are. A limited-run set of
    machines called the Shark that had an ARM-based processor—but not like the ones
    we have in our phones! That was famous for being silent and having no fan. It's
    also famous for having almost no performance. But NetBSD runs on it. Pretty much
    anything with an MMU is enough, and somebody will port to it if they have an interest.
    By the same token, NetBSD has a reputation for prioritizing compatibility with
    old machines even when it's impractical and gets in the way. There is a maintenance
    cost to people doing kernel and system development, but it's not exorbitant. Nobody
    should be worried that we don't also run really well on modern hardware—we do.
- speaker: M1
  text: So if somebody is looking to learn some of that heritage—they've got a Mac
    and they want to run NetBSD on a PC—I'm presuming I could run a VM? Where would
    I start to look for that?
- speaker: S1
  text: 'Just before I get into the actual answer to your question: on the VM front,
    NetBSD was part of the early development of the Xen system. NetBSD was one of
    the early host systems and one of the early guest systems, and has excellent support
    for Xen both as a Dom0 and a DomU. In terms of how somebody could spin up a machine
    or a virtual machine: it''s a free download, naturally. There are ISOs, tarballs—however
    you want to do it. There are systems that you can get a free shell account on
    to play around with. Another way to start—and what I would probably do first—is
    get to know pkgsrc. You can do that with whatever computer you already have.'
- speaker: M1
  text: So I could use pkgsrc on my Mac?
- speaker: S1
  text: 'You can. I was one of the people involved in porting pkgsrc to OS X back
    in 2001/2002. It was one of the first platforms that wasn''t NetBSD that we ported
    pkgsrc to. Personally, when OS X came out—you asked earlier about how there''s
    NetBSD—I used to have to have two different computers: my Mac that would crash
    at the slightest provocation, and then NetBSD over there that was slow but at
    least would work! When they came out with OS X, it wasn''t immediately a happy
    marriage, but I could see a possible future where I only need one computer. So
    for me, the real win is that there''s enough Unix in OS X, and pkgsrc bridges
    the gap with whatever Apple puts an old version of or leaves out. pkgsrc lets
    you catch up to the exact same versions of things that I would have on my NetBSD
    system.'
- speaker: M1
  text: So, not to be intentionally controversial, but do you recommend people really
    take a look at pkgsrc instead of Homebrew?
- speaker: S1
  text: Well, I'm speaking from ignorance because I haven't used Homebrew more than
    once. I have a git clone of it just so I can see if they have a recipe I want
    to borrow something from, because they're focused on OS X so they may have something
    that pkgsrc doesn't have yet. I have used MacPorts once or twice a long time ago,
    I tried Fink—I have checkouts of them as well for the same reason. But I've been
    so happy with pkgsrc for so long because I can do the same thing on all the machines
    I have.
- speaker: M1
  text: 'A question about pkgsrc: is it also a little bit like Chef? It sounds like
    you can also script a system to build?'
- speaker: S1
  text: You can. There's a concept of bulk builds which we do on auto-build systems
    to see what's broken and to generate binary packages, but a person can also drive
    their own private bulk build if they have a specific set of packages they want.
- speaker: M1
  text: So if I had a brand new install of a NetBSD server—or maybe even a Linux server—I
    could use one of those bulk build scripts to reproduce my environment across different
    servers?
- speaker: S1
  text: Exactly. That also includes things like compile-time options. If you have
    MySQL and you want to build PHP with support for it, or you're setting up Dovecot
    and Postfix for your mail server and you want them to be able to store a greylisting
    database in MySQL or Postgres—it's a compile-time option. You define that in a
    configuration file and the package build finds it. What you wind up with at the
    end includes the choices that you made.
- speaker: M1
  text: And can you hook into any of that stuff with post-install configuration scripts?
- speaker: S1
  text: I'm sure you can. In fact, I went to pkgsrcCon in Berlin in March, and one
    of the best talks I saw there was about Ansible. This is a person who's been a
    pkgsrc developer. I know Ansible is a system of shell scripts, so you can easily
    hook in a call to `pkg_add` and god knows what else. I imagine Chef and Puppet
    and those guys could do the same.
- speaker: M1
  text: Well, it's very interesting, because when you mentioned Ansible... it's one
    of those things I've seen on the periphery but never really explored. But then
    when you talk about this shared heritage and its relationship with pkgsrc, it's
    much more compelling. So, you're here at SCNA and you're interested in the craftsmanship
    conversation. You said it seems like a natural fit for the core of NetBSD. If
    somebody's here at SCNA and looking to contribute back to open source, is NetBSD
    something you might point them at? Where should they look?
- speaker: S1
  text: I would absolutely recommend NetBSD. If what people here are interested in
    is operating system development, NetBSD presents a unique value proposition. First
    of all, as a craftsman, you want whatever you're building on to have been made
    in a craftsman-like manner. You want the tool you were given to be made with quality,
    and then you want to use it to pay it forward. NetBSD is a very simply designed,
    coherent, 'no funny surprises' piece of software—which for an operating system
    is a serious achievement! And then, as a craftsman in the world of business, you
    want the option to extend software without necessarily having to publish the changes
    you make. NetBSD, like any of the BSDs, is superior to Linux in that regard license-wise.
    You have the option of making changes that you can keep private for as long as
    you want to.
- speaker: M1
  text: What's the BSD license?
- speaker: S1
  text: 'The BSD license is: as long as you give attribution, do as you wish. On top
    of that, what NetBSD does that differentiates it from the other BSDs is that by
    default every build is a cross-build. The toolchain that builds the system first
    bootstraps a toolchain from whatever your host system is to whatever the target
    system is. It means you can use your fastest computer to develop for whatever
    system you''re targeting, even if it''s an embedded device with a totally different
    architecture. That''s baked into how the system gets built all the time by everybody.
    And the other thing very unique about NetBSD that appeals to craftsmen here is
    the culture of testing that normally you can''t do in a kernel. NetBSD has some
    very special technology—it''s called ''Anykernel.'' The idea is you should be
    able to take any component of the kernel and target it either for direct linking
    into a monolithic kernel, or compiling it into a thin layer on top of some other
    system, or into a standalone program. The canonical example is: say somebody gives
    you a USB key and you don''t totally trust it. If you attach that to your computer,
    it''s going to run the kernel file system code to mount it. If there''s an attack
    in the format of the file system, that''s going to bite you. So what if you could
    take that file system code and put it in a user-land program that didn''t run
    with privileges? If there''s a bug, it segfaults and your computer keeps running!
    The reason it applies to craftsmen is that it means you can write automated tests
    for kernel code that, when they break, don''t crash your system—they just crash
    the process. You get fast feedback and you can go again.'
- speaker: M1
  text: So it's not only security, it's also testability. It sounds like a recognition
    that those two go hand in hand. A lot of these design principles sort of go hand
    in hand. Halloway said yesterday that when you design for simplicity, the power
    kind of falls out. When you design for the orthogonality of taking the same piece
    of kernel code and being able to build it for any of these target environments,
    all of a sudden you have all these options of how to exercise it. Well, thank
    you very much for taking the time to sit down here. I really appreciate it. And
    the NetBSD Foundation is something you should check out. What's the URL?
- speaker: S1
  text: www.netbsd.org. netbsd.org.
- speaker: M1
  text: Thank you very much. Thank you. [Music]
insights:
