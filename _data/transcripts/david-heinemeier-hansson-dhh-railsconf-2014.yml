  text: Has the ping-pong helped with that? Or--?
- speaker: S1
  text: I think the ping-pong helped me crystallize my thoughts on it a bit. And the
    ping-pong, basically for people who don't know, was sort of people submitting
    a piece of code. I did that on Hacker News a few times, and then there was some
    guy who set up a site for it. And we went over where this code could go. Like,
    we agreed that the original piece of code was bad, and then people would ping-pong
    on it. Some people would then say, "Oh, well, the code is bad because it's in
    the pattern or it's not easily testable," or whatever. And I would try to go in
    a different direction, where whenever I applied this ping-pong, it was about clarity.
- speaker: M1
  text: I'm going to make this code clearer, simpler, easier to understand, lower
    conceptual overhead, all these things, right? And I find out I ended up in a very
    different spot, right?
- speaker: S1
  text: So that's what partly helped me, informed me, is that we are going in different
    directions. You end up somewhere else when you go through test first than when
    you go through clarity first. I don't want to call it that, because I certainly
    don't want to have anything, like, clarity-driven about it. It sounds ridiculous.
    Well, I talked to Dan North, and it's the same kind of thing, where they start
    with an idea, and then it becomes dogma by all the people who adopt it. And then
    they want to have that rigid -- I think that's what the -- I had a quote by Ken
    Beck that's incredibly reasonable. It talks about sort of confidence levels in
    your code. More so than just talking about, well, every piece of code needs to
