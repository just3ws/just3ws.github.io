    writing is a much better metaphor than engineering. And within that, I find that
    one of the main ways that people are driving their development right now is TDD,
    test-driven development. And I've just--I used to be a big fan. And I used to
    be a big fan because it sounded like it made a lot of sense to me.
- speaker: M1
  text: Right.
- speaker: S1
  text: What I found over the years is that the test-first approach, driving your
