    not realistic for me. It's not the real for me. It doesn't arrive at something
    better. I tried very hard, multiple times, and I didn't find that it took me to
    a good place. And the one thing I see with the ping pong is at least it gives
    a concrete A and B that can be talked about and reasoned about. Yes. Before after
    code is -- I'm really a big fan of that, because it crystallizes a lot of arguments
