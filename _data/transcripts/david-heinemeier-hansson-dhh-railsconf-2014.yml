    Well, first of all, I want to say thank you very much for taking the time to talk
    with me. Sure. So your keynote, what was the gist of what you were trying to communicate?"
- speaker: S1
  text: Sure, so I think the identity of most programmers are coming from an age where
    they're trying to do a lot of work, and they're trying to do a lot of work, and
    they're trying to do a lot of work, and they're trying to do a lot of work, and
    they're trying to do a lot of work, and they're trying to do a lot of work, and
    they're trying to do a lot of work, and they're trying to do a lot of work, and
    they're trying to do a lot of work, and they're trying to do a lot of work, and
    they're trying to do a lot of work, and they're trying to do a lot of work, and
    they're trying to do a lot of work. And I think that's the angle that doesn't
    fit the development of information technology very well anymore. And that angle
    is software engineering. I think there's a lot of programmers who create information
    systems where engineering is actually not the primary thing that they do. What
    they do is they write. They're software writers.
- speaker: M1
  text: They're trying to achieve a level of clarity, figuring out, first of all,
    what are they building?
- speaker: S1
  text: It's not like a bridge where you just know, well, it needs to go from there
    to there, and we need to have this structural bearing, and so on and so forth.
- speaker: M1
  text: A lot of systems are very big, and they're very vaguely defined, right?
- speaker: S1
  text: So figuring out what you want to build is very much like figuring out what
