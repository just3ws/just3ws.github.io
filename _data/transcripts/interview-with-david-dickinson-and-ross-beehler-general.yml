summary: |
  The South Bend Software Craftsmanship User Group is a technology-agnostic community that meets semi-monthly to discuss soft skills, higher-level themes, and technical topics. They are moving towards a weekly schedule and focusing on Ruby as a new language to introduce diversity and a different school of thought, while also promoting pair programming and TDD.

  CRITICAL INSIGHTS:
  - Reaching out to the Software Craftsmanship community in a big city can provide assistance and speakers.
  - Moving to a weekly schedule can increase attendance and collaboration.
  - Ruby's established community can facilitate an easier transition for Microsoft developers.
  - Midday meetings during lunchtime can be more accommodating for attendees.
  - Evaluating different methods for community engagement is important for growth.
