   talk.
   Mm-hmm.
   And when I, the first time I said that to me, gave that
   talk, someone said to me, "What
   do you have against the language small talk?"
   No.
   It just proved my point.
   Yeah, yeah, yeah.
   It's like, yeah, come on, right?
   Yeah, exactly.
   Uh, we don't like small talk. So we, we love to debate. We
   love to just sit there
   and, you know, debate things on end and bring out points
   and make sure that we have the last
   point and we're right. Sometimes we don't realize that it,
   it's time to back off. Sometimes
   we don't realize that it doesn't matter of, you know,
   making a concise point about something.
   Mm-hmm.
   It's, we, we miss the big picture.
   Right. And it, it's, I, I kind of feel it's these skills
   that often we're lacking.
   Yeah.
   Right? Because we, you know, like I, I think that it's very
   good for developers to work
   in technical support.
   Mm-hmm.
   Because you learn to deal with customers. You learn to know
   when to back off. You know
   when to concede, to say, "Okay, well, you're wrong, but I'm
   not gonna tell you you're wrong
   because of this."
   Right. Because it's, in the end, it's just not worth the
   battle.
   It's not worth the battle. And what happens is that with
   teams, when you're
   in, when you're with someone that is constantly trying to
   prove his point, it ends up that
   you're just like, "Okay, well, just do whatever you want."
   You know? And that do whatever
   you want can impact your product. It can impact your,
   whatever you're developing. But you're
   like, "Well, it's not worth the friction to, to dispute or
   debate with this guy."
   Mm-hmm. Okay.
   And there's a lot of people that don't realize that at some
   point it's, it's better
   to back off. It's better to, you know, again, not miss the,
   the, the point that we're making.
   That's what we're trying to do. Right? What, what is it
