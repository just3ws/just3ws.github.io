content: Hi, it's Mike Hall again, here with Utesic. Today I'm coming from the GOTO
  Conference Chicago, GoToChicago. I'm sitting down with Hadi Hariri, who is a developer
  evangelist with JetBrain, and one of the talks he was going to be giving today is
  on being an antisocial geek is harmful. Which, I think, is actually very thematic
  for what Utesic is, and it's trying to support people who participate in the community
  and get out from behind the desks. So, thank you again for sitting down with me.
  What is an antisocial geek, if we don't already know what it is, and why is it harmful?
  Well, there's an easy way to get a talk. It's not that we're antisocial. I mean,
  if you define antisocial as someone who wants to disrupt and be aggressive towards
  others and their rights, we're not. We're not antisocial. We're antisocial in the
  sense of we're not really into socializing as much as other people would. It's not
  misanthropic, it's just going in the right direction. A little bit, yeah. So, the
  talk is more about communication and interaction. It's more about the interaction
  between developers, right? And it's more about the experience that I've had over
  the 20 plus years of interacting with different developers, with different teams,
  having run my own company, and seeing the problems that communication or lack of
  it causes between developers and teams. And it's, you know, often you find, like
  in our industry, it's become common to say that developers are introverts. Developers,
  you know, don't mind him, you know, Steve is great at developing, but you can't
  really talk to him. And I think that we are ignoring this, and we're kind of accepting
  that you can't talk to Steve, as opposed to trying to find out why you can't talk
  to Steve, find out why you can't talk to certain people, or why there's so much
  friction when you're talking to certain people. And what happens is that we end
  up with teams where certain people, certain individuals are isolated. And that,
  I feel, impacts the team, it impacts the code, it impacts the company, it impacts
  the goals, everything. And just happiness. Happiness. That you're kind of pigeonholed
  into this, you're a developer, therefore you don't want to talk to anybody. You're
  a developer, therefore you just want to sit in a dark room, and I've seen this culture
  of, we all sit in a dark room, and nobody talks. And then we all go out to lunch,
  and then everybody just chat, chat, chat, chat. Which kind of leads me to believe
  is that people actually do want to talk, and they do want to share, but we have
  this stigma or this preconceived notion of the way we're supposed to act. Yeah,
  I mean, we're great, I mean, it's not that, you know, it's a myth that developers
  are introverts. They're not introverts. What we don't like, and I've discussed this
  in my other talk, the Prima Donna one that I talk about, is that we don't like small
  talk. And when I, the first time I said that to me, gave that talk, someone said
  to me, "What do you have against the language small talk?" I said, "Oh, small talk,
  no." It just proved my point. Yeah, yeah, yeah. It's like, yeah, hold on, right?
  We don't like small talk, so we love to debate. We love to just sit there and, you
  know, debate things on end and bring our points and make sure that we have the last
  point and we're right. Sometimes we don't realize that it's time to back off. Sometimes
  we don't realize that it doesn't matter of, you know, making a concise point about
  something. We miss the big picture, right? And it's, I kind of feel it's these skills
  that often we're lacking, right? Because we, you know, like I think that it's very
  good for developers to work in technical support because you learn to deal with
  customers. You learn to know when to back off. You know when to concede, to say,
  "Okay, well, you're wrong, but I'm not going to tell you you're wrong because of
  this." Because it's, in the end, it's just not worth the battle. It's not worth
  the battle, and what happens is that... With teams, when you're with someone that
  is constantly trying to prove his point, it ends up that you're just like, "Okay,
  well, just do whatever you want," you know? And that "do whatever you want" can
  impact your product. It can impact your, whatever you're developing, but you're
  like, "Well, it's not worth the friction to dispute or debate with this guy," and
  there's a lot of people that don't realize that at some point, it's better to back
  off, it's better to, you know, again, not miss the point that we're trying to do.
  Right? What is it that we're here for? Yeah. Recently, myself, I've had to work
  in a non-developer role in getting to see, mostly dealing with HR people, and getting
  to see how different, because what you described about the way developers tend to
  talk when we're amongst other developers, and then going into human resources where
  it's very much not as rigid as development. They have rules and they have their
  protocols, but the mode of conversation is much different, much more, I don't want
  to say casual, but it is different, and I'm struggling to figure out how to... It
  is, because, you know, we are, we try and apply our coding principles to our conversations.
  Yeah. Like, "Dry," yes? "Why do I have to repeat myself?" or, "Say the minimum possible
  for it to be efficient," you know? It's not efficiency when we speak. And sometimes
  it's not about efficiency, right? Sometimes it truly is about talking about the
  weather or some nonsense or whatever to break the ice, to try and understand the
  other person, right? And that's one other thing that I feel that is lacking a little
  bit in the developer world, which is conveying emotions, like, you know, we don't
  have a lot of empathy often, right? I mean, you've seen, no doubt, you've been involved
  in open source, right? Recently, there was some lady that had put up some code on
  open source, and there was such a backlash on it on Twitter, like, "Who would put
  up rubbish like this?" And when you get high-profile people putting things like
  that, it hurts people, and we don't think about these things, you know? We don't
  think about how our actions in the goal of saying that something is right or wrong
  can end up hurting other people. Yeah, and it's kind of interesting how you are
  describing this. I mean, I don't want to say lack of empathy, but it sounds like
  more of an underused empathy muscle, that we can relate to each other, but we haven't,
  many of us haven't developed that skill dealing with other people. In a more benign
  way, I'm thinking of, in the HR role I've had, is working with developers as they're
  onboarding. Once you get people who've only been at a company under seven months
  or so to talk to somebody who's starting today, and when I'm talking to the person
  who's only six, seven months there, they think, "Well, I don't know enough to be
  able to give useful information to this person." And I don't want to say it's a
  lack of empathy, but they don't remember how to empathize with what it was like
  to be that new person, and realize that they do have a lot of experience that they
  could share. And I think that's really useful for that person, and it's, they can't
  put themselves back in that role of not knowing. It's like as adults, we forget
  what it's like to be a child, if you're a parent, it's hard sometimes to remember.
  But it's an empathy deficit, it seems like. Now, as a developer evangelist, you
  have to deal with a lot of people, I'm sure. Yeah. So, dealing with communities.
  Has this view that you have now, and where this talk came from, and even the pre-Madonna's
  talk you mentioned earlier, is that coming from your experiences largely dealing
  with so many varied communities, .Net, Java, PHP, Ruby, JavaScript, Python? Yeah,
  but I'm not going to badmouth the developer community, far from it, because I'm
  still a developer myself. But I feel that there is a little bit of a lacking. You
  know, I work at a lot of conferences, and I stand in a lot of booths, and I see
  that it's very, often it's hard to engage conversation with people, because people
  are shy to come up and say, you know, like, what do you do, or whatever. So I have
  found it, but more than as an evangelist coming across this, it's been more my experience
  with teams that I've worked with, or teams that I've worked on, right, and it's
  more about the actual root problem. Root problems that often there have been in
  teams. And I've learned to deal with people more openly and be kind of like, you
  know, more open than that, a lot when I was dealing with customers. When I had to
  talk to customers, and that's why I say, I mean, customer support is one of the
  best things that developers should do. I mean, I have had to deal with customers,
  you know, doing technical support in ISP where, you know, the guy would call and
  say, "I can't send email," and you would say, "Are you going to connect it to the
  internet?" And he would say, "I don't want to go to the internet, I want to send
  the email," right? You have to learn to deal with that. And it gives you patience
  and it teaches you how to talk to people, because you can't hang up the phone and
  say, "You're too stupid to send the email." You can't. Well, and the thing is, is
  again, it goes to the empathy, remembering that once upon a time... You were in
  the same boat. You know, you may have been a child when it happened, but once upon
  a time, you did not know what the internet was, and trying to remember. And this
  reminds me of a scenario I had experienced in the military, where I was dealing
  with a bunch of new recruits and asking them which jobs they were going to be taking.
  And of course, one was a medic, and one was going to go to language school, and
  one was going to be an MP, and the other one was kind of said, "I'm just going to
  be a truck driver." And that kind of took me back. She was really like, "Eh, you
  know, I'm not a truck driver." "I'm not as good as these other people." And she
  also, kind of from the other end, forgot that she was going to be providing a very
  valuable service, and that what she was doing was important, and that she was a
  human being and had value. And when we're looking at our ivory towers, we have these
  very fancy jobs. We're senior engineers, and we have these very illustrious titles,
  and we forget that we couldn't have that without the truck driver. Who cares about
  computers? That we're all part of this. If that customer didn't call in and say,
  "I want to send an email. I don't want to get on the internet," if it wasn't for
  that person, then we wouldn't even be able to exist. Much like the truck driver,
  you couldn't even have an infantry without having the trucker who could bring the
  stuff, the supplies. Or the factory worker that puts the chips together on the computer
  that you're using every day. It's everywhere. And it's part of an ecosystem. Yeah.
  And if we can remember that, maybe it might, I won't say humble, but just be more
  aware. Well, I definitely think there is that missing in the developer community.
  I think we all need to be a little bit more humble. We all need to come back down
  to earth and think about what we are doing as part of the global picture, as opposed
  to our personal goals. And there was an article recently. In fact, I think it was
  on Forbes or somewhere about whether we are, they were putting a comparison of,
  are we the Lindsay Lohan or are we the Meryl Streep of Hollywood? As opposed to,
  are we in this startup business of getting venture capitalists and cashing out quick?
  Or are we there to try and really change the world and grow up a business and grow
  it steadily? And I often find that we're kind of more moving towards that big hotshot
  Hollywood. Right? Well, yeah. It's the rock star, the ninja. Yeah, the ninja, the
  rock star. Yeah, yeah. It's very fancy. It's all that. And it's, again, that desire
  to put ourselves up on a higher pedestal, instead of realizing, okay, we're part
  of an ecosystem. We can't do these things without each other. That's one of the
  reasons that I wanted to support and make user group organizers and conference organizers,
  the people that bring people together, be a part of that ecosystem. Yeah. And I
  think that's one of the reasons that I wanted to support and make user group organizers
  and conference organizers, the people that bring people together, be a part of that
  ecosystem. Yeah. And I think that's one of the reasons that I wanted to support
  and make user group organizers and conference organizers, the people that bring
  people together, be a part of that ecosystem. And I think that's one of the reasons
  that I wanted to support and make user group organizers and conference organizers,
  the people that bring people together, be a part of that ecosystem. That's one of
  the reasons I do these interviews, is to help expose that, to support the people
  that build the community and realize that we're in this kind of together, and it's
  more fun to do it together than to do it alone. Everyone plays a role. Everyone
  is important. Yes. Well, thank you very much. Thank you. Thank you very much for
  taking the time to stay with me. Thank you. I really appreciate it. It was a pleasure.
  Pleasure having you. Thank you. That's all right.
