content: |-
  Hi, it's Mike Hall again here with Utesic. Today I'm coming
   from the GOTO Conf in Chicago,
   GOTO Chicago. I'm sitting down with Hadi Hariri, who is a
   developer evangelist with JetBrain,
   and one of the talks he was going to be giving today is on
   being an antisocial geek is harmful.
   Which, I think, is actually very thematic for what Utesic
   is, and it's trying to support
   people who participate in the community and get out from
   behind the desks. So, thank you
   again for sitting down with me. What is an antisocial geek,
   if we don't already know
   what it is, and why is it harmful?
   So, there's, you know, there's easy, there's an easy way to
   get a talk.
   It's not that anti, that we're antisocial. I mean, if you
   define antisocial as someone
   that wants to disrupt and be aggressive towards others and
   their rights, we're not. We're
   not antisocial. We're antisocial in the sense of we're not
   really, you know, into socializing
   as much as other people.
   It's not misanthropic, it's just going for it.
   A little bit, yeah. So, the talk is more about
   communication and interaction.
   Right? And it's more about the experience that I've had
   over the 20 plus years of interacting
   with different developers, with different teams, having run
   my own company and seeing
   the problems that communication or lack of it causes
   between developers and teams. And
   it's, you know, often you find, like, in our industry, it's
   become common to say that developers
   are introverts. Developers, you know, don't, don't mind him
  , you know, Steve is great at
   developing but you can't really talk to him.
   Right.
   And I think that we are ignoring this and we're kind of
   accepting that you can't
   talk to Steve.
   Right.
   As opposed to trying to find out why you can't talk to
   Steve. Find out why you can't
   talk to certain people or why there's so much friction when
   you're talking to certain people.
   And what happens is that we end up with teams where certain
   people, certain individuals
   are isolated.
   Mm-hmm.
   And that, I, I feel that impacts the team, it impacts the,
   the code, it impacts
   the company, it impacts the goals, everything.
   Mm-hmm.
   And just happiness.
   Happiness.
   That you're kind of pigeonholed into this, you're a
   developer therefore you don't
   want to talk to anybody. You're a developer therefore you
   just want to sit in a dark room.
   And it, some, I've seen this culture of we all sit in a
