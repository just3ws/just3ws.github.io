  text: Hi, it's Mike again with UGtastic. Today I'm sitting down with Rob Reynolds.
    You might know him as @VerventCoder on Twitter. He's been around in the .NET community
    creating open source software for a few years now. He started with a lot of Chuck
    Norris themed utilities, Roundhouse and Uppercut. He's even worked on NuGet and
    now his latest project that he's working on is called Chocolaty. It's kind of
    like apt for Windows. So Rob, thanks for taking the time to sit down and chat
    with us today.
- speaker: S1
  text: Thanks for having me
- speaker: S1
  text: . Sure. So we'll work backwards. We'll start with Chocolaty and then we'll
    talk about some of the other projects you've worked with. So what is Chocolaty
    and why and how did you start to work on it? Sure. Chocolaty is your global silent
    installer/updater. We describe it as kind of like apt-get, but for Windows. And
    the kind of means this is not an apt-get clone, which a lot of people are like,
    "Well, this doesn't have apt-get command update." Well, it's kind of like apt-get.
    It's basically a global PowerShell execution engine. And the biggest modules in
    it right now are about getting things installed on your system. But that doesn't
    mean that's all it has to be used for. You can use it for setting configuration
    values, setting registry, setting all that. We called it Chocolaty because it
    builds on top of NuGet's packaging infrastructure. And so this is a global PowerShell
    execution engine. It knows about packaging and versioning so that you could make
    a new version of some configuration or an application and then just update the
    package and somebody could update their system with that. Yeah, and I see like
    on the Chocolaty.org website that you have, the first example is it looks like
    it's automating an MSI installer to install Git. So, I mean, you're launching
    and you're making a new version of Git. So, you're not just installing Git. You're
    making a new version. You're making a new version of Git.
