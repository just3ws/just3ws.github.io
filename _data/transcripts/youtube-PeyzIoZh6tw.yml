   running userbin FTP, it's the one that was developed in NetBSD and enhanced by Luke Niebuhr and distributed as an autoconft buildable piece of source. And a lot of the utilities in OS X were like that. Somewhere after 10.2 or 10.3, it became more of a FreeBSD influence, because one of the developers
   from, one of the founders of FreeBSD, Jordan Hubbard, was the director of Unix Technologies or something like that at Apple. And so they kind of moved in a FreeBSD direction for userland. But the kernel is actually a different story, and I don't know it very well. Okay, so, you know, how did you come to be involved with the, you said that the kernel really isn't where you're spending your time. Where does Amatai or Schmanz, it's a nickname, where's Schmanz?
   spend his time? What is your focus? And what do you do with the foundation? As part of the board, I'm relatively new. I was elected some months ago and just began serving. The roles that I had before that were two, basically, one that I kind of self nominated myself for, like you do in a volunteer project, whoever does the work becomes in charge of it. And another that I was selected for a while ago.
   The other one, the one that I was selected for is there's a project management committee for PackageSource, which is closely related to NetBSD in terms of history and organization, but isn't an operating system project. NetBSD is an operating system project. PackageSource is a package manager. And its distinguishing characteristics that are very compelling to me, and I think possibly to the people in this audience, are that it is cross-platform.
   So any kind of UNIX-y system you have, even if it's Windows with services for UNIX or SIGWIN on it, or whether you have root or not, it is still a system you can use the same way across all of the heterogeneous UNIX-y machines that you have. And so if you're a sysadmin, which at times all of us are, it allows you to get the tools that you need or the services that you need installed in the same way on all the machines you deal with, regardless of what they are or where they came from.
   So in that respect, it sounds like it's a little bit of Chef and a little bit of homebrew or more apt. Is it more like apt or is it more like a homebrew kind of thing? When you're saying that it goes and it can work on any UNIX-y based system, does it go and grab source and compile them locally?
   It's like some of what PackageSource does. Homebrew is, I believe, a source-based builder of packages that works on OS X, and that's it.
   PackageSource is a source-based package manager. It also generates binary packages, which you can then reuse and distribute, but it's designed to be used with source.
   And so when you go and get your PackageSource tree and say, well, today I want Ruby 1.9.3 installed on whatever the heck this system is, CD, PackageSource, LANG, Ruby...
   What happens when you do that is that the source code for Ruby is fetched, its checksum is verified, it's extracted. If it has dependencies that have to be built and installed in the same way before it can be built, they're installed.
   One of the special things PackageSource does is to make sure that the build environment on a user machine is identical to that on a dev machine, so that the package will be reproducibly buildable.
   With the parameters that you control, but the defaults are pretty good.
   A Ruby that's in a section of your machine that's only for packages from PackageSource, you put it in your path, and it does what you want.
