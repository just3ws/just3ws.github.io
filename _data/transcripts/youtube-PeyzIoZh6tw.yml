   BSD stands for Berkeley Software Distribution or Berkeley Software
   Development, depending on when in the 90s you're looking at the expansion of the
   acronym, and NetBSD was one of the two projects that kind of forked out of the
   the death of the original Berkeley. Okay. The Regents of the University of
   California sometime in the early 90s stopped being able to fund the
   development that was happening in Berkeley, which had been
   to begin with a set of patches on top of AT&T's units, but eventually became its
   own distribution. And one of the hallmarks of BSD Unix, other than
   actually being able to be used by humans to some extent, was that it deliberately
   targeted portability. It was deliberately built and distributed from multiple
   hardware architectures and that thereby forced to be designed to be able to work
   on multiple hardware architectures. And NetBSD and FreeBSD
   are the two major projects that forked around that time out of the remains
   of BSD. And FreeBSD chose what seems like a prescient direction at the time, that
   they should focus on commodity hardware, because mostly that's what people have,
   and if you eke out every last bit of performance on a 90 megahertz Pentium
   you'll be glad you did. Yeah. And NetBSD chose that aspect of
   tradition from Berkeley, that let's turn up the knobs to 11 on portability,
   let's stick with that tradition, let's make sure we're even more portable, let's
