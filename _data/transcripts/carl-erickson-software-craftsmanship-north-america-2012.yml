content: |-
  Hi, it's Mike again here with Eukatastic at SCNA.
   I'm sitting down with Carl Erickson who is the CEO of AtomicObject, singular, not plural,
   and he's working on a project called BitCamp where he's working with middle school girls
   so that eventually they can become part of the tech community.
   Can you tell me a little bit more about what is exactly BitCamp?
   Sure, the first time we did BitCamp was in 2006, Michael, and we did it because we recognized
   there were very few women who are studying computer science and then therefore very few
   women in the field as software developers.
   We wanted to try to do something about that, but as a university professor before I started
   Atomic, I recognized that when you start thinking about that issue in freshman of college year,
   that's too late.
   So we wanted to go back earlier and we wanted to start getting girls excited and showing
   them what's possible and what a life of being a programmer is like, a work life, being a
   programmer, but when they're still young enough to not sort of have made up their mind that
   they can't do that or they're not interested in that or that's boring or unexciting or
   whatever.
   And that seems to be middle school.
   They seem to get turned off somewhere around middle school.
   From females in my family that I've spoken with, they think that it's kind of a boy's
   thing, that it's just sitting down and looking.
   They're looking at a computer all day and it's so much more than that.
   It's no collaboration.
   It's a solo sport and you put your little headphones in and you go into your little
   cubicle and they throw food over there and out comes code.
   And our office environment is so much the antithesis of that and our projects are so
   team oriented that honestly collaboration and communication are at least as important,
   those skills, as software development skills.
   So I suspect, if anything, women might actually have a natural advantage in that kind of environment.
   So with working with the young girls, is there a difference in the approach that you have
   working with young females versus young males?
   So we've never done anything with middle school kids.
   My daughter at the time was 14 and so I knew about 14-year-old girls, but we haven't done
   anything formally teaching-wise and I've never taught kids that young.
   So what we didn't, we decided that we wanted to try to give them a little bit of
   an overview and, you know, I was a professor so I had this perspective on some hands-on
   exercises, some simulations, some doing practical things as well as some lecture and we put
   BITCAMP together out of a one-day experience with plenty of snacks and lunch and, you know,
   some fun in between.
   We didn't tailor it one way or other gender-wise and we tried to appeal to lots of different
   ways of learning.
   And we made darn sure that they were paired up when they were working together so it was
   very collaborative.
   What kind of exercises were they doing?
   I mean, was there something that was more, well, actually without leading into any kind
   of topic, what kind of exercises were you having the children do?
   Well, so we really wanted, we were focusing on the web and we really wanted them to have
   a basic understanding of what the web was and how it worked.
   And so of course we were going to do some HTML and CSS and some lightweight JavaScript,
   a little bit of back-end stuff.
   But I also wanted them to have an appreciation when they clicked, you know, the return key
   to send an email.
   I wanted them to have an appreciation of, like, what happened there?
   How did those packets flow across the net and where did they go and what came back?
   So we did this little simulation on the floor with the girls in chairs as packets and we
   pushed them around through the network and showed how it worked.
   So making it real.
   Making it real.
   A response was assembled and we had the little, you know, HTTP response chopped up into pieces
   of paper and then we handed them out and we reassembled it at the back end and trying
   to get it to be a little more physical.
   It's an interesting thing though, we're in a, probably the first time we've ever done
   this in human history where a machine is completely turned opaque.
   Oh yeah, incredible complexity is hidden behind that simple little keystroke.
   And I wanted to give them an appreciation of that.
   And so one of the things though, because we're looking at the idea of community and females
   at conferences, you know, usually are isolated or, well I would say at least very much the
   minority right now.
   Is there been any, and sometimes they're met with a little bit of hostility, a little bit of misogyny when they, when women make a complaint about that or make some kind of observation that, hey, you know, what's going on and trying to figure that out.
   Has there been any negative reaction towards what you're doing, trying to work with children, saying, hey, why are you working with girls?
   Why don't you just...
   No, I have not heard that.
   Okay.
   And I think we have a lot to be embarrassed about in our industry for this, for this project.
   I think we have a lot to be embarrassed about in our industry for this project.
   I think we have a lot to be embarrassed about in our industry for this project.
   I think we have a lot to be embarrassed about in our industry for this project.
   very reason. But in this case, I haven't heard any sort of pushback. Now, after we ran it in 2006,
   we had a steady trickle of people saying, hey, when are you going to do it again? I want my
   child to go through it. And some of those were girls and some of those were boys. So I have
   requests for everybody. There's definitely interest there. The last time we ran it was
   a few months ago in Detroit in our new office there. We partnered with the Detroit Public
   Schools and Oakland University. Oakland University provided students, most of them were women,
   to help mentor and teach. And the students who participated on DPS, some of them didn't
   have a computer at home to register. We had to register them over the phone. Some of them
   took a bus to get to our office. It was a really much different socioeconomic demographic
   than the first time we ran it in 2006. Right. Yeah, and that kind of brings up the concept
   of the digital divide, the accessibility to those technology. And did you, was there
   any difference that you saw between children who had computers at home and their ability
   to learn and adapt to the technology? Or maybe something that you maybe had to help kids
   that might not have been exposed? It seemed like all the girls, even the ones that did
   not have computers at home, were exposed through libraries or school. So no, we did not notice
   a difference. Okay, so yeah, they knew what a mouse and a computer was and all that. Absolutely.
   Well, thank you very much for the work that you're doing. It's really great. And thanks
   Thanks for sitting down with me.
   Yeah, you're welcome.
   Enjoyed it.
