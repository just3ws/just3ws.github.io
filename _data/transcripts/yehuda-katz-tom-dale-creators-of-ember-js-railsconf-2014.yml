content: |-
  Hi, it's Mike with Utesc. I'm here at RailsConf 2014 and I'm standing here with Yehuda Katz and Tom Dale who are the creators of the Ember project and also a contributor to Rails.
   And Yehuda gave a keynote yesterday morning and they also gave a talk about how to build a smart profiler for Rails.
   So thank you very much for taking the time to speak with me, I appreciate it.
   So Yehuda, I know it's the end of the day and we're all pretty tired, but can you sum it up, a little memory of the keynote talk you gave yesterday and what the topic was?
   Sure.
   So we sort of talked about two areas.
   The first area was just sort of talking about the idea of cognitive or ego depletion, which is this idea that we have a limited sort of cognitive capacity.
   It's sort of like you have a battery.
   Like the end of the day at a conference.
   Yeah, like the end of the day at a conference.
   We've made so many decisions today.
   And so a lot of people think of cognitive capacity as something that you drain uniformly through the day or it drains when you work on hard problems.
   But actually it turns out that a lot of the things that drain your cognitive capacity are really mundane things.
   Like making choices or getting into a little bit of an argument can be really depleting.
   You could spend like five minutes getting into an argument.
   And you've probably felt this.
   After five minutes, you drain for the rest of the day.
   Well, it's like when you go to the grocery store.
   If you think about it, you're there for like an hour.
   You're constantly making decisions.
   And you get to the checkout line and there's a candy bar.
   There's a reason there's a candy bar there because making even like what brand of spaghetti sauce should I buy causes your willpower to deplete.
   So willpower, all these things are sort of the same thing.
   And the idea was just showing.
   Showing configuration is the idea that Rails, I think, spent a lot of time and energy advocating for.
   It's basically part of the same thing by reducing choices and getting everyone on the same page about defaults.
   Because defaults are really a psychological hack that we can use to allow us to both, when we're in a really good mood,
   allow us to do more before we deplete and use up too much of our capacity.
   But also keep us on the straight and narrow when we're in a bad mood.
   So you may think when you're being a programmer, what do I name this controller, that you think that it has zero cost.
   In fact, it's actually sapping your willpower and your ability to actually think through the more important problems.
   Yeah, I know I've sat in projects myself and been like, it's hard to even get started because I'm thinking about do I want to do Postgres or MySQL?
   Right, yeah.
   And really silly decisions like that by the time you've made a few of them.
   And I think the important part is not to say, well, we're going to take away your decision making, right?
   Because people don't like losing autonomy for very good reasons.
   What you're saying is we're just going to give you some sane defaults.
   Right.
   Defaults are the hack that you use.
   To prevent yourself from being cognitively depleted.
   So you have the energy to work on the real problems that matter for your business or for your product.
   And even thinking about defaults, did you ever see the movie Moscow and the Hudson with Robin Williams?
   No.
   There's a wonderful scene, it's from the '80s, but whenever I think about cognitive overload, I think about that scene where he goes and he wants to just buy coffee.
   And he's from the Soviet Union.
   He just wants to buy coffee.
   And he looks at the coffee and he says, Folgers, taster's choice.
   And then finally he's looking and then finally he's running.
   And he's looking back and forth and he's like, coffee, coffee, coffee.
   And he passes out.
   Because, you know, those choices hold him up.
   People like, what's the quote?
   People like choices a lot more than they like having to choose.
   Yeah.
   So that was sort of the first half of it.
   The second half was talking about all the excuses that people give themselves to justify not building up these abstractions.
   So I think one of the most common ones is like, oh, I'm so special.
   I have all these special needs, special requirements.
   And if I don't, you know.
   How am I going to make me use a tool that's for everybody?
   How am I going to get my job done with all these things so special?
   And then people, even when people get past that and they say, you know, I am doing really the same thing as everyone else.
   They use this excuse of the law of leaky abstractions.
   Like, oh, these abstractions, these abstractions are always leaked.
   So there's no point in even bothering with them.
   And ironically, you see people making these arguments about leaky abstractions sitting on the top of the most epic abstraction stack, right?
   So you have node people who are really allergic to abstractions.
   But they're sitting on top of not just abstractions.
   You know, not just a hardware abstraction, but C, Unix, POSIX, libUV, you know, one of the most amazing dynamic language jits that ever been created.
   And then on the top of that, they say, oh, promises.
   That's such a heavy abstraction.
   I can't remember how to deal with that.
   Well, this is really funny, too, because you think about, like, it wasn't that long ago that people were literally, like, if you want, like, hardware was bespoke.
   Like, every new chip was completely custom silicon.
   Right.
   And then at some point, processors, CPUs.
   Like, general processors got sufficiently good as an abstraction that everyone's like, you know what?
   It's silly for me to be laying out my own chips.
   Let's just use this off-the-shelf Intel chipset, right?
   And you never think about it.
   No one ever is thinking, okay, I want a new computer.
   Should I get x86 or should I build my own?
   It's like, okay, I'm just going to use x86 or ARM.
   Those are the two things that everyone's agreed upon.
   Nobody thinks about that.
   So it's a little bit arrogant, I think.
   But this happens every layer of the abstraction stack.
   Everyone always thinks, like, well, I wrote this.
   I rely on all these abstractions.
   But I'm at the peak of it.
   The thing that I am doing is so unique.
   Like, really, there's no shared solution or shared abstraction that could possibly encapsulate this problem that I'm having.
   Until you get to it, right?
   I am going to cut this piece of wood.
   I need to go and craft something in which I can separate these pieces of wood from each other.
   Right, yeah, yeah, exactly.
   No, you just go grab the saw.
   Yeah, exactly, exactly, right.
   And it's fine.
   And I think the reason is that people go in when you're -- there's kind of, as Yehuda says, there's this, like, layer of experimentation at the top.
   So there's the abstraction stack.
   There's always a layer of experimentation.
   And especially, like, younger developers, less experienced developers, they come in and they say, well, you know, I tried the abstraction.
   It wasn't perfect yet.
   It leaked a lot.
   It wasn't quite perfect.
   And so their reaction is not, well, I should wait for this to mature.
   Their reaction is, well, of course, this abstraction as a non-principle must be bad because I failed at it.
   Right.
   And then the next time they see an abstraction, they basically just hate it.
   They hate all abstractions.
   And, yeah.
   And I think what's kind of cool is that when you get past this, when you say, no, x86 is a thing.
   Unix is a thing.
   C is a thing.
   You can actually start building much, much higher than you thought you could build before.
   You actually start being able to -- you get into a place where you have shared understanding of what it is that you're building.
   And you can, as Steve Jobs said in the quote that I excerpted in my talk, you can start from the 20th floor instead of starting from the first floor.
   And there's way too many people that are always thinking, oh, I'll just -- you know, I'll start from the first floor every time.
   It's a lot simpler.
   Right.
   But, really, you want to be building things.
   Having that shared understanding allows everyone to kind of, like, solve the question.
   You can solve the problem once and then start building on top.
   And a lot of times, as you could have said in the presentation, that means having shared implementation, like Rails, Ember.
   These are shared implementations that everyone can build on top of.
   But even if you don't share the implementation, even just sharing common vocabulary, having a common interface.
   So a good example that you could have used was the idea of promises in JavaScript.
   Everyone is having to deal with asynchronous values.
   Everyone was having to -- was implementing promises as a way of solving that.
   But everyone is implementing just a little bit differently.
   Right.
   And you really couldn't build -- you couldn't use these pieces together.
   You couldn't build on that abstraction.
   So Dominic DeNicola really was the one that drove, okay, well, hey, look, we're all doing similar things.
   I'm going to write a spec.
   And it's going to be a set of tests.
   It's going to be a test suite.
   And if you write a promises implementation, everyone just conformed to this.
   And that, I think, had really unexpected properties.
   Emergent properties where, okay, now everyone is standardizing the spec.
   Now it's in the DOM spec.
   Now it's in the W3C specs.
   Now it's in the W2C specs.
