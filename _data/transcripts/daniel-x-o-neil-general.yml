   Okay. I would just hyperlink tons of phrases in the obituaries and do research on the person who died. Yeah. And I call that hypertext enjambment, where you, you know, you take a phrase like, perhaps, served as education secretary for President Clinton. Okay. And you take, you know, the phrase President Clinton and link it to, you know, some sideways experience.
   Okay. Or, you know, President Nixon and send it to, you know, a page about his scandals or something along those lines. Okay. So you have sort of editorial content in the links. So the VH1 bubbles before there were bubbles. Yes. Actually, it was after the VH1 bubbles. Oh, okay. But it was exactly, it's exactly the same thing. So I think, and we still, the hyperlink is, is one of the most underused tools on the web.
   Especially the title tag. So I would do things that are, so there's the word, the phrase itself. Okay. That means something. Then there's the hover, the title tag. Right. That can give you different meaning. Or it can give you a layered, right, a layered experience on top of it. And then the actual href where you go, and a lot of times I would link to Google searches. Okay. So you link to a Google search that is tangential or off the inside. Yeah. And then it can have a ton of context that is constantly changing. Constantly updated. Yeah. Isn't that cool? Yeah. So, yeah.
   That was the idea of Google Bits. And I had that on salon.com at that time. So that's when I started getting into creating my own content. So you were starting to dig in, and you were looking at ways already then of finding new fresh content and pulling it in without having to just generate your own content. You could just link to that search. And that was almost like a form of data mining. Yeah. Because you were already saying, okay, I'm going to pass this query and you're going to get these results. That's exactly right. And it's just data.
