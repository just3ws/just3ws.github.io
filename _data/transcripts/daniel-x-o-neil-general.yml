  Hi, it's Mike again with Uketastic. Today I'm sitting down with Daniel X O'Neill. You might
   know him as a poet and a playwright and a little bit of his work that he's done with the open
   governments and you know a few little things. Right now he's the executive director of the
   Smart Chicago Collaborative and also has been to the White House as a champion of change for
   the work he's done with open government. Daniel, thanks for taking the time to sit down. All right,
   good to see you Mike. So how does a poet and an artist go to become the man in the suit? That's
   like that Sprint commercial. We're gonna stick it to the man. Yeah, yeah. But you are the man. So I'm sticking it to myself. Right,
   I've been sticking it to myself for a while. How did I go from being a poet and a playwright to
   where I am now? I guess I don't see it as crazy and circuitous of a path as it seems. In the late 80s and early 90s I was a part of the spoken word poetry scene in Chicago and around the country. I did a lot of tours and I wrote books and
   You know, my mission, my completely silly mission was to become the worldwide entertainment juggernaut of the 21st century.
   That's Juggernaut Co.
   Juggernaut Co. is my handle in a lot of different places, although it's too difficult to spell, so I moved to Arizona.
   I mean, your degree was English and Anthropology. How do you go from being very much creative and expressive to what is now focused on technology?
   Well, I think that, you know, I did get a degree in English and Anthropology from the University of Illinois in Chicago.
   And again, I don't see it as that wild of a path.
   Anthropology is a field.
   It is, you know, a focus on the study of man, the study of human beings, and why they do things.
   And I'm, and English, you know, helps, certainly helped me as a poet, but it's just anytime you have to communicate with people in any job you do.
   So, I don't see it as that goofy.
   And then also, I do continue it through in a number of ways.
   I'm really interested in the archaeology of technology and the recent history of technology.
   And even, like, the current, you know,
   uh,
   uh,
   sort of explication of why websites or technologies are the way they are.
   Mm-hmm.
   Often we'll see...
   Kind of, how did we get here?
   Yeah, why did we make it that way?
   Right.
   There's always a reason.
   There's always a reason for every feature that's in every piece of software.
   And sometimes it can be a very idiosyncratic thing.
   Right.
   And, well, even if you look at just something as simple as the, the style of website design of the last ten years.
   And how it's morphed and changed.
   Mm-hmm.
   And that's sort of, I presume, a very, uh, uh, cosmetic level.
