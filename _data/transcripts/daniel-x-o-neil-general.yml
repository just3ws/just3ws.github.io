   and I ended up just doing a lot of copywriting for marketing firms, design firms. And then I sort of became a project manager for those things because I ended up writing the copy. And then designers can tend to be a little flaky, kind of focused on the art. Pretty. Yeah. And then it'd be like, okay, cool. So, you're going to print this, right? And they're like, oh, no. You should find a printer. Yeah. And then, so, I started doing like, you know, management and project management for those kinds of places.
