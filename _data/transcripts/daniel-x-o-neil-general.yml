   really smart programmers and really good designers, they'll snow you. You know, when you try to say, as a project manager, like, listen, can you do this? Can you put this here? Oh, no. It's impossible. Yeah. You can't do that with this technology. So, I wanted to find out, you know... What can you do? What I could do. So, I started messing around with salon blogs. That was my first blog. That was the same time that the Julie Julia blog was going on. It ended up being the movie. I don't recall that one, but... Yeah.
