content: |-
  Hi, it's Mike with UGtastic. I'm here again at GOTO Conference 2014. I'm sitting here with Michael Nygaard, who gave a talk on DevOps at 5. Where are we now?
   Thank you very much for taking the time to speak with me. Can you tell me a little bit about DevOps at 5? What does that mean and how did you come to that presentation?
   Sure, I'd be happy to. So DevOps was actually coined by one individual. We know when the name was created. It was created by Patrick Dubois in 2009.
   So that was five years ago. And five years is an interesting time span. First of all, it's a round number and humans like round numbers.
   But it's also sort of the time it takes any idea to go from radical to kind of entering the mainstream. It's about half the time it takes for an idea
   to become completely mainstream. And it's about one quarter of a normal career for a working programmer or what you would call the time from entering the field to being a grizzled great beard type.
   So five years was an interesting time to sort of take stock, collect up many of the ideas that people have created, sort of provide a survey for folks who haven't been in it for that time, but maybe are hearing the term.
   Are interested in what it's about. And frankly, also to give some cautions or some warnings.
   And so I wanted to do all of that in kind of one 50 minute package. And that was my talk.
   And I have to say, when I heard 5, I was thinking more of like the volume that it's starting to get to the point where people are talking about DevOps more.
   And that's been kind of a theme a little bit here at GOTO Conference is about lean and lean enterprises and continuous delivery.
   It's about taking this term DevOps and saying, no, this is really something that we really need to think about.
   Yeah, definitely. And we heard that theme echoed by Adrian Cockcroft in his keynote that opened the conference where he talked about the trajectory at Netflix from 2009, where people were saying, no, it'll never work to somewhere around 2012.
   They say it only works for special unicorns like Netflix to 2014, where, you know, a lot of companies are saying, yeah,
   we need to do this, too. And that's definitely how DevOps has gone as well.
   It's gone from this idea that says, well, it's fine for web native companies like Flickr and Etsy, but it doesn't do me any good in my retail organization.
   I've got brick and mortar stores to worry about. But as time has gone on, we've seen that the ideas are quite generally applicable.
   Right. In an earlier interview, we talked to somebody who talked about how they were using continuous delivery, working with the restaurant industry.
   And able to deliver a change 10 hours before opening of a major bar.
   And that these concepts can be applied into serious product development that actually really touches an end user.
   And what might have previously been considered a, oh, my God, we're in a freeze mode, don't touch anything.
   Yeah, definitely. When you look at the reason for freezes and the sort of trade-offs,
   the sort of traditional deployment process, a lot of it is around risk management.
   The idea of saying an event, a negative event has a high cost.
   And so we need to avoid that cost. Right.
   I would turn that around these days and say preventing that event also has a cost.
   It's not as visible in the immediate sense, but it's a cost that you feel in the form of friction and delay in getting things done.
   Right. And so we've changed to a different style of risk management that says,
   I'm going to try and reduce the chance of a bug slipping through to production.
   But I'm also going to make sure that I detect it immediately and can push a new release that eliminates the bug immediately.
   And so in some sense, the number of opportunities for error goes way up.
   But the cost of any individual error goes way down because you're limiting the scope.
   So is it trying to turn what is previously known as a risk period,
   like once we get into a certain period before it goes live, we have code freeze,
   to change is now not a risk, it's just part of the way we approach the product?
   Well, I'm a little cautious about that because there still is some risk associated with it.
   And if you don't adopt any of the other practices and you just go to fast deployments,
   you're going to incur some damage. Okay.
   But as you speed up the deployments, you also need to speed up your monitoring and your metrics.
   You need to make sure that you can detect a problem very quickly.
   So focus on that mean time to detection.
   I've been in many places where the mean time to detection is measured in weeks.
   It needs to be seconds to really say you're doing the DevOps continuous delivery approach.
   And likewise, you need to be able to repair the damage very quickly.
   Adrian talked about detecting.
   Detecting a bad deployment within five seconds of when it goes live.
   Right.
   And automatically switching back over to the old system that's still live and running.
   So in that case, you say a 10-second error, how many users are going to hit that 10-second error?
   Right.
   So again, I'm trying to put it into dollar cost terms where I'm comparing the expected losses
   from bugs slipping through to production versus the expected losses of bugs
   that are already in production that you can't fix because you're in a freeze.
   Yeah.
   So to me, it almost sounds like you're trying to say we're going to reduce that surface area
   of that first group that hits a new change.
   And then once we know, because we've kept that surface area small,
   we can grow it out and then be able to retract much more quickly.
   Absolutely.
   I think of limiting it in space and time.
   So limiting the exposure in space is how broadly is my audience exposed to the new code right away?
   So we use techniques like feature flags and differential routing to let a few people in at a time.
   And then limiting the scope in time is how quickly can I fix the bug when it gets through?
   Right.
   So yeah.
   So the speed of, or even being able to turn it off because like when you detect a feature flag is,
   oh, that one didn't work.
   So that could be that instantaneous mitigation of risk.
   So the term DevOps though, it's still been kind of a high level term.
   And we've talked a little bit about monitoring and continuous delivery.
   When you say the term DevOps though, can you kind of break that down into kind of pieces a little bit more?
   Yeah, I'll try.
   Actually, the schema that I would use comes from John Willis, who talked about DevOps as culture, automation, measurement, and sharing.
   Okay.
   And culture comes first for a good reason.
   So the idea with culture is that we want to create a high trust culture where we have strong and deep collaboration between development and operations.
   This is why, by the way, I consider it a fallacy to hire a new DevOps team that sits between dev and ops and is supposed to be a bridge.
   Because instead of creating a tight junction, what you've really done is now made two handoffs instead of just one.
   Yeah, and they're alien and now there's friction.
   Yeah, absolutely.
   And both sides feel threatened by this new team.
   So the culture is one of enablement and mutual support.
   So where previously operations was frequently held accountable for code they didn't write and the availability and performance of said code,
   now we would close that feedback loop and say operations is going to enable development to move things into production as rapidly as possible
   and also give development the tools to see the effects of what they do.
   Right.
   And now the responsibility is on development to use that ability wisely.
   Right.
   So instead of focusing on process and automation for self-protection, you're focusing on automation to enable your partners
   and collaborators in doing this.
   So that's kind of the culture that we want to create.
   All of the tools, all of the monitoring is in support of that culture.
   And what I'm thinking about when you're talking about the information and not looking at those metrics is how do you kind of protect yourself,
   or should I say mitigate risk, or find the blame, I should say, that's what I was trying to look for.
   Is I think about if I'm running an app and I launch it on my local machine and I'm watching my CPU and my RAM,
   I just want to know how it's doing.
   And that's a normal thing that I do when I'm writing code locally.
   But then we should also maybe look at our entire systems at that same level of detachment from what it's saying,
   that it's not something that we're looking to protect ourselves from.
   Blame or faults, but just how is this system working?
   Yeah. In fact, I would go even farther and say when I'm putting code into production,
   I'm not just interested in how it's doing on RAM and CPU.
   I'm also looking at the effect on the users.
   What's the response time distribution?
   What have I done as far as average latency and the 99th percentile latency?
   What have I done in terms of conversion rates
   and revenue coming into my business?
   These are things that developers can care about and want to improve.
   There's a much older idea that says developers don't care about the business.
   They don't understand money.
   As long as they get to play with their code, they don't care what happens to the business.
   I found that to be a foolish stereotype.
   And so now you'll have developers who will optimize a chunk of code in order to improve
   the response time and get the conversion rate up.
   Right.
   So we need to think more about that when I have a profiler tool,
   that it isn't just looking at bits and bytes, but it's looking at key transactions
   that are meaningful to the customer's experience and how they're going to interact with it.
   Absolutely.
   So all of these tools exist, but they're normally fragmented.
   So the operations group will have the system monitoring.
   Maybe you'll have a user experience group that's got the real user monitoring system.
   And then you'll have the marketing group or the analytics group that's got the business significant metrics.
   They're all being collected different ways.
   That's why you get 60 tracking pixels on a single web page.
   Yeah.
   And they're all going into different databases.
   We actually need to bring them all together so I can see a single graph that shows me,
   I don't know, I/O saturation, a vertical line where a deployment went out, and the conversion rate.
   All overlaid on the same graph.
   So I can see, look, that went out, and crap, the conversion rate went down.
   So here's the next deploy, went back to where it was supposed to be.
   Yeah, or, oh, sure, the CPU or I/O went up, but conversions went up higher.
   Yeah, exactly.
   And that's going to offset us buying more machines.
   Exactly.
   So those kinds of thoughts can be done instead of just, oh, no, we've --
   Right.
   And so the lean thinkers would say that this is optimizing the whole value chain rather than
   locally optimizing pieces of the value chain.
   Right.
   And that's true for the actions we take to deliver the software as well as the value
   chain of the software executing in production.
   Yeah.
   So it's looking at changes in a holistic manner and just seeing how they reflect off of each
   other and whether or not, if there's an imbalance, whether that actually is okay.
   Yeah.
   Okay.
   When somebody goes through your talk, if there's one thing that I, as a developer,
   or a product manager, you'd like them to take away from that talk and go back to their companies,
   to their projects, and try to put some of these new ideas into practice, what would
   you like them to take away the most?
   So I think the number one thing I would like people to take away is you can make these
   changes yourselves.
   Right.
   You don't need permission.
   You don't need approval from on high.
   And you especially don't need to buy DevOps in a box.
   Right.
   Or buy someone's new tool or old tool that's been relabeled DevOps edition or something
   like that.
   Yeah.
   DevOps is a style of working and it can start at the grassroots.
   And if you show some results with it, you'll get more support.
   Right.
   Yeah.
   And that's just how things go.
   What was it that, I think it was, I'm going to say, I think it was kind of back then,
   don't tell them you're doing Agile.
   - Yeah, 'cause they don't understand what you do anyway.
   - Yeah, 'cause the only answer is no.
   - Right. - Right.
   But if you just do something and it works,
   then the answer always is yes. - Then they'll come and ask
   how you did it, and they'll want you
   to replicate it elsewhere.
   - Or at least they'll very much get out of your way.
   Well, thank you very much for taking the time to speak with me.
   - Glad to be here.
