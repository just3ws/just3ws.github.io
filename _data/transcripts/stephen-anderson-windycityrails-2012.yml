speaker_map:
  M1:
    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Stephen Anderson
    role: Founder of Mad Railers and Co-founder of Bendyworks

turns:
  - speaker: M1
    text: "Hi, I'm Mike. I'm at WindyCityRails again. I'm standing here with Stephen Anderson who runs the Mad Railers and is involved with Madison Ruby in Madison, Wisconsin. Thank you for taking a few minutes to talk with me. Can you tell me a little bit about what Mad Railers is and what you're doing up in Madison?"
  - speaker: S1
    text: "Mad Railers—a friend and I started that in early 2006 right after we did the first 'Agile Web Development with Rails' book in a book club. He went on to start teaching Rails at the tech college and he and I launched the user group. I inherited it from him a few years later and I'm still involved in running it."
  - speaker: S1
    text: "Many other people help run it as well, and it's really blossomed lately. We typically have about 20 people at a meeting and we do a wide range of things. The next couple will be an introduction for newbies, and then we're going to split in two and do Koans and Katas."
  - speaker: M1
    text: "So more of a hands-on approach? Traditionally you've been more lecture-oriented?"
  - speaker: S1
    text: "We've traditionally been oriented toward having people talk on a subject, but I'm personally trying to move us toward more 'doing'. I'm going to resurrect open hack days again. I like to do the full days just because it lets you bite off more."
  - speaker: M1
    text: "When I talked to Jim Remsik yesterday, he described how Madison Ruby tries to incorporate the local flavor of Madison into the conference. Is that something that has affected Mad Railers—that Madison has its own unique culture?"
  - speaker: S1
    text: "It certainly does. We don't talk about it much at Mad Railers—because we're all in Madison, so the fish doesn't talk about the sea. But Jim and Jen are very focused on that and exposing technologists to what is wonderful about Madison."
  - speaker: S1
    text: "The Madisonites who participate love it because it opens our eyes to things we hadn't been thinking about. The other thing that's really awesome about Jim's conferences is how they bring in master craftspeople from other crafts—people who are not programmers or designers—to talk about their passion. It seems like the favorite talks are generally not about Ruby on Rails."
  - speaker: M1
    text: "Jumping back to the hands-on sessions—you said you like to do them during the day. How do you work that with people's schedules? Most groups meet at night."
  - speaker: S1
    text: "What I do is just say, 'Hey, I've got the energy to spend a Saturday to host an open hack day.' I post it, and anyone who can make it is welcome. It's something above and beyond the regular meetings. I also want to have a workshop where I can pitch an internal conference model, something we did at Bendyworks. It's a low-pressure way for friends to start speaking."
  - speaker: M1
    text: "Yeah, early GeekFest was like that. User groups provide a safe environment where, once you've established a presence, it's not as scary as standing in front of 100-plus strangers at a major conference."
  - speaker: S1
    text: "Exactly."
  - speaker: M1
    text: "We mentioned earlier about Bendyworks having an interesting relationship with competitors. You showed me your laptop with stickers from half a dozen 'competitors'."
  - speaker: S1
    text: "Well, it's part of the joy in what we do. We're participants in a community that's so friendly and supportive. We're experiencing a market with enough demand that most of the time, our problem is: 'Who can I trust to refer a client I can't help right now?' rather than scratch and clawing to land the next gig. It's a wonderful spot to be in, and it's fun to talk to other shop owners and swap stories."
  - speaker: M1
    text: "Have you ever hired someone you met through the user group?"
  - speaker: S1
    text: "Oh, yeah. Bendyworks itself sprung into existence as a side effect of supporting the user group. I started helping the group and teaching Rails without ever thinking it would become a company. It's also been our main source of employees—support the community, help people grow skills, and every now and then someone stands out who we want as part of our group."
  - speaker: M1
    text: "It's a very synergistic ecosystem: you build the framework for people to learn and grow, you grow yourself, you start a company, and then you hire from that same community."
  - speaker: S1
    text: "Exactly."

insights:
  - statement: "The 'Madison Ruby' culture was unique in 2012 for its focus on cross-disciplinary craftsmanship, inviting master craftspeople from non-technical fields to inspire software developers."
    type: durable
    confidence: high
  - statement: "User groups function as low-pressure 'incubators' for technical speakers, providing a safe space to practice before moving to major conference stages."
    type: durable
    confidence: high
  - statement: "The 'abundance mindset' in the 2012 Ruby consulting market allowed for high levels of cooperation and client referrals between perceived competitors."
    type: time-bound
    confidence: high
  - statement: "Community-driven hiring (recruiting from user groups) ensures a cultural and technical fit, as candidates are already engaged in the 'support and grow' values of the group."
    type: durable
    confidence: high
  - statement: "The transition from a 'book club' to a 'user group' to a 'software company' (Bendyworks) demonstrates how community service can inadvertently act as the foundation for a successful business model."
    type: durable
    confidence: high

youtube:
  title: "Community as a Side Effect: Stephen Anderson on Mad Railers, Madison Ruby, and Bendyworks | UGtastic"
  description: |-
    Stephen Anderson, founder of the Mad Railers user group and co-founder of Bendyworks, joins Mike Hall at WindyCityRails 2012 to discuss the unique technical culture of Madison, Wisconsin.

    Stephen explains how a simple Rails book club evolved into a thriving user group and, eventually, a successful consulting firm. He shares his philosophy on "abundance mindset" cooperation between competitors, the value of Saturday "Open Hack Days," and why the best talks at a Ruby conference often have nothing to do with code.

    Key Topics:
    - The origins of Mad Railers: From book club to community pillar.
    - Madison Ruby's cross-disciplinary approach to craftsmanship.
    - Why Saturday hack days are more effective for deep learning than weeknight meetups.
    - The "Abundance Mindset": Referring clients to competitors in a high-demand market.
    - Synergy: How supporting a user group became a primary recruiting engine for Bendyworks.

    Speakers:
    - Mike Hall (UGtastic)
    - Stephen Anderson (Mad Railers, Bendyworks)

    Recorded: September 2012 at WindyCityRails.
  tags:
    - Stephen Anderson
    - Mad Railers
    - Madison Ruby
    - Bendyworks
    - Ruby on Rails
    - Software Craftsmanship
    - User Groups
    - Community Organizing
    - Madison Tech
    - Hiring and Recruiting
    - Mike Hall
    - UGtastic
