- speaker: S1
  text: Lean UX is a design approach that emphasizes delivering a user experience
    as quickly and efficiently as possible. It focuses on collaboration between designers,
    engineers, and product managers to break down silos and work together like a startup.
    The goal is to validate assumptions and pivot quickly if necessary, in order to
    get to customers as quickly as possible.
- speaker: M1
  text: That's great. Can you give me an example of how lean UX has been implemented
    at Braintree?
- speaker: S1
  text: Sure. At Braintree, we use lean UX to design and develop our APIs. We work
    closely with our engineering team to ensure that our designs are technically feasible
    and that we are delivering a high-quality user experience. We also use lean UX
    to validate our assumptions and pivot quickly if necessary. For example, we recently
    launched a new feature that allowed customers to easily manage their subscriptions.
    We used lean UX to design and test this feature with a small group of customers,
    and based on their feedback, we were able to make quick adjustments and improve
    the feature before launching it to a wider audience.
