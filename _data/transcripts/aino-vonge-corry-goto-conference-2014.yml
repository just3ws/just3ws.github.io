    name: Mike Hall
    role: Interviewer, community organizer at UGtastic
  S1:
    name: Aino Vonge Corry
    role: Expert in Retrospectives and Speaker Introducer

turns:
  - speaker: M1
    text: "I'm sitting here with Aino Vonge Corry. You do a lot of work with retrospectives and you're a speaker introducer at GOTO. Thanks for sitting down."
  - speaker: S1
    text: "It's a pleasure, Mike. Retrospectives are my passion—not just as meetings, but as a framework for continuous improvement."
  - speaker: M1
    text: "What is a good retrospective?"
  - speaker: S1
    text: "A good one focuses on 'what can we actually change?' It avoids blame and focuses on the team's internal power to influence their own workflow."

insights:
  - statement: "Retrospectives fail when they devolve into blame sessions; they thrive when they focus exclusively on team-internal variables that can be influenced."
    type: durable
    confidence: high

