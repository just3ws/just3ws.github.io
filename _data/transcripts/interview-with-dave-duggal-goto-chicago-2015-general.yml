---
content: |-
  Hi, it's Mike with UteTastic. I'm here again at GOTO Conference 2015. I'm sitting here
   with Dave DeGaulle, who is giving a talk on distributed processes. Thank you very
   much for taking the time to speak with me. So, distributed processes, it seems to
   be kind of a theme here at this year's GOTO Conference, but what is about
   your talk and how are you describing this concept?
   Thanks for the interview. So, distributed processes are very timely.
   Obviously, everybody's trying to figure out, and this is a very difficult
   domain, right? So, I think people have been, I think we've moved over the last five
   years from things being partially distributed to, we're almost like living
   distributed now, right? And people are dealing with the scale, they're dealing with
   asynchrony, they're dealing with being parallel, and these are very complex issues, right? Managing
   caches and state at scale. So, this talk is going to be describing our real-time
   data-driven policy control system, and we're going to be talking about
   how to build a platform, and we're going to describe how we, in detail, we're going to
   describe our architecture, and how we solve some of these problems, making it a lot easier
   for developers to build solutions over the platform without worrying about the implementation
   details, and that's the whole sort of advantage of our solution, is to actually eliminate
   some of the worst, or the most challenging aspects of distributed computing.
   Yeah, because it sounds like some of the tools are coming out, I described
   earlier as being kind of second-generation tools that are not only more powerful, but
   a little friendlier to use. And I know you're the CEO or founder of EnterpriseWeb, and what
   is it about your product that answers that solution, or that need?
   This is a great question, and I think that's true, actually. I think there's two things.
   I think there's a maturity on the vendor side, and also on the market side, right? I think
   people have already scraped their knees a couple times, bruised themselves quite a bit.
   They know what they didn't work.
   Yeah, they know it doesn't work, they don't believe hype really anymore, right?
   Yeah, can't just say the cloud.
   Yeah, that didn't work anymore. So now, actually, what people are looking for is the real solutions
   that they can test at scale, and that solve real complex problems. So it's an exciting
   time, because actually, we're talking about problems of computer science, actually, that
   people have been struggling with for 30 years. These aren't just problems of our moment,
   we're actually pioneering now how to be fully distributed in real time, data-driven, right?
   And keep that cohesive, right? Because that could easily fly away from you if you don't
   have it under control. So to your question about how do we make that more accessible,
   more friendly, first of all, the system's fully declarative. And we adopt a paradigm
   that's probably the most friendliest paradigm for all developers, is the system actually
   acts like the library, right? The system essentially makes all of your endpoints, whether they're
   the remote objects, microservices, APIs, or web services, or in-process objects that actually
   live inside our system. That might be data models, process models, policy models. And
   it makes them all look the same. It creates a consistency layer. It creates one loosely
   coupled, well-understood layer, and it's horizontally scaled.
   It's not just something that's available. Think of it as a logical store, but it's not
   just data. It's data, code, diverse objects, right? And by creating a consistency layer,
   we make everything look the same, and it's an abstraction, right? It's a data abstraction
   inside our system. Everything looks the same. If everything looks the same, I can navigate
   it the same way. I can search it the same way. I can reason over it across the same
   way. So I can now be searching, declarative, right through the UI. I can actually be walking
   relationships between objects that don't actually live anywhere near each other. They're completely
   in the system. It's going to look like, "Wow, I'm going to look at the mic object here,
   an entity in our system. I'm going to see every application you've ever touched. I click
   into an application. I can see an instance that you worked on. I can see the data and
   code behind that instance. I can actually click into the models of the remote objects
   that might have been. I can actually see the version of the policy that applied on the
   day that you did that transaction. And I do that front to back. And that kind of tracing,
   dependency mapping, library kind of access is probably the most friendly thing you could
   do to a developer, because then everything else is gravy.
   I think the functionality is always the challenge. I mean, we went from WSDL and SOAP, which
   at least you had this manifest that you could look at and say, "Well, this is what my methods,
   my SOAP calls look like, and this is the interaction I can expect," to Rust, which is, "Well, it's
   kind of a shape, but people kind of had their own shape of a shape," and didn't always quite
   conform to kind of the nebulous vision of-- I mean, I'm sure if you got really deep into
   it, Rust had a very concrete definition. But it wasn't always the case.
   It wasn't really discoverable. This is answering some of those problems of when I sit down
   and I look at an environment and, like, what can I do here?
   Yeah, absolutely. And it is a big problem of shared understanding, right? How do clients
   and servers understand each other, right? And how do diverse objects declare themselves
   to a system so they can be managed, right? Because it's 2015, and we still-- when people
   say continuous integration, right, that's talked about a lot here, continuous delivery,
   continuous integration. The word they forget to leave out, the silent word between continuous
   integration is manual, right? Look at the API. Read the API. Wire the API into my process
   and app. So from the process and app layer, everything looks still ugly, right? It's only
   in the service and API abstraction layer does it, "Oh, look, it's all loosely coupled. It's
   so nice. And look at that. I've liberated things from my systems." That actually is
   great. It is in advance. We've achieved some loose coupling. But when we're doing three-tier
   vertical integration at the apps and the process layer, we're nowhere. We've moved the ball.
   Yeah, we're still tying things together, just--
   You know, the funny part about it is I think 10 years from now, people will be like, "You
   did what to what?"
   Yeah, yeah.
   "You manually integrated that?"
   Yeah.
   So we're actually automating interoperability itself because we do everything declaratively.
   Once your objects are declared in our system and you can now navigate them, I can now compose
   them in this one system by point and click by metadata because everything's described
   in its metadata. And you as a developer, you can pick up any individual object, look at
   all its dependencies. You could fully understand it. You could see everything that's consuming
   it and et cetera. But at runtime--
   You don't have to wire it into an app. An app just has to point to it, and system agents
   will go out and figure out all the dependencies or requirements to fulfill that contract and
   render the value back up to the application process.
   Sounds like a really hard problem.
   It was a week-round. We took two years. So we're a lean startup. We've taken new capital.
   We're profitable on our own. We're customers on four continents. We just signed a deal
   with one of the world's largest consulting firms. We haven't been able-- We can't announce
   a point yet.
   Right, right.
   It's building a practice around our technology.
   We've been building a practice around our technology for differentiated solutions. We
   took the first two years of our company, no pay. We didn't seek any customers. Just to
   work out the abstractions because we knew-- A lot of people are biting off-- There's a
   lot of companies out there, right? A lot of people are biting off small chunks of a problem,
   but distributed computing is a big problem. And if you only bite off a chunk, you're just
   adding another component to a complex architecture already.
   Right.
   Oh, gosh. We really need a layer, right? We need an enterprise web. I need a way to wrap
   the enterprise in this thin veneer. Middleware shouldn't be a stack, right? Middleware should
   be this thin horizontal layer between my objects and the behavior I want.
   Right.
   And that's really accessible to developers. It's a different way of thinking, but they
   know libraries, they understand dependencies, and if they can do all this declaratively,
   they can focus on new connections and business value, then I think that's a win.
   Great.
   Well, thank you very much for taking the time to speak, Fred.
   I appreciate it.
   Thanks, Mike. I appreciate it.
   Thank you.
