youtube:
  title: "Beyond the Sales Pitch: Ethan Gunderson & Ryan Briones on ChicagoDB and Gathers.us | UGtastic"
  description: |-
    Ethan Gunderson and Ryan Briones, the minds behind Gathers.us and ChicagoDB, sit down with Mike Hall to discuss the philosophy of building community tools and the reality of the NoSQL "bleeding edge" in 2012.

    In this interview, they explain why they built Gathers.us as a frictionless alternative to paid event platforms and share the "selfish" origins of ChicagoDB: a desire to master database theory by reading foundational white papers from Amazon and Google. They also provide a blunt assessment of why most technical "innovations" are actually 35-year-old ideas in new packages.

    Key Topics:
    - Designing Gathers.us: Why removing user accounts increased event attendance.
    - The "Won Argument" that led to using MongoDB for Gathers.us.
    - Reading the "Ivory Tower": The challenges of a white-paper-based user group.
    - Why vendor talks often lack the architectural trade-offs developers need.
    - The fracturing of database communities into specialized "platform silos."

    Speakers:
    - Mike Hall (UGtastic)
    - Ethan Gunderson (Gathers.us, ChicagoDB)
    - Ryan Briones (Gathers.us, ChicagoDB)

    Recorded: August 2012.
  tags:
    - ChicagoDB
    - Gathers.us
    - NoSQL
    - MongoDB
    - Database Theory
    - DynamoDB
    - Bigtable
    - Chicago Tech
    - User Groups
    - Community Organizing
    - Software Architecture
    - Mike Hall
    - UGtastic
