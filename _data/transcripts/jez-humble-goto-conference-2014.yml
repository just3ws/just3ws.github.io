youtube:
  title: "Culture, Flow, and TDD: Jez Humble on the True Definition of DevOps | UGtastic"
  description: |-
    Jez Humble, co-author of "Continuous Delivery" and a founding voice of the DevOps movement, joins Mike Hall at GOTO Chicago 2014 to break down the culture and practices that create true software flow.

    Jez cuts through the industry buzzwords to define DevOps as a culture of collaboration and continuous learning. He explains how the principles of the Toyota Production System apply directly to software check-ins and builds, why Continuous Delivery is about economic feedback loops, and why Test-Driven Development (TDD) is fundamentally an exercise in user-centric API design rather than just quality assurance.

    Key Topics:
    - Defining DevOps: Why it's about culture, not just deployment.
    - Continuous Delivery as an economic enabler for small batch sizes.
    - Creating "Flow": Applying the Toyota Production System to software.
    - Why quality cannot be tested into a product by a separate team.
    - The architectural value of TDD: Designing from the consumer's perspective.

    Speakers:
    - Mike Hall (UGtastic)
    - Jez Humble (Author of Continuous Delivery, DevOps Pioneer)

    Recorded: May 2014 at GOTO Chicago.
