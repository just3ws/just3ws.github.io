# just3ws.localhost — static resume/portfolio site (the built _site/).
#
# Project-owned vhost (same pattern as my.conf / decision-011: the project owns
# its vhost and deploys it to nginx, rather than tracking it in zdots). Deploy
# with bin/install-localhost. nginx serves the last `jekyll build` output, so
# the site is persistently available with nginx — no dev server needed.
#
# TLS: uses the shared zdots-local cert via ssl_params.conf. That cert's SAN
# list must include just3ws.localhost — bin/install-localhost prints the mkcert
# command. .localhost auto-resolves to loopback (RFC 6761); no /etc/hosts entry.

server {
    listen 80;
    server_name just3ws.localhost;
    return 301 https://just3ws.localhost$request_uri;
}

server {
    listen 443 ssl;
    server_name just3ws.localhost;
    include ssl_params.conf;

    # Served from a web-standard readable location, NOT the checkout: nginx
    # workers run as `nobody` and can't traverse a 700 home dir. bin/install-
    # localhost syncs `jekyll build` output here (o+rX). Refresh: re-run it.
    root  /opt/homebrew/var/www/just3ws.github.io;
    index index.html;

    # Jekyll emits pretty-URL directories (foo/index.html); try file, dir, .html.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
    error_page 404 /404.html;

    # Fingerprinted/static assets — cache hard.
    location ~* \.(css|js|png|jpe?g|gif|svg|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
